# SSID Open-Core Export Policy v2.0.0
# Authoritative source: SSID private repo (this file)
# Defines what MAY and what MUST NOT be mirrored to SSID-open-core
---
schema_version: "2.0.0"
source_repo: "SSID"
target_repo: "SSID-open-core"
mode: "filtered"

# Only these prefixes are allowed in open-core
allow_prefixes:
  - "03_core/"
  - "12_tooling/"
  - "16_codex/"
  - "23_compliance/"
  - "24_meta_orchestration/"
  # Top-level files
  - "LICENSE"
  - "README.md"
  - "CONTRIBUTING.md"
  - "AGENTS.md"
  - "pytest.ini"
  - "pyproject.toml"

# These roots MUST NOT appear in open-core
deny_roots:
  - "01_ai_layer"        # AI/scoring algorithms, IP-sensitive
  - "02_audit_logging"   # Evidence, WORM storage, quarantine chain
  - "04_deployment"      # Infrastructure details
  - "05_documentation"   # Internal docs, partner-specific
  - "06_data_pipeline"   # Data flow architecture
  - "07_governance_legal" # Legal/regulatory specifics
  - "08_identity_score"  # Scoring algorithms, IP-sensitive
  - "09_meta_identity"   # Identity logic, partner-specific
  - "10_interoperability" # Partner interfaces, NDA-dependent
  - "11_test_simulation" # Test infrastructure (public-safe but not core)
  - "13_ui_layer"        # Product UI, not open-core
  - "14_zero_time_auth"  # Auth algorithms, security-critical
  - "15_infra"           # Infrastructure secrets risk
  - "17_observability"   # Monitoring setup, internal
  - "18_data_layer"      # Database schemas, internal
  - "19_adapters"        # Partner adapters, NDA-dependent
  - "20_foundation"      # Token/foundation, regulatory
  - "21_post_quantum_crypto" # Crypto implementation, security-critical
  - "22_datasets"        # PII-adjacent, regulatory

# Allowed file extensions in open-core exports
allow_extensions:
  - ".py"
  - ".yaml"
  - ".yml"
  - ".md"
  - ".toml"
  - ".cfg"
  - ".ini"
  - ".txt"
  - ".json"
  - ".sol"

# Maximum file size for export (10 MB)
max_file_size_bytes: 10485760

# Glob patterns that must never be exported
deny_globs:
  - "**/.env"
  - "**/.env.*"
  - "**/secrets/**"
  - "**/credentials/**"
  - "**/private/**"
  - "**/*.pem"
  - "**/*.key"
  - "**/*.p12"
  - "02_audit_logging/**"
  - "02_audit_logging/storage/worm/**"
  - "02_audit_logging/evidence/**"
  - "24_meta_orchestration/registry/logs/**"
  - "security/results/**"
  - "**/__pycache__/**"
  - "**/node_modules/**"

# Secret patterns to scan before export
secret_scan_regex:
  - "BEGIN (RSA|OPENSSH|EC) PRIVATE KEY"
  - "AKIA[0-9A-Z]{16}"
  - "xox[baprs]-"
  - "ghp_[A-Za-z0-9]{36}"
  - "-----BEGIN PRIVATE KEY-----"
  - "sk-[A-Za-z0-9]{48}"
  - "glpat-[A-Za-z0-9]{20}"

# Enforcement
enforcement:
  ci_gate_required: true
  pre_export_scan: true
  fail_on_deny_match: true
  fail_on_secret_match: true

# Export manifest schema for validation
export_manifest_schema:
  required_fields:
    - "export_id"
    - "timestamp"
    - "source_commit"
    - "files"
    - "policy_version"
  format: "json"

# Status note
note: >
  CRITICAL: As of 2026-03-28, SSID-open-core contains all 24 roots
  but only 5 are allowed. The 19 denied roots must be removed from
  open-core or explicitly reclassified with governance approval.
  This policy is the authoritative SoT for the export boundary.
