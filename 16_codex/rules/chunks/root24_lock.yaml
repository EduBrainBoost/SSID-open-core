rule_id: "RULE-001"
name: "ROOT-24-LOCK"
version: "1.0.0"
enforcement_level: "MANDATORY"
description: >
  Die 24 Root-Ordner im SSID-Repo sind kanonisch und unveraenderlich.
  Keine strukturellen Aenderungen an der Root-Ebene sind erlaubt.
constraints:
  - "Exakt 24 Root-Ordner sind definiert und kanonisch"
  - "Jeder Agent prueft vor Schreiboperationen den Zielpfad"
  - "Nur Schreibzugriffe innerhalb erlaubter Roots gestattet"
  - "Core (03_core) ist Lock-Enforcer fuer alle anderen Roots"
canonical_roots:
  - 01_ai_layer
  - 02_audit_logging
  - 03_core
  - 04_deployment
  - 05_documentation
  - 06_data_pipeline
  - 07_governance_legal
  - 08_identity_score
  - 09_meta_identity
  - 10_interoperability
  - 11_test_simulation
  - 12_tooling
  - 13_ui_layer
  - 14_zero_time_auth
  - 15_infra
  - 16_codex
  - 17_observability
  - 18_data_layer
  - 19_adapters
  - 20_foundation
  - 21_post_quantum_crypto
  - 22_datasets
  - 23_compliance
  - 24_meta_orchestration
violations:
  - "Neue Root-Ordner anlegen"
  - "Root-Ordner umbenennen"
  - "Root-Ordner loeschen"
  - "Root-Struktur veraendern"
