# Token Matrix Validator Configuration
# Validates token_matrix.yaml rows against expected schema.

schema_version: "1.0"

required_columns:
  - token_id
  - name
  - type
  - max_supply
  - minting_role
  - pausable
  - burnable

bool_synonyms:
  "true": true
  "false": false

validation_rules:
  max_supply:
    type: integer
    min: 0
  type:
    enum: ["utility", "governance", "soulbound", "reward"]
  pausable:
    type: boolean
  burnable:
    type: boolean

on_failure: "FAIL"
on_missing_row: "WARN"
