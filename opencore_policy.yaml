# opencore_policy.yaml — SSID Open Core Policy
# Defines allowed roots, blocked extensions, and sanitization rules.

version: "1.0"
schema: opencore_policy/v1

allowed_roots:
  - 03_core
  - 12_tooling
  - 16_codex
  - 23_compliance
  - 24_meta_orchestration

blocked_extensions:
  - .env
  - .pem
  - .key
  - .p12
  - .pfx
  - .jks
  - .secret
  - .credentials
  - .token

sanitization_rules:
  strip_pii: true
  hash_algorithm: SHA3-256
  remove_internal_comments: true
  remove_agent_prompts: true
  remove_evidence_stdout: true
  max_file_size_kb: 500

export_constraints:
  allow_binary: false
  allow_symlinks: false
  require_license_header: true
  require_codeowners: true

enforcement:
  mode: strict
  fail_on_violation: true
  log_violations: true
