name: "Cron: Daily Sanctions Check"
# ADR-0050 — SoT Cron Job T021
# Schedule: 03:15 UTC daily

on:
  schedule:
    - cron: "15 3 * * 1"   # weekly Monday 03:15 UTC (was: daily, throttled D2 containment)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sanctions-check:
    name: Daily Sanctions Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .

      - name: Run sanctions freshness check
        run: python 12_tooling/cli/run_all_gates.py --gate sanctions_freshness
        env:
          PYTHONPATH: "."

      # NOTE: Phase 4 — SHA256 manifest and upload steps removed
      # (referenced 02_audit_logging which is not part of open-core 5-root structure)
