name: "Cron: Daily Structure Gate"
# ADR-0050 — SoT Cron Job T021
# Schedule: 02:00 UTC daily

on:
  schedule:
    - cron: "0 2 * * 1"   # weekly Monday 02:00 UTC (was: daily, throttled D2 containment)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  structure-gate:
    name: Daily Structure Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .

      - name: Run structure gate
        run: python 12_tooling/cli/run_all_gates.py --gate structure
        env:
          PYTHONPATH: "."

      - name: Verify shard registry
        run: python 12_tooling/cli/shards_registry_build.py --verify
        env:
          PYTHONPATH: "."

      # NOTE: Phase 4 — SHA256 manifest and upload steps removed
      # (referenced 02_audit_logging which is not part of open-core 5-root structure)
