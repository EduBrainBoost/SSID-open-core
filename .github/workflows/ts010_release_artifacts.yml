name: "TS010: Release Artifacts"

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v0.1.0). Leave empty for workflow artifact only."
        required: false
        default: ""
      draft:
        description: "Create release as draft"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      zip_name: ${{ steps.bundle.outputs.zip_name }}
      sha256sums_name: ${{ steps.bundle.outputs.sha256sums_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build deterministic bundle
        id: bundle
        run: |
          python .github/scripts/build_release_bundle.py \
            --source-dir public_export \
            --output-dir _release_out
          echo "zip_name=$(ls _release_out/*.zip | head -1 | xargs basename)" >> "$GITHUB_OUTPUT"
          echo "sha256sums_name=SHA256SUMS" >> "$GITHUB_OUTPUT"

      - name: Verify bundle integrity
        run: |
          python .github/scripts/verify_release_bundle.py \
            --zip _release_out/*.zip \
            --sha256sums _release_out/SHA256SUMS

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: _release_out/
          retention-days: 30

  release:
    needs: build
    if: inputs.release_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-bundle
          path: _release_out/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DRAFT_FLAG=""
          if [ "${{ inputs.draft }}" = "true" ]; then
            DRAFT_FLAG="--draft"
          fi
          gh release create "${{ inputs.release_tag }}" \
            $DRAFT_FLAG \
            --title "${{ inputs.release_tag }}" \
            --notes "Deterministic release bundle from public_export/." \
            _release_out/${{ needs.build.outputs.zip_name }} \
            _release_out/${{ needs.build.outputs.sha256sums_name }}
