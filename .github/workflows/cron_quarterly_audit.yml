name: "Cron: Quarterly Full Audit"
# ADR-0050 — SoT Cron Job T021
# Schedule: 1st of every 3rd month at midnight UTC

on:
  schedule:
    - cron: "0 0 1 */3 *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quarterly-audit:
    name: Quarterly Full Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .

      - name: Run full gate suite
        run: python 12_tooling/cli/run_all_gates.py --all --report-bus
        env:
          PYTHONPATH: "."

      - name: Generate SHA256 manifest
        run: python 12_tooling/cli/cron_sha256_manifest.py --job quarterly_audit --output 02_audit_logging/logs/cron_runs.jsonl
        env:
          PYTHONPATH: "."

      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quarterly-audit-${{ github.run_id }}
          path: |
            02_audit_logging/logs/cron_runs.jsonl
            02_audit_logging/reports/
          retention-days: 365
