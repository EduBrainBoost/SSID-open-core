name: "Cron: Quarterly Full Audit"
# ADR-0050 — SoT Cron Job T021
# Schedule: 1st of every 3rd month at midnight UTC

on:
  schedule:
    - cron: "0 0 1 */3 *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quarterly-audit:
    name: Quarterly Full Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install .

      - name: Run full gate suite
        run: python 12_tooling/cli/run_all_gates.py --all --report-bus
        env:
          PYTHONPATH: "."

      # NOTE: Phase 4 — SHA256 manifest and upload steps removed
      # (referenced 02_audit_logging which is not part of open-core 5-root structure)
