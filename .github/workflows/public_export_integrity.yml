name: Public Export Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  integrity-check:
    name: Verify Export Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Verify allowed roots only
        run: |
          ALLOWED="03_core 12_tooling 16_codex 23_compliance 24_meta_orchestration"
          for dir in */; do
            dir_name="${dir%/}"
            # Skip non-root directories and dotfiles
            if [[ "$dir_name" == .* ]] || [[ "$dir_name" == "tests" ]]; then
              continue
            fi
            # Check if directory matches NN_ pattern (root directory)
            if [[ "$dir_name" =~ ^[0-9]{2}_ ]]; then
              if ! echo "$ALLOWED" | grep -qw "$dir_name"; then
                echo "::error::Unauthorized root directory found: $dir_name"
                exit 1
              fi
            fi
          done
          echo "All root directories are authorized."

      - name: Verify no blocked extensions
        run: |
          BLOCKED_EXTS=".env .pem .key .p12 .pfx .jks .secret .credentials .token"
          VIOLATIONS=0
          for ext in $BLOCKED_EXTS; do
            FILES=$(find . -name "*${ext}" -not -path './.git/*' 2>/dev/null || true)
            if [ -n "$FILES" ]; then
              echo "::error::Blocked extension ${ext} found: ${FILES}"
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          done
          if [ "$VIOLATIONS" -gt 0 ]; then
            exit 1
          fi
          echo "No blocked extensions found."

      - name: Verify policy files exist
        run: |
          REQUIRED_FILES=(
            "opencore_policy.yaml"
            "public_export_rules.yaml"
            "public_export_manifest.json"
            "open_core_registry.json"
            "public_export_policy.rego"
            "CODEOWNERS"
            "LICENSE"
            "SECURITY.md"
          )
          MISSING=0
          for f in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "::error::Required file missing: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            exit 1
          fi
          echo "All required policy files present."

      - name: Validate opencore_policy.yaml
        run: |
          python -c "
          import yaml, sys
          with open('opencore_policy.yaml') as f:
              policy = yaml.safe_load(f)
          required = ['version', 'allowed_roots', 'blocked_extensions', 'sanitization_rules', 'enforcement']
          for key in required:
              if key not in policy:
                  print(f'ERROR: Missing key in policy: {key}')
                  sys.exit(1)
          allowed = sorted(policy['allowed_roots'])
          expected = sorted(['03_core', '12_tooling', '16_codex', '23_compliance', '24_meta_orchestration'])
          if allowed != expected:
              print(f'ERROR: allowed_roots mismatch: {allowed} != {expected}')
              sys.exit(1)
          print('Policy validation passed.')
          "

      - name: Validate manifest consistency
        run: |
          python -c "
          import json, sys
          with open('public_export_manifest.json') as f:
              manifest = json.load(f)
          roots = [r['root'] for r in manifest['exported_roots']]
          expected = ['03_core', '12_tooling', '16_codex', '23_compliance', '24_meta_orchestration']
          if sorted(roots) != sorted(expected):
              print(f'ERROR: Manifest roots mismatch')
              sys.exit(1)
          print('Manifest validation passed.')
          "

      - name: Generate SHA256 checksums
        run: |
          echo "=== SHA256 Checksums of Policy Artifacts ==="
          sha256sum opencore_policy.yaml \
                    public_export_rules.yaml \
                    public_export_manifest.json \
                    open_core_registry.json \
                    public_export_policy.rego \
                    CODEOWNERS 2>/dev/null || true
