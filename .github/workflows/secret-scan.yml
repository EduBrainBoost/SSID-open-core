name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Detect Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan and compare against baseline
        run: |
          # Generate current scan
          detect-secrets scan \
            --all-files \
            --exclude-files '\.git/.*' \
            --exclude-files '.*\.lock' \
            --exclude-files '24_meta_orchestration/report_bus/events/EVENT_.*\.json' \
            --exclude-files '24_meta_orchestration/registry/generated/.*' \
            --exclude-files 'tests/fixtures/.*' \
            --exclude-files '24_meta_orchestration/registry/manifests/.*\.json' \
            --exclude-files '24_meta_orchestration/shards/.*/evidence/.*\.json' \
            --exclude-files '.*shards_registry\.json' \
            --exclude-files '.*baseline_freeze\.json' \
            > .secrets-report.json

          # Compare current scan against committed baseline
          python -c "
          import json, sys

          with open('.secrets.baseline') as f:
              baseline = json.load(f)
          with open('.secrets-report.json') as f:
              current = json.load(f)

          baseline_files = set(baseline.get('results', {}).keys())
          current_files = set(current.get('results', {}).keys())
          new_files = current_files - baseline_files

          baseline_count = sum(len(v) for v in baseline.get('results', {}).values())
          current_count = sum(len(v) for v in current.get('results', {}).values())

          print(f'Baseline: {baseline_count} findings in {len(baseline_files)} files')
          print(f'Current:  {current_count} findings in {len(current_files)} files')

          if new_files:
              print(f'NEW files with secrets: {new_files}')
              print(f'::error::New secret findings detected in {len(new_files)} file(s)')
              sys.exit(1)

          if current_count > baseline_count:
              print(f'::error::Secret count increased from {baseline_count} to {current_count}')
              sys.exit(1)

          print('PASS: no new secrets beyond baseline.')
          "

      - name: Check blocked extensions
        run: |
          BLOCKED_EXTS=".env .pem .key .p12 .pfx .jks .secret .credentials .token"
          FOUND=0
          for ext in $BLOCKED_EXTS; do
            FILES=$(find . -name "*${ext}" -not -path './.git/*' 2>/dev/null || true)
            if [ -n "$FILES" ]; then
              echo "::error::Blocked extension ${ext} found: ${FILES}"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "No blocked extensions found."
