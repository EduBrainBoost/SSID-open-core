name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Detect Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan for secrets
        run: |
          detect-secrets scan \
            --all-files \
            --exclude-files '\.git/.*' \
            --exclude-files '.*\.lock' \
            --exclude-files '.*\.baseline' \
            --exclude-files '24_meta_orchestration/report_bus/events/EVENT_.*\.json' \
            --exclude-files '24_meta_orchestration/registry/generated/.*' \
            --exclude-files 'tests/fixtures/.*' \
            --exclude-files '24_meta_orchestration/registry/manifests/.*\.json' \
            --exclude-files '24_meta_orchestration/shards/.*/evidence/.*\.json' \
            --exclude-files '.*shards_registry\.json' \
            --exclude-files '.*baseline_freeze\.json' \
            > .secrets-report.json

          RESULTS=$(python -c "
          import json
          with open('.secrets-report.json') as f:
              data = json.load(f)
          count = sum(len(v) for v in data.get('results', {}).values())
          files = len(data.get('results', {}))
          print(f'{count} findings in {files} files')
          ")
          echo "detect-secrets report: $RESULTS"
          echo "::notice::Secret scan complete. Findings are informational until baseline cleanup is done."

      - name: Check blocked extensions
        run: |
          BLOCKED_EXTS=".env .pem .key .p12 .pfx .jks .secret .credentials .token"
          FOUND=0
          for ext in $BLOCKED_EXTS; do
            FILES=$(find . -name "*${ext}" -not -path './.git/*' 2>/dev/null || true)
            if [ -n "$FILES" ]; then
              echo "::warning::Blocked extension ${ext} found: ${FILES}"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::notice::Blocked extensions detected. Cleanup tracked separately."
          fi
          echo "Extension check complete."
