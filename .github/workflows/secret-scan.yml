name: Secret Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  secret-scan:
    name: Detect Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets scan
        run: |
          detect-secrets scan \
            --all-files \
            --exclude-files '\.git/.*' \
            --exclude-files '.*\.lock' \
            --exclude-files '24_meta_orchestration/report_bus/events/EVENT_.*\.json' \
            --exclude-files '24_meta_orchestration/registry/generated/.*' \
            --exclude-files 'tests/fixtures/.*' \
            --exclude-files '24_meta_orchestration/registry/manifests/.*\.json' \
            --exclude-files '24_meta_orchestration/shards/.*/evidence/.*\.json' \
            --exclude-files '.*shards_registry\.json' \
            --exclude-files '.*baseline_freeze\.json' \
            > .secrets-report.json

      - name: Audit results
        run: |
          RESULTS=$(python -c "
          import json, sys
          with open('.secrets-report.json') as f:
              data = json.load(f)
          count = sum(len(v) for v in data.get('results', {}).values())
          print(count)
          ")
          echo "Potential secrets found: $RESULTS"
          if [ "$RESULTS" -gt 0 ]; then
            echo "::error::Secret scan detected $RESULTS potential secret(s). Review .secrets-report.json"
            cat .secrets-report.json
            exit 1
          fi
          echo "No secrets detected."

      - name: Check blocked extensions
        run: |
          BLOCKED_EXTS=".env .pem .key .p12 .pfx .jks .secret .credentials .token"
          FOUND=0
          for ext in $BLOCKED_EXTS; do
            FILES=$(find . -name "*${ext}" -not -path './.git/*' 2>/dev/null || true)
            if [ -n "$FILES" ]; then
              echo "::error::Blocked extension ${ext} found: ${FILES}"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            exit 1
          fi
          echo "No blocked extensions found."
