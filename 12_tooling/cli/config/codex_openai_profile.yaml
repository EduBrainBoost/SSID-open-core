version: "1.0"
profile_id: "codex_openai_default"
provider: "openai"
tool: "codex_cli"

runtime:
  model_env: "OPENAI_MODEL"
  model_default: "gpt-5"
  log_mode_default: "MINIMAL"
  no_prompt_persist: true
  no_stdout_persist: true

dispatcher:
  entrypoint: "12_tooling/cli/ssid_dispatcher.py"
  task_arg: "--task"
  cmdline_arg: "--cmdline"

constraints:
  direct_repo_writes_forbidden: true
  scope_expansion_forbidden: true
  local_artifacts_only: true
