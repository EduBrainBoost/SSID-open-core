# SSID STRIDE-Based Threat Model
# SoT v4.1.0 | ROOT-24-LOCK | Classification: Security Architecture
#
# Framework: STRIDE (Spoofing, Tampering, Repudiation, Information Disclosure,
#                     Denial of Service, Elevation of Privilege)
#
# Scope: All 24 SSID functional roots plus cross-cutting concerns.
# Last reviewed: 2026-03-15
#
# Reading guide:
#   - threats[].stride_category: one or more STRIDE categories
#   - threats[].risk: critical | high | medium | low
#   - threats[].mitigations: references to existing controls in the codebase
#   - threats[].status: mitigated | partial | open
# ---------------------------------------------------------------------------

metadata:
  model_version: "1.0"
  sot_version: "4.1.0"
  reviewed_at: "2026-03-15"
  reviewers:
    - "security-team"
  scope: "SSID full-system"
  classification: "Internal — Developer Use Only"

# ===========================================================================
# TRUST BOUNDARIES
# ===========================================================================
trust_boundaries:
  - id: TB-01
    name: "External Client ↔ API Gateway"
    description: >
      Unauthenticated external callers (browsers, mobile apps, third-party
      integrators) reach the SSID HTTP API surface exposed by 03_core.
    crosses_roots: ["03_core", "13_ui_layer", "10_interoperability"]

  - id: TB-02
    name: "API Layer ↔ Identity Core"
    description: >
      Internal service-to-service calls between the API handler layer and
      the identity resolution / scoring engines.
    crosses_roots: ["03_core", "08_identity_score", "09_meta_identity"]

  - id: TB-03
    name: "Identity Core ↔ Data Layer"
    description: >
      Reads and writes between business logic and the persistence / data
      pipeline layer.
    crosses_roots: ["18_data_layer", "06_data_pipeline", "22_datasets"]

  - id: TB-04
    name: "Tooling / CI ↔ Runtime"
    description: >
      Build, packaging, and deployment artefact flow from CI systems into
      the production runtime.
    crosses_roots: ["12_tooling", "04_deployment", "15_infra"]

  - id: TB-05
    name: "External Oracles / DIDs ↔ Interoperability Adapter"
    description: >
      Outbound connections to DID registries, W3C VC verifiers, and
      third-party identity providers.
    crosses_roots: ["10_interoperability", "19_adapters", "03_core"]


# ===========================================================================
# STRIDE THREAT CATALOGUE
# ===========================================================================
threats:

  # -------------------------------------------------------------------------
  # S — SPOOFING
  # -------------------------------------------------------------------------

  - id: T-S-01
    stride_category: ["Spoofing"]
    title: "Forged DID credential presentation"
    description: >
      An attacker submits a Verifiable Credential or DID document crafted to
      impersonate a legitimate subject.  Without cryptographic verification of
      the proof section, the identity layer accepts the claim.
    affected_roots:
      - "03_core"
      - "08_identity_score"
      - "10_interoperability"
    trust_boundary: "TB-01"
    risk: "critical"
    mitigations:
      - control: "signature_verifier.py — verify_sealed_evidence()"
        status: "mitigated"
        detail: >
          All evidence records must carry a valid HMAC-SHA256 or Ed25519
          signature verified before acceptance.
      - control: "21_post_quantum_crypto — pqc_core Dilithium verification"
        status: "partial"
        detail: "PQC stub present; full Dilithium integration pending."
      - control: "supply_chain_validator.py — validate_provenance()"
        status: "mitigated"
        detail: "Build provenance is verified before artefact promotion."
    residual_risk: "low"

  - id: T-S-02
    stride_category: ["Spoofing"]
    title: "API authentication token replay / theft"
    description: >
      A stolen or leaked JWT / Bearer token is replayed to impersonate an
      authenticated session after expiry or revocation.
    affected_roots:
      - "03_core"
      - "14_zero_time_auth"
    trust_boundary: "TB-01"
    risk: "high"
    mitigations:
      - control: "secret_scanner.py — scan for leaked tokens in codebase"
        status: "mitigated"
        detail: >
          CI pipeline runs SecretScanner on all commits; JWT patterns are
          included in the default pattern registry.
      - control: "14_zero_time_auth — zero-time authentication module"
        status: "partial"
        detail: >
          Token revocation list implemented; short-lived token rotation
          recommended but not yet enforced globally.
    residual_risk: "medium"

  - id: T-S-03
    stride_category: ["Spoofing"]
    title: "Build-system identity spoofing"
    description: >
      An attacker injects a malicious build step that claims to originate from
      an allowed builder (github-actions, ssid-local), bypassing provenance
      checks.
    affected_roots:
      - "12_tooling"
      - "04_deployment"
    trust_boundary: "TB-04"
    risk: "high"
    mitigations:
      - control: "supply_chain_validator.py — ALLOWED_BUILDERS allow-list"
        status: "mitigated"
        detail: >
          Only 'github-actions' and 'ssid-local' are accepted; any other
          builder name causes provenance validation to fail.
    residual_risk: "low"

  # -------------------------------------------------------------------------
  # T — TAMPERING
  # -------------------------------------------------------------------------

  - id: T-T-01
    stride_category: ["Tampering"]
    title: "SBOM component injection / substitution"
    description: >
      An attacker modifies the CycloneDX SBOM in-transit or at rest to
      hide a malicious dependency or spoof a clean bill of materials.
    affected_roots:
      - "12_tooling"
      - "04_deployment"
    trust_boundary: "TB-04"
    risk: "high"
    mitigations:
      - control: "supply_chain_validator.py — validate_sbom_integrity()"
        status: "mitigated"
        detail: >
          SHA-256 hash of the SBOM file is compared against the expected
          digest stored in the provenance record before use.
      - control: "supply_chain_validator.py — compare_sboms()"
        status: "mitigated"
        detail: >
          Reproducibility check compares two independently generated SBOMs
          component-by-component.
    residual_risk: "low"

  - id: T-T-02
    stride_category: ["Tampering"]
    title: "Evidence record manipulation"
    description: >
      An attacker modifies audit log or evidence records after sealing to
      alter the identity decision history.
    affected_roots:
      - "02_audit_logging"
      - "08_identity_score"
    trust_boundary: "TB-02"
    risk: "critical"
    mitigations:
      - control: "signature_verifier.py — hmac_sign() / hmac_verify()"
        status: "mitigated"
        detail: >
          Each evidence record is HMAC-signed at seal time.  Any post-seal
          modification invalidates the signature.
      - control: "signature_verifier.py — verify_sealed_evidence()"
        status: "mitigated"
        detail: >
          Payload hash is verified independently; algorithm must be in
          ALLOWED_HASH_ALGORITHMS (sha256, sha384, sha512, sha3_256, sha3_512).
    residual_risk: "low"

  - id: T-T-03
    stride_category: ["Tampering"]
    title: "Dependency supply-chain poisoning"
    description: >
      A malicious package is introduced via a typosquatted or compromised
      upstream dependency in requirements.txt or package.json.
    affected_roots:
      - "12_tooling"
      - "03_core"
      - "18_data_layer"
    trust_boundary: "TB-04"
    risk: "critical"
    mitigations:
      - control: "dependency_scanner.py — scan_components()"
        status: "mitigated"
        detail: >
          PyPI and npm advisory APIs are queried for all pinned dependencies;
          critical CVEs block the build.
      - control: "sbom_generator.py — generate_cyclonedx_sbom()"
        status: "mitigated"
        detail: "SBOM provides a full inventory for forensic comparison."
      - control: "attack_surface_mapper.py — map_dependencies()"
        status: "mitigated"
        detail: "High-risk dependency categories are flagged for review."
    residual_risk: "medium"

  # -------------------------------------------------------------------------
  # R — REPUDIATION
  # -------------------------------------------------------------------------

  - id: T-R-01
    stride_category: ["Repudiation"]
    title: "Missing or incomplete audit trail"
    description: >
      An actor performs a sensitive identity or governance action that is not
      recorded in the audit log, making post-incident attribution impossible.
    affected_roots:
      - "02_audit_logging"
      - "07_governance_legal"
      - "23_compliance"
    trust_boundary: "TB-02"
    risk: "high"
    mitigations:
      - control: "02_audit_logging — structured audit event emission"
        status: "partial"
        detail: >
          Audit events are emitted for identity decisions; governance actions
          require additional instrumentation in 07_governance_legal.
      - control: "signature_verifier.py — sealed evidence with timestamps"
        status: "mitigated"
        detail: >
          Evidence records carry a sealed_at timestamp and HMAC signature,
          providing non-repudiation for all signed actions.
    residual_risk: "medium"

  - id: T-R-02
    stride_category: ["Repudiation"]
    title: "Build pipeline action without signed attestation"
    description: >
      A CI/CD action (e.g. deployment, key rotation) executes without
      producing a verifiable signed attestation, allowing deniability.
    affected_roots:
      - "04_deployment"
      - "12_tooling"
    trust_boundary: "TB-04"
    risk: "medium"
    mitigations:
      - control: "supply_chain_validator.py — validate_provenance()"
        status: "mitigated"
        detail: >
          Provenance JSON must include builder, build_timestamp, source_repo,
          and commit_sha — all verified before promotion.
    residual_risk: "low"

  # -------------------------------------------------------------------------
  # I — INFORMATION DISCLOSURE
  # -------------------------------------------------------------------------

  - id: T-I-01
    stride_category: ["Information Disclosure"]
    title: "Secrets leaked into source code or logs"
    description: >
      API keys, tokens, private keys, or database credentials are accidentally
      committed to the repository or emitted in application logs.
    affected_roots:
      - "12_tooling"
      - "03_core"
      - "15_infra"
    trust_boundary: "TB-01"
    risk: "critical"
    mitigations:
      - control: "secret_scanner.py — SecretScanner with 25+ regex patterns"
        status: "mitigated"
        detail: >
          Pre-commit hook and CI job run SecretScanner over the entire
          working tree; findings at medium severity or above block the commit.
      - control: "sbom_generator.py — _check_secrets() output scrubber"
        status: "mitigated"
        detail: >
          SBOM output is scrubbed against the secret deny-pattern list
          before writing to disk.
      - control: "security_config.yaml — secret_deny_patterns"
        status: "mitigated"
        detail: "7 canonical secret deny-patterns defined and enforced."
    residual_risk: "low"

  - id: T-I-02
    stride_category: ["Information Disclosure"]
    title: "PII exposure in identity score payloads"
    description: >
      Personally Identifiable Information (name, email, government ID) is
      returned in API responses or stored in plaintext in the data layer.
    affected_roots:
      - "08_identity_score"
      - "09_meta_identity"
      - "18_data_layer"
    trust_boundary: "TB-03"
    risk: "high"
    mitigations:
      - control: "23_compliance — PII redaction and data minimisation controls"
        status: "partial"
        detail: "PII redaction at API boundary implemented; data-at-rest encryption pending."
    residual_risk: "medium"

  - id: T-I-03
    stride_category: ["Information Disclosure"]
    title: "Attack surface exposure via verbose error messages"
    description: >
      Unhandled exceptions return stack traces or internal path information
      to external callers, leaking system architecture details.
    affected_roots:
      - "03_core"
      - "13_ui_layer"
    trust_boundary: "TB-01"
    risk: "medium"
    mitigations:
      - control: "03_core — global exception handler returning opaque 500 responses"
        status: "partial"
        detail: "Generic error handler present; needs audit of all exception sites."
      - control: "attack_surface_mapper.py — endpoint risk classification"
        status: "mitigated"
        detail: "Debug and health endpoints are flagged as medium risk for manual review."
    residual_risk: "medium"

  # -------------------------------------------------------------------------
  # D — DENIAL OF SERVICE
  # -------------------------------------------------------------------------

  - id: T-D-01
    stride_category: ["Denial of Service"]
    title: "Resource exhaustion via unbounded API requests"
    description: >
      An attacker floods the HTTP API with high-frequency or computationally
      expensive requests, exhausting CPU, memory, or database connections.
    affected_roots:
      - "03_core"
      - "15_infra"
    trust_boundary: "TB-01"
    risk: "high"
    mitigations:
      - control: "15_infra — rate limiting and request-size caps"
        status: "partial"
        detail: >
          Per-IP rate limiting deployed at ingress; per-endpoint cost limits
          not yet implemented for identity-scoring endpoints.
    residual_risk: "medium"

  - id: T-D-02
    stride_category: ["Denial of Service"]
    title: "Cryptographic operation flooding (PQC / hash)"
    description: >
      Computationally expensive post-quantum cryptographic operations
      (Dilithium key generation, Kyber KEM) are triggered without
      authentication, causing CPU exhaustion.
    affected_roots:
      - "21_post_quantum_crypto"
      - "03_core"
    trust_boundary: "TB-01"
    risk: "high"
    mitigations:
      - control: "21_post_quantum_crypto — operation quotas per session"
        status: "open"
        detail: "No per-session PQC operation quota implemented yet."
    residual_risk: "high"

  - id: T-D-03
    stride_category: ["Denial of Service"]
    title: "SBOM generation triggering disk I/O exhaustion"
    description: >
      An operator triggers SBOM generation across all 24 roots simultaneously,
      causing excessive disk reads and potential I/O starvation.
    affected_roots:
      - "12_tooling"
    trust_boundary: "TB-04"
    risk: "low"
    mitigations:
      - control: "sbom_generator.py — _MAX_FILE_SIZE cap and sequential root scan"
        status: "mitigated"
        detail: "Files larger than 2 MiB are skipped; roots are processed sequentially."
    residual_risk: "low"

  # -------------------------------------------------------------------------
  # E — ELEVATION OF PRIVILEGE
  # -------------------------------------------------------------------------

  - id: T-E-01
    stride_category: ["Elevation of Privilege"]
    title: "Identity score manipulation to gain higher trust tier"
    description: >
      An attacker manipulates input signals to the identity scoring engine to
      inflate their trust score, gaining access to resources reserved for
      higher-trust identities.
    affected_roots:
      - "08_identity_score"
      - "09_meta_identity"
      - "03_core"
    trust_boundary: "TB-02"
    risk: "critical"
    mitigations:
      - control: "08_identity_score — deterministic scoring with signed evidence"
        status: "partial"
        detail: >
          Score inputs are cross-validated against sealed evidence records;
          adversarial input fuzzing tests needed.
      - control: "signature_verifier.py — evidence chain integrity"
        status: "mitigated"
        detail: "Each evidence record is sealed; any tampered input fails verification."
    residual_risk: "medium"

  - id: T-E-02
    stride_category: ["Elevation of Privilege"]
    title: "Dependency confusion / path traversal in plugin loader"
    description: >
      A malicious package name or relative path injection causes the plugin
      loader to execute code with elevated permissions.
    affected_roots:
      - "19_adapters"
      - "24_meta_orchestration"
    trust_boundary: "TB-02"
    risk: "high"
    mitigations:
      - control: "dependency_scanner.py — full SBOM inventory"
        status: "mitigated"
        detail: "All loaded packages must appear in the approved SBOM."
      - control: "supply_chain_validator.py — artifact hash manifest"
        status: "partial"
        detail: "Hash manifest validation in place; dynamic plugin loading needs sandboxing."
    residual_risk: "medium"

  - id: T-E-03
    stride_category: ["Elevation of Privilege"]
    title: "Weak hash algorithm used for privilege-bearing token"
    description: >
      A privilege-bearing token or evidence record uses MD5 or SHA-1 for its
      integrity hash, enabling a collision attack to forge a valid record.
    affected_roots:
      - "02_audit_logging"
      - "14_zero_time_auth"
      - "08_identity_score"
    trust_boundary: "TB-02"
    risk: "critical"
    mitigations:
      - control: "signature_verifier.py — FORBIDDEN_HASH_ALGORITHMS = {md5, sha1}"
        status: "mitigated"
        detail: >
          Any evidence record declaring MD5 or SHA-1 as algorithm is rejected
          immediately by verify_sealed_evidence().
      - control: "security_config.yaml — hash_algorithms.forbidden"
        status: "mitigated"
        detail: >
          MD5 and SHA-1 are listed in the forbidden set; SHA-256 is the minimum
          recommended algorithm.
    residual_risk: "low"


# ===========================================================================
# CROSS-CUTTING MITIGATIONS
# ===========================================================================
cross_cutting_controls:

  - id: CC-01
    name: "Secret Scanning in CI"
    tool: "12_tooling/security/secret_scanner.py"
    coverage: "all roots"
    triggers:
      - "pre-commit hook"
      - "CI pull-request check"
    blocks_on: "medium severity and above"

  - id: CC-02
    name: "Dependency Vulnerability Scanning"
    tool: "12_tooling/security/dependency_scanner.py"
    coverage: "all Python and npm packages"
    triggers:
      - "CI merge check"
    blocks_on: "critical CVE"

  - id: CC-03
    name: "SBOM Generation and Integrity"
    tool: "12_tooling/security/sbom_generator.py"
    coverage: "all roots"
    triggers:
      - "release pipeline"
    blocks_on: "secret pattern in SBOM output"

  - id: CC-04
    name: "Supply Chain Validation"
    tool: "12_tooling/security/supply_chain_validator.py"
    coverage: "deployment artefacts and provenance"
    triggers:
      - "pre-deployment gate"
    blocks_on: "provenance validation failure, hash mismatch"

  - id: CC-05
    name: "Attack Surface Mapping"
    tool: "12_tooling/security/attack_surface_mapper.py"
    coverage: "all HTTP, gRPC, WS, GraphQL endpoints; all ports; all deps"
    triggers:
      - "quarterly security review"
      - "on significant new feature merge"
    blocks_on: "critical endpoint or port discovered without documented owner"

  - id: CC-06
    name: "Signature Verification"
    tool: "12_tooling/security/signature_verifier.py"
    coverage: "all sealed evidence records"
    triggers:
      - "runtime — every evidence acceptance"
    blocks_on: "invalid signature, forbidden algorithm, short signature"


# ===========================================================================
# OPEN RISKS SUMMARY
# ===========================================================================
open_risks:

  - id: "T-D-02"
    title: "PQC operation flooding"
    risk: "high"
    owner: "21_post_quantum_crypto team"
    target_sprint: "next"
    note: "Quota enforcement for Dilithium / Kyber operations required."

  - id: "T-R-01"
    title: "Incomplete audit trail for governance actions"
    risk: "medium"
    owner: "07_governance_legal team"
    target_sprint: "next"
    note: "Instrument all governance state transitions with signed audit events."

  - id: "T-I-02"
    title: "PII plaintext at rest in data layer"
    risk: "medium"
    owner: "18_data_layer team"
    target_sprint: "next+1"
    note: "Field-level encryption for PII columns required."

  - id: "T-E-01"
    title: "Identity score manipulation — adversarial input fuzzing"
    risk: "medium"
    owner: "08_identity_score team"
    target_sprint: "next+1"
    note: "Fuzz testing harness for scoring engine input validation needed."
