# SSID Security Configuration
# SoT v4.1.0 | ROOT-24-LOCK | Classification: Developer Tools
# Governs security parameters for SBOM, dependency scanning, and artifact verification.

version: "1.0"

# ---------------------------------------------------------------------------
# Hash algorithms
# ---------------------------------------------------------------------------
hash_algorithms:
  allowed:
    - "sha256"
    - "sha384"
    - "sha512"
    - "sha3_256"
    - "sha3_512"
  minimum_recommended: "sha256"
  forbidden:
    - "md5"
    - "sha1"

# ---------------------------------------------------------------------------
# Asymmetric / Signature key lengths (bits)
# ---------------------------------------------------------------------------
key_lengths:
  rsa_minimum: 3072
  ec_minimum: 256
  ed25519_minimum: 256
  dilithium_minimum: 2      # NIST security level (2, 3, or 5)
  kyber_minimum: 512        # KEM parameter set (512, 768, 1024)

# ---------------------------------------------------------------------------
# Certificate requirements
# ---------------------------------------------------------------------------
certificates:
  min_validity_days: 90
  require_subject_alt_name: true
  require_key_usage: true
  allowed_signature_algorithms:
    - "ecdsa-with-SHA256"
    - "ecdsa-with-SHA384"
    - "sha256WithRSAEncryption"
    - "sha384WithRSAEncryption"
    - "id-Ed25519"

# ---------------------------------------------------------------------------
# Dependency scanning
# ---------------------------------------------------------------------------
dependency_scanning:
  # Maximum allowed CVSS score before a dependency is flagged CRITICAL
  cvss_critical_threshold: 9.0
  # Maximum allowed CVSS score before a dependency is flagged HIGH
  cvss_high_threshold: 7.0
  # Advisories databases to check (informational — actual checks are offline)
  advisory_sources:
    - "https://pypi.org/pypi/{name}/{version}/json"
    - "https://registry.npmjs.org/-/npm/v1/security/audits"
  # Age (days) after which a pinned dependency is considered stale
  staleness_days: 180

# ---------------------------------------------------------------------------
# Supply chain validation
# ---------------------------------------------------------------------------
supply_chain:
  # Required provenance fields in build metadata
  required_provenance_fields:
    - "builder"
    - "build_timestamp"
    - "source_repo"
    - "commit_sha"
  # Allowed build systems
  allowed_builders:
    - "github-actions"
    - "ssid-local"
  # Reproducibility tolerance (seconds) for timestamp comparison
  reproducibility_tolerance_seconds: 0

# ---------------------------------------------------------------------------
# Evidence / Artifact signing
# ---------------------------------------------------------------------------
artifact_signing:
  # Expected evidence hash algorithm
  evidence_hash_algorithm: "sha256"
  # Minimum signature hex length (bytes * 2)
  min_signature_hex_length: 64
  # Seal fields that MUST be present in a sealed evidence record
  required_seal_fields:
    - "evidence_id"
    - "hash"
    - "algorithm"
    - "sealed_at"
    - "signature"

# ---------------------------------------------------------------------------
# Secret deny patterns (regex, applied to any output before writing)
# ---------------------------------------------------------------------------
secret_deny_patterns:
  - "AKIA[0-9A-Z]{16}"                          # AWS Access Key
  - "ghp_[a-zA-Z0-9]{36}"                       # GitHub Personal Token
  - "-----BEGIN (RSA |EC )?PRIVATE KEY-----"    # PEM Private Key
  - "sk-[a-zA-Z0-9]{48}"                        # OpenAI API Key
  - "xox[bprs]-[a-zA-Z0-9\\-]+"               # Slack Token
  - "GOCSPX-[a-zA-Z0-9\\-_]+"                 # Google OAuth Secret
  - "glpat-[a-zA-Z0-9\\-_]{20,}"              # GitLab Personal Token
