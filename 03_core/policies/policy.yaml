version: "1.0.0"
root: "03_core"
generated_utc: "2026-03-15T00:00:00Z"
sot_version: "4.1.0"
status: "ROOT-24-LOCK"

description: >
  Policy definitions for the Core Validators & Authority module. 03_core is the
  final decision authority for the SSID platform. All advisory modules route
  through the central interface bus defined here. This module houses the master
  SoT validator, security primitives, and the central interface bus.

policies:
  # --- Access Control ---
  - id: "AC-CORE-001"
    category: "access_control"
    title: "Final Authority Enforcement"
    requirement: >
      03_core holds final decision authority for all platform operations.
      No external module may override a core validation decision. Any attempt
      to bypass core validation MUST be rejected and logged in 02_audit_logging.
    enforcement: "strict"
    evidence_required: true
    evidence_path: "23_compliance/evidence/core/"

  - id: "AC-CORE-002"
    category: "access_control"
    title: "Interface Bus Access Control"
    requirement: >
      All modules routing through the central interface bus (interfaces/ai_validator_bus)
      MUST be registered in 24_meta_orchestration/registry/. Unregistered modules
      MUST NOT receive bus access in production.
    enforcement: "strict"
    evidence_required: true

  - id: "AC-CORE-003"
    category: "access_control"
    title: "SoT Validator Write Access"
    requirement: >
      Write access to validators/sot_validator_core MUST be restricted to
      architecture reviewers. Changes require dual-review as per
      07_governance_legal/approvals/approval_workflow.yaml.
    enforcement: "strict"
    evidence_required: true
    references:
      - "07_governance_legal/approvals/approval_workflow.yaml"

  - id: "AC-CORE-004"
    category: "access_control"
    title: "Security Primitives Access"
    requirement: >
      The security/ subdirectory (data minimization, forensic manager) MUST
      only be accessible to the core module itself and designated security
      reviewers. No other module may directly invoke security primitives.
    enforcement: "strict"
    evidence_required: true

  # --- Data Handling ---
  - id: "DH-CORE-001"
    category: "data_handling"
    title: "Data Minimization Enforcement"
    requirement: >
      The data minimization component in security/ MUST be applied to all
      data passing through 03_core. Unnecessary data fields must be stripped
      before forwarding to any downstream module.
    enforcement: "strict"
    evidence_required: true
    references:
      - "GDPR Art. 5(1)(c)"
      - "03_core/security/data_minimization"

  - id: "DH-CORE-002"
    category: "data_handling"
    title: "Forensic Evidence Integrity"
    requirement: >
      The forensic manager component must maintain an immutable audit trail
      for all decisions made by 03_core. Audit records must be write-once
      and synchronized to 02_audit_logging within 60 seconds of creation.
    enforcement: "strict"
    evidence_required: true

  - id: "DH-CORE-003"
    category: "data_handling"
    title: "Shard Data Isolation"
    requirement: >
      Each of the 16 domain shards in shards/ must maintain strict data
      isolation. Cross-shard data access must route through the interface bus
      and be logged.
    enforcement: "strict"
    evidence_required: true

  # --- Operational ---
  - id: "OP-CORE-001"
    category: "operational"
    title: "SOT_AGENT Governance Conformance"
    requirement: >
      03_core MUST continuously conform to governance agents SOT_AGENT_012,
      SOT_AGENT_013, and SOT_AGENT_014. Structure conformance checks run
      on every deployment.
    enforcement: "strict"
    evidence_required: true
    references:
      - "SOT_AGENT_012: structure conformance to MUST paths"
      - "SOT_AGENT_013: no shadow files or forbidden copies"
      - "SOT_AGENT_014: interfaces reference central paths"

  - id: "OP-CORE-002"
    category: "operational"
    title: "No Shadow Files"
    requirement: >
      No shadow copies of policies, compliance mappings, or registry artifacts
      are permitted within 03_core. All such artifacts must reference their
      canonical locations in 23_compliance/ or 24_meta_orchestration/.
    enforcement: "strict"
    evidence_required: false

  - id: "OP-CORE-003"
    category: "operational"
    title: "Interface Wiring Integrity"
    requirement: >
      All interface definitions in interfaces/ must reference central path
      definitions. Local overrides of interface contracts are prohibited.
      Interface wiring audits run monthly.
    enforcement: "strict"
    evidence_required: true

  # --- Compliance ---
  - id: "CO-CORE-001"
    category: "compliance"
    title: "eIDAS2 Wallet Conformance"
    requirement: >
      The SoT validator must enforce eIDAS2 wallet attestation rules for all
      identity operations. Non-conforming operations must be rejected and
      evidence filed in 23_compliance/evidence/core/eidas2/.
    enforcement: "strict"
    evidence_required: true
    references:
      - "23_compliance/mappings/eidas2/"

  - id: "CO-CORE-002"
    category: "compliance"
    title: "NIS2 Security Controls"
    requirement: >
      Core security primitives must implement NIS2-aligned security controls
      including incident detection, response procedures, and supply chain
      security measures.
    enforcement: "strict"
    evidence_required: true
    references:
      - "23_compliance/mappings/nis2/"
      - "23_compliance/security/"

enforcement_defaults:
  mode: "strict"
  override_requires: "dual_review"
  audit_log_target: "02_audit_logging/"
  evidence_base: "23_compliance/evidence/core/"
