# Contract: ssidctl
# Root: 03_core | SoT v4.1.0 | ROOT-24-LOCK
# Description: Defines the interface contract for the ssidctl command-line tool.
#   ssidctl is the primary operator interface for managing SSID system operations
#   including identity resolution, evidence queries, gate execution, and
#   system health checks.

contract_id: "ssidctl"
version: "4.1.0"
status: "active"
root: "03_core"
classification: "Internal — Operator Tool"

interface:
  module: "12_tooling/ops/ssidctl/identity_lib.py"
  cli_entry: "ssidctl"
  subcommands:
    - name: "identity"
      description: "Identity resolution and score queries."
      actions:
        - "resolve <did> — Resolve a DID to its identity record."
        - "score <did> — Query the current identity score."
        - "history <did> — Show score history for a DID."

    - name: "evidence"
      description: "Evidence chain queries and verification."
      actions:
        - "verify — Verify integrity of the evidence chain."
        - "query <record_id> — Retrieve a specific evidence record."
        - "tail [--count N] — Show the N most recent evidence records."

    - name: "gates"
      description: "Execute compliance and quality gates."
      actions:
        - "run-all — Execute all registered gates."
        - "run <gate_name> — Execute a specific gate."
        - "status — Show pass/fail status of all gates."

    - name: "health"
      description: "System health and observability."
      actions:
        - "probe — Run health probes across all roots."
        - "pulse — Show system pulse metrics."
        - "metrics — Collect and display current metrics."

    - name: "dispatch"
      description: "Task dispatch via the Dispatcher."
      actions:
        - "send <task_spec_json> — Dispatch a task."
        - "status <dispatch_id> — Query dispatch status."

invariants:
  - "ssidctl MUST operate NON-INTERACTIVE in CI mode (--ci flag)."
  - "All ssidctl write operations MUST produce evidence records."
  - "ssidctl MUST NOT store PII — only SHA3-256 hashes of identity data."
  - "Exit codes: 0=success, 1=failure, 2=configuration error."

dependencies:
  upstream:
    - "03_core/src/core_engine.py"
    - "08_identity_score/src/identity_score_engine.py"
  downstream:
    - "02_audit_logging/src/evidence_chain_engine.py"
    - "12_tooling/cli/run_all_gates.py"
    - "17_observability/src/health_probe.py"
