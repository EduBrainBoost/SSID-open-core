openapi: 3.1.0
info:
  title: SSID Core Service API
  description: |
    Core service APIs for the SSID (Self-Sovereign Identity Distribution) network.
    Provides identity operations, codex registry CRUD, verification endpoints,
    governance voting/proposals, and fee distribution queries.

    Authority: 03_core (ROOT-24-LOCK)
    SoT version: 4.1.0
  version: 4.1.0
  contact:
    name: SSID Core Team
    url: https://github.com/edubrainboost/SSID
  license:
    name: See LICENSE
    url: https://github.com/edubrainboost/SSID/blob/main/LICENSE

servers:
  - url: https://api.ssid.network/v4
    description: Production
  - url: https://api.staging.ssid.network/v4
    description: Staging
  - url: http://localhost:8000/v4
    description: Local development (EMS backend port 8000)

tags:
  - name: identity
    description: Identity lifecycle operations
  - name: registry
    description: Codex registry CRUD
  - name: verification
    description: Identity verification endpoints
  - name: governance
    description: Governance voting and proposals
  - name: fees
    description: Fee distribution queries

paths:

  # ---------------------------------------------------------------------------
  # /identity
  # ---------------------------------------------------------------------------

  /identity:
    post:
      tags: [identity]
      operationId: createIdentity
      summary: Create a new SSID identity
      description: |
        Registers a new self-sovereign identity on the SSID network.
        Returns a DID document and initial verification status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityCreateRequest'
            example:
              display_name: Alice Wonderland
              public_key_multibase: zH3C2AVvLMv6gmMNam3uVAjZpfkcJCwDwnZn6z3wXmqPV
              key_type: Ed25519VerificationKey2020
              metadata:
                email_hash: sha256:5d41402abc4b2a76b9719d911017c592
      responses:
        '201':
          description: Identity created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Identity'
              example:
                id: did:ssid:z6Mkk7yqnGF3YwTGjthmMNymUWz5t6BPTMFrMUCDFCCR
                display_name: Alice Wonderland
                public_key_multibase: zH3C2AVvLMv6gmMNam3uVAjZpfkcJCwDwnZn6z3wXmqPV
                key_type: Ed25519VerificationKey2020
                verification_level: 0
                status: active
                created_at: '2026-03-15T10:00:00Z'
                updated_at: '2026-03-15T10:00:00Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /identity/{did}:
    get:
      tags: [identity]
      operationId: getIdentity
      summary: Retrieve an identity by DID
      parameters:
        - $ref: '#/components/parameters/DIDParam'
      responses:
        '200':
          description: Identity found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Identity'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    patch:
      tags: [identity]
      operationId: updateIdentity
      summary: Update identity metadata
      parameters:
        - $ref: '#/components/parameters/DIDParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IdentityUpdateRequest'
      responses:
        '200':
          description: Identity updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Identity'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [identity]
      operationId: deactivateIdentity
      summary: Deactivate an identity
      description: Marks the identity as deactivated. Does not delete historical records.
      parameters:
        - $ref: '#/components/parameters/DIDParam'
      responses:
        '204':
          description: Identity deactivated
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # /registry
  # ---------------------------------------------------------------------------

  /registry:
    get:
      tags: [registry]
      operationId: listRegistryEntries
      summary: List codex registry entries
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [rule, policy, contract, agent]
          description: Filter by entry type
        - name: status
          in: query
          schema:
            type: string
            enum: [active, deprecated, draft]
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: List of registry entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryEntryList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [registry]
      operationId: createRegistryEntry
      summary: Create a new codex registry entry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistryEntryCreateRequest'
            example:
              type: rule
              ref: SOT_AGENT_042
              title: New Validation Rule
              content: |
                Agents must validate signature before processing.
              status: draft
      responses:
        '201':
          description: Entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /registry/{entry_id}:
    get:
      tags: [registry]
      operationId: getRegistryEntry
      summary: Get a registry entry by ID
      parameters:
        - $ref: '#/components/parameters/EntryIdParam'
      responses:
        '200':
          description: Registry entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryEntry'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags: [registry]
      operationId: updateRegistryEntry
      summary: Replace a registry entry
      parameters:
        - $ref: '#/components/parameters/EntryIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistryEntryCreateRequest'
      responses:
        '200':
          description: Entry updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryEntry'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags: [registry]
      operationId: deleteRegistryEntry
      summary: Delete a registry entry
      parameters:
        - $ref: '#/components/parameters/EntryIdParam'
      responses:
        '204':
          description: Entry deleted
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # /verification
  # ---------------------------------------------------------------------------

  /verification/submit:
    post:
      tags: [verification]
      operationId: submitVerification
      summary: Submit a verification request
      description: |
        Initiates identity verification for a given DID at the requested level.
        Supported levels: 1=email, 2=phone, 3=document, 4=biometric.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerificationRequest'
            example:
              did: did:ssid:z6Mkk7yqnGF3YwTGjthmMNymUWz5t6BPTMFrMUCDFCCR
              requested_level: 2
              evidence:
                phone_number_hash: sha256:abc123def456
      responses:
        '202':
          description: Verification request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /verification/{verification_id}:
    get:
      tags: [verification]
      operationId: getVerificationStatus
      summary: Get verification request status
      parameters:
        - name: verification_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Verification status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /verification/history/{did}:
    get:
      tags: [verification]
      operationId: getVerificationHistory
      summary: Get verification history for a DID
      parameters:
        - $ref: '#/components/parameters/DIDParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Verification history
          content:
            application/json:
              schema:
                type: object
                properties:
                  did:
                    type: string
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/VerificationResult'
                  total:
                    type: integer
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # /governance
  # ---------------------------------------------------------------------------

  /governance/proposals:
    get:
      tags: [governance]
      operationId: listProposals
      summary: List governance proposals
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, active, passed, rejected, executed, cancelled]
        - name: proposer
          in: query
          schema:
            type: string
          description: Filter by proposer DID
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: List of proposals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceProposalList'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags: [governance]
      operationId: createProposal
      summary: Submit a governance proposal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GovernanceProposalCreateRequest'
            example:
              title: Increase validator reward weight to 0.45
              description: Proposal to adjust validator base weight from 0.40 to 0.45.
              proposal_type: parameter_change
              proposer: did:ssid:z6Mkk7yqnGF3YwTGjthmMNymUWz5t6BPTMFrMUCDFCCR
              parameters:
                target_param: fee_distribution.validator_weight
                new_value: '0.45'
              voting_period_days: 7
      responses:
        '201':
          description: Proposal created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceProposal'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /governance/proposals/{proposal_id}:
    get:
      tags: [governance]
      operationId: getProposal
      summary: Get a governance proposal by ID
      parameters:
        - $ref: '#/components/parameters/ProposalIdParam'
      responses:
        '200':
          description: Governance proposal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovernanceProposal'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /governance/proposals/{proposal_id}/vote:
    post:
      tags: [governance]
      operationId: castVote
      summary: Cast a vote on a governance proposal
      parameters:
        - $ref: '#/components/parameters/ProposalIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [voter_did, vote, signature]
              properties:
                voter_did:
                  type: string
                  description: DID of the voter
                  example: did:ssid:z6Mkk7yqnGF3YwTGjthmMNymUWz5t6BPTMFrMUCDFCCR
                vote:
                  type: string
                  enum: [yes, no, abstain]
                voting_power:
                  type: number
                  format: double
                  description: Token-weighted voting power (read-only, set by engine)
                signature:
                  type: string
                  description: Ed25519 signature over proposal_id + vote + voter_did
      responses:
        '200':
          description: Vote recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal_id:
                    type: string
                    format: uuid
                  voter_did:
                    type: string
                  vote:
                    type: string
                  voting_power:
                    type: number
                  recorded_at:
                    type: string
                    format: date-time
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Already voted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /governance/proposals/{proposal_id}/tally:
    get:
      tags: [governance]
      operationId: getVoteTally
      summary: Get current vote tally for a proposal
      parameters:
        - $ref: '#/components/parameters/ProposalIdParam'
      responses:
        '200':
          description: Vote tally
          content:
            application/json:
              schema:
                type: object
                properties:
                  proposal_id:
                    type: string
                    format: uuid
                  yes_power:
                    type: number
                  no_power:
                    type: number
                  abstain_power:
                    type: number
                  total_power:
                    type: number
                  quorum_reached:
                    type: boolean
                  threshold_reached:
                    type: boolean
                  updated_at:
                    type: string
                    format: date-time
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ---------------------------------------------------------------------------
  # /fees
  # ---------------------------------------------------------------------------

  /fees/distribution/{epoch}:
    get:
      tags: [fees]
      operationId: getFeeDistribution
      summary: Get fee distribution for an epoch
      parameters:
        - name: epoch
          in: path
          required: true
          schema:
            type: string
            pattern: '^epoch-[0-9]{4}-[0-9]{2}$'
            example: epoch-2026-03
      responses:
        '200':
          description: Fee distribution result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeeDistribution'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /fees/distribution/participant/{participant_id}:
    get:
      tags: [fees]
      operationId: getParticipantFeeHistory
      summary: Get fee distribution history for a participant
      parameters:
        - name: participant_id
          in: path
          required: true
          schema:
            type: string
        - name: from_epoch
          in: query
          schema:
            type: string
            pattern: '^epoch-[0-9]{4}-[0-9]{2}$'
        - name: to_epoch
          in: query
          schema:
            type: string
            pattern: '^epoch-[0-9]{4}-[0-9]{2}$'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: Participant fee history
          content:
            application/json:
              schema:
                type: object
                properties:
                  participant_id:
                    type: string
                  entries:
                    type: array
                    items:
                      $ref: '#/components/schemas/ParticipantFeeEntry'
                  total_received:
                    type: string
                    description: Total fees received (decimal string)
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /fees/fairness/{epoch}:
    get:
      tags: [fees]
      operationId: getFairnessReport
      summary: Get fairness report for an epoch distribution
      parameters:
        - name: epoch
          in: path
          required: true
          schema:
            type: string
            pattern: '^epoch-[0-9]{4}-[0-9]{2}$'
      responses:
        '200':
          description: Fairness evaluation report
          content:
            application/json:
              schema:
                type: object
                properties:
                  epoch:
                    type: string
                  gini_coefficient:
                    type: number
                    format: double
                    minimum: 0
                    maximum: 1
                  is_fair:
                    type: boolean
                  violations:
                    type: array
                    items:
                      type: string
                  participant_shares:
                    type: object
                    additionalProperties:
                      type: number
                      format: double
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:

  parameters:
    DIDParam:
      name: did
      in: path
      required: true
      schema:
        type: string
        pattern: '^did:ssid:[a-zA-Z0-9]+$'
      description: Decentralized Identifier (DID)
      example: did:ssid:z6Mkk7yqnGF3YwTGjthmMNymUWz5t6BPTMFrMUCDFCCR

    EntryIdParam:
      name: entry_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    ProposalIdParam:
      name: proposal_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

    PageParam:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1

    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:

    # --- Identity ---

    Identity:
      $ref: './json_schemas/identity.schema.json'

    IdentityCreateRequest:
      type: object
      required: [display_name, public_key_multibase, key_type]
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 128
        public_key_multibase:
          type: string
          description: Multibase-encoded public key
        key_type:
          type: string
          enum: [Ed25519VerificationKey2020, JsonWebKey2020]
        metadata:
          type: object
          additionalProperties: true

    IdentityUpdateRequest:
      type: object
      properties:
        display_name:
          type: string
          minLength: 1
          maxLength: 128
        metadata:
          type: object
          additionalProperties: true

    # --- Registry ---

    RegistryEntry:
      type: object
      required: [id, type, ref, title, status, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [rule, policy, contract, agent]
        ref:
          type: string
          example: SOT_AGENT_012
        title:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [active, deprecated, draft]
        version:
          type: string
          example: '1.0.0'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    RegistryEntryCreateRequest:
      type: object
      required: [type, ref, title, status]
      properties:
        type:
          type: string
          enum: [rule, policy, contract, agent]
        ref:
          type: string
        title:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [active, deprecated, draft]
        version:
          type: string

    RegistryEntryList:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/RegistryEntry'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # --- Verification ---

    VerificationRequest:
      type: object
      required: [did, requested_level]
      properties:
        did:
          type: string
          pattern: '^did:ssid:[a-zA-Z0-9]+$'
        requested_level:
          type: integer
          minimum: 1
          maximum: 4
          description: |
            1=email, 2=phone, 3=document, 4=biometric
        evidence:
          type: object
          additionalProperties: true
          description: Level-specific evidence payload

    VerificationResult:
      $ref: './json_schemas/verification_result.schema.json'

    # --- Governance ---

    GovernanceProposal:
      $ref: './json_schemas/governance_proposal.schema.json'

    GovernanceProposalCreateRequest:
      type: object
      required: [title, description, proposal_type, proposer]
      properties:
        title:
          type: string
          minLength: 5
          maxLength: 256
        description:
          type: string
        proposal_type:
          type: string
          enum: [parameter_change, protocol_upgrade, treasury_spend, rule_amendment]
        proposer:
          type: string
          description: DID of the proposer
        parameters:
          type: object
          additionalProperties: true
        voting_period_days:
          type: integer
          minimum: 1
          maximum: 30
          default: 7

    GovernanceProposalList:
      type: object
      properties:
        proposals:
          type: array
          items:
            $ref: '#/components/schemas/GovernanceProposal'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # --- Fees ---

    FeeDistribution:
      $ref: './json_schemas/fee_distribution.schema.json'

    ParticipantFeeEntry:
      type: object
      properties:
        epoch:
          type: string
        role:
          type: string
          enum: [validator, provider, consumer, governance, reserve]
        contribution_score:
          type: number
          format: double
        allocated_amount:
          type: string
          description: Decimal string to preserve precision
        address:
          type: string

    # --- Common ---

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: IDENTITY_NOT_FOUND
        message:
          type: string
          example: No identity found for the provided DID
        details:
          type: object
          additionalProperties: true
        request_id:
          type: string
          format: uuid

  responses:
    BadRequest:
      description: Invalid request parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: INVALID_REQUEST
            message: Request validation failed
            details:
              field: public_key_multibase
              issue: Invalid multibase encoding

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: NOT_FOUND
            message: The requested resource was not found

    Conflict:
      description: Resource already exists
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: CONFLICT
            message: An identity with this public key already exists

    UnprocessableEntity:
      description: Semantic validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            code: INTERNAL_ERROR
            message: An unexpected error occurred

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    DIDAuth:
      type: apiKey
      in: header
      name: X-DID-Signature
      description: Ed25519 signature over request body, signed by the caller's DID key

security:
  - BearerAuth: []
  - DIDAuth: []
