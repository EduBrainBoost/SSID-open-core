schema_version: 1.0.0
contract_set_id: sws-artifact-contracts
subsystem: SWS
status: CANONICAL
effective_from_utc: '2026-04-16T00:00:00Z'
depends_on:
- SOCIAL_WORKFLOW_SYSTEM_FOUNDATION_SPEC_v1.0.md
- SWS_V1_BUILD_SPEC_v1.0.md
- sws_shards_registry.json
global_invariants:
- Every canonical artifact is immutable after write; new state is expressed as a new
  artifact version, a new attempt, or an append-only event.
- Every artifact must validate against its schema_file before it can be consumed by
  a downstream shard.
- No downstream shard may infer missing required fields; missing required fields are
  a hard contract failure.
- All timestamps are UTC ISO8601.
- Long-term storage must not retain cleartext third-party source URLs; only hashes
  and derived metadata are allowed.
- PII-bearing artifacts require pii_policy and retention_class annotations.
common_envelope:
  required_fields:
  - schema_version
  - created_at_utc
  - producer_module
  - status
  - output_hash
  job_scoped_required_fields:
  - job_id
  attempt_scoped_required_fields:
  - attempt_id
  library_scoped_required_fields:
  - library_id
  optional_fields:
  - input_refs
  - trace_id
  - notes
  - evidence_refs
  - retention_class
  - pii_flags
path_templates:
  job_root: /jobs/{job_id}/
  attempt_root: /jobs/{job_id}/attempts/{attempt_id}/
  artifacts_root: /jobs/{job_id}/attempts/{attempt_id}/artifacts/
  rebuild_root: /jobs/{job_id}/attempts/{attempt_id}/rebuild/
  qa_root: /jobs/{job_id}/attempts/{attempt_id}/qa/
  publish_root: /jobs/{job_id}/attempts/{attempt_id}/publish/
  policy_root: /library/policies/sws/
  library_root: /library/sws/
  registry_root: /registry/sws/
retention_classes:
  SRC_72H: Delete source media after 72 hours from job completion.
  PII_30D: Delete or redact PII-bearing segments after 30 days.
  ANALYSIS_12M: Retain non-PII analysis artifacts for 12 months.
  JOB_24M: Retain job manifests and operational metadata for 24 months.
  PUBLISH_24M: Retain publish bundles for 24 months.
  PERF_36M: Retain performance signals for 36 months.
  AUDIT_7Y: Retain audit logs for 7 years, append-only.
  BRAND_UNTIL_DELETE: Retain until explicit deletion under governance rules.
  POLICY_ACTIVE: Retain while active plus archival per governance.
  LIBRARY_ACTIVE: Retain while blueprint/registry entry is active.
