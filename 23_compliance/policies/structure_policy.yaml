policy_id: "structure_policy"
description: >
  Root-24-LOCK structure enforcement. Governs the canonical 24-root layout,
  central path requirements, allowed file extensions, naming conventions,
  forbidden root-level items, and exception handling procedures.

# ──────────────────────────────────────────────────────────
# ROOT-24-LOCK RULES
# ──────────────────────────────────────────────────────────
root_24_lock:
  total_required: 24
  immutable: true
  enforcement: "CI gate blocks any PR that adds, removes, or renames a root"
  rules:
    - "Exactly 24 root directories must exist at all times"
    - "No root directory may be renamed"
    - "No root directory may be deleted"
    - "No new root directory may be created"
    - "Root ordering (01-24) is canonical and must not change"

required_roots:
  - "01_ai_layer"
  - "02_audit_logging"
  - "03_core"
  - "04_deployment"
  - "05_documentation"
  - "06_data_pipeline"
  - "07_governance_legal"
  - "08_identity_score"
  - "09_meta_identity"
  - "10_interoperability"
  - "11_test_simulation"
  - "12_tooling"
  - "13_ui_layer"
  - "14_zero_time_auth"
  - "15_infra"
  - "16_codex"
  - "17_observability"
  - "18_data_layer"
  - "19_adapters"
  - "20_foundation"
  - "21_post_quantum_crypto"
  - "22_datasets"
  - "23_compliance"
  - "24_meta_orchestration"

# ──────────────────────────────────────────────────────────
# CENTRAL PATHS ENFORCEMENT
# ──────────────────────────────────────────────────────────
central_paths:
  enforcement: "CI gate verifies existence of all listed paths"
  required:
    - path: "16_codex"
      purpose: "Source of Truth for all system documentation and codex artifacts"
    - path: "23_compliance/policies"
      purpose: "All policy definitions (YAML, Rego)"
    - path: "23_compliance/contracts"
      purpose: "Compliance contracts and rule bindings"
    - path: "23_compliance/validators"
      purpose: "Validation scripts for compliance checks"
    - path: "23_compliance/evidence"
      purpose: "Audit evidence and CI run artifacts"
    - path: "07_governance_legal/policies"
      purpose: "Governance and legal policy artifacts"
    - path: "12_tooling/scripts"
      purpose: "CI/CD and tooling scripts"
    - path: "11_test_simulation/tests_compliance"
      purpose: "Compliance test suite"

# ──────────────────────────────────────────────────────────
# ALLOWED EXTENSIONS
# ──────────────────────────────────────────────────────────
allowed_extensions:
  enforcement: "CI gate rejects files with unlisted extensions"
  code:
    - ".py"
    - ".ts"
    - ".tsx"
    - ".js"
    - ".jsx"
    - ".rs"
    - ".sol"
  config:
    - ".yaml"
    - ".yml"
    - ".json"
    - ".toml"
    - ".env.example"
  policy:
    - ".rego"
    - ".wasm"
  documentation:
    - ".md"
    - ".mdx"
    - ".rst"
  shell:
    - ".sh"
    - ".ps1"
    - ".bash"
  data:
    - ".csv"
    - ".parquet"
  security:
    - ".pem"
    - ".pub"
  other:
    - ".lock"
    - ".txt"
    - ".gitignore"
    - ".gitkeep"
    - ".dockerignore"
    - "Dockerfile"

# ──────────────────────────────────────────────────────────
# NAMING CONVENTIONS
# ──────────────────────────────────────────────────────────
naming_conventions:
  enforcement: "CI linter checks naming on every commit"
  rules:
    - id: "NC_001"
      scope: "directories"
      rule: "All directory names must be lowercase with underscores"
      pattern: "^[a-z0-9][a-z0-9_]*$"
      exceptions: [".claude", ".github", "__pycache__", "node_modules"]
    - id: "NC_002"
      scope: "files"
      rule: "All file names must be lowercase with underscores (except standard files)"
      pattern: "^[a-z0-9][a-z0-9_.]*$"
      exceptions: ["README.md", "CHANGELOG.md", "CONTRIBUTING.md", "LICENSE",
                    "Dockerfile", "Makefile", "CLAUDE.md",
                    "LEGAL_NON_CUSTODIAL_NOTICE.md", "GDPR_DPIA_SUMMARY.md"]
    - id: "NC_003"
      scope: "root_directories"
      rule: "Root directories must follow NN_snake_case pattern"
      pattern: "^[0-9]{2}_[a-z_]+$"
    - id: "NC_004"
      scope: "python_modules"
      rule: "Python modules must use snake_case"
      pattern: "^[a-z_][a-z0-9_]*\\.py$"
    - id: "NC_005"
      scope: "test_files"
      rule: "Test files must be prefixed with test_"
      pattern: "^test_[a-z0-9_]+\\.py$"

# ──────────────────────────────────────────────────────────
# FORBIDDEN ROOT ITEMS
# ──────────────────────────────────────────────────────────
forbidden_root_items:
  enforcement: "CI gate blocks any PR introducing forbidden items at repo root"
  categories:
    - category: "build_artifacts"
      patterns: ["dist/", "build/", "out/", "*.egg-info/"]
      reason: "Build artifacts must not be committed"
    - category: "ide_config"
      patterns: [".vscode/", ".idea/", "*.swp", "*.swo"]
      reason: "IDE configuration is developer-local"
    - category: "environment_files"
      patterns: [".env", ".env.local", ".env.production"]
      reason: "Environment files may contain secrets"
    - category: "credentials"
      patterns: ["*.pem", "*.key", "*.p12", "credentials.*"]
      reason: "Credentials must never be committed"
    - category: "unauthorized_directories"
      patterns: ["src/", "lib/", "app/", "packages/"]
      reason: "All code must reside within the 24 canonical roots"
    - category: "temporary_files"
      patterns: ["*.tmp", "*.bak", "*.orig", "*.log"]
      reason: "Temporary files must not be committed"

# ──────────────────────────────────────────────────────────
# EXCEPTION HANDLING
# ──────────────────────────────────────────────────────────
exception_handling:
  exceptions_file: "23_compliance/exceptions/structure_exceptions.yaml"
  root_level_exceptions_file: "23_compliance/exceptions/root_level_exceptions.yaml"
  rules:
    - "All exceptions must be documented in the exceptions file"
    - "Permanent exceptions require L0 (system architect) approval"
    - "Temporary exceptions must include an expiry_date field"
    - "Expired temporary exceptions are auto-revoked by CI gate"
    - "No exception may violate ROOT-24-LOCK (root count must remain 24)"
    - "Exception requests follow RFC process via 07_governance_legal"
  approval_levels:
    L0: "System Architect - permanent exceptions, root-level changes"
    L1: "Module Owner - temporary exceptions within owned root"
    auto: "CI system - transient artifacts (.pyc, __pycache__)"

root_level:
  exceptions_file: "23_compliance/exceptions/root_level_exceptions.yaml"
  forbid_additional_items: true
  forbid_symlinks: true
