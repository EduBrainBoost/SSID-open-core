# SSID Jurisdiction Blacklist
# SoT v4.1.0 | ROOT-24-LOCK | Module: 23_compliance
#
# Defines jurisdictions subject to comprehensive sanctions, regional
# sanctions, or elevated risk classification. The SSID system enforces
# these restrictions at credential issuance, verification, and
# onboarding gates.
#
# Enforcement mode: DENY (hard block, no override without RFC + legal approval)

version: "1.0.0"
last_updated: "2026-03-28"
review_cycle: "quarterly"
enforcement_mode: "deny"

# ---------------------------------------------------------------------------
# Comprehensively Sanctioned Jurisdictions
# ---------------------------------------------------------------------------
# Full embargo: No SSID services, credential issuance, verification, or
# onboarding is permitted for entities domiciled in or controlled by
# entities in these jurisdictions.

blacklisted:
  - code: "IR"
    name: "Iran (Islamic Republic of)"
    iso_3166_alpha3: "IRN"
    sanction_basis:
      - source: "OFAC"
        program: "Iran Sanctions"
        reference: "Executive Order 13846"
      - source: "EU"
        program: "EU Iran Sanctions"
        reference: "Council Regulation (EU) No 267/2012"
      - source: "UN"
        program: "UNSCR Iran"
        reference: "UN Security Council Resolution 2231 (2015)"
    effective_since: "2010-07-01"
    enforcement: "full_embargo"

  - code: "KP"
    name: "North Korea (Democratic People's Republic of Korea)"
    iso_3166_alpha3: "PRK"
    sanction_basis:
      - source: "OFAC"
        program: "North Korea Sanctions"
        reference: "Executive Order 13810"
      - source: "EU"
        program: "EU DPRK Sanctions"
        reference: "Council Decision (CFSP) 2016/849"
      - source: "UN"
        program: "UNSCR DPRK"
        reference: "UN Security Council Resolution 2397 (2017)"
    effective_since: "2008-06-26"
    enforcement: "full_embargo"

  - code: "SY"
    name: "Syria (Syrian Arab Republic)"
    iso_3166_alpha3: "SYR"
    sanction_basis:
      - source: "OFAC"
        program: "Syria Sanctions"
        reference: "Executive Order 13894"
      - source: "EU"
        program: "EU Syria Sanctions"
        reference: "Council Regulation (EU) No 36/2012"
    effective_since: "2011-08-18"
    enforcement: "full_embargo"

  - code: "CU"
    name: "Cuba"
    iso_3166_alpha3: "CUB"
    sanction_basis:
      - source: "OFAC"
        program: "Cuba Sanctions"
        reference: "Cuban Assets Control Regulations, 31 CFR Part 515"
    effective_since: "1962-02-07"
    enforcement: "full_embargo"

# ---------------------------------------------------------------------------
# Sanctioned Regions (Sub-National)
# ---------------------------------------------------------------------------
# Specific regions within countries that are subject to targeted sanctions.
# The country itself is not fully embargoed, but operations involving
# these specific regions are prohibited.

sanctioned_regions:
  - code: "RU_CRIMEA"
    name: "Crimea Region (Ukraine, occupied)"
    parent_country: "UA"
    controlling_entity: "RU"
    sanction_basis:
      - source: "OFAC"
        program: "Ukraine/Russia-Related Sanctions"
        reference: "Executive Order 13685"
      - source: "EU"
        program: "EU Crimea Sanctions"
        reference: "Council Regulation (EU) No 692/2014"
    effective_since: "2014-12-19"
    enforcement: "full_embargo"

  - code: "RU_DNR"
    name: "Donetsk People's Republic (Ukraine, occupied)"
    parent_country: "UA"
    controlling_entity: "RU"
    sanction_basis:
      - source: "OFAC"
        program: "Ukraine/Russia-Related Sanctions"
        reference: "Executive Order 14065"
      - source: "EU"
        program: "EU Donetsk/Luhansk Sanctions"
        reference: "Council Decision (CFSP) 2022/266"
    effective_since: "2022-02-21"
    enforcement: "full_embargo"

  - code: "RU_LNR"
    name: "Luhansk People's Republic (Ukraine, occupied)"
    parent_country: "UA"
    controlling_entity: "RU"
    sanction_basis:
      - source: "OFAC"
        program: "Ukraine/Russia-Related Sanctions"
        reference: "Executive Order 14065"
      - source: "EU"
        program: "EU Donetsk/Luhansk Sanctions"
        reference: "Council Decision (CFSP) 2022/266"
    effective_since: "2022-02-21"
    enforcement: "full_embargo"

# ---------------------------------------------------------------------------
# High-Risk Jurisdictions
# ---------------------------------------------------------------------------
# Not fully embargoed, but subject to enhanced due diligence (EDD),
# elevated monitoring, and restricted credential types. Credential
# issuance for financial and identity credential categories requires
# additional compliance review.

high_risk:
  - code: "AF"
    name: "Afghanistan"
    iso_3166_alpha3: "AFG"
    risk_factors:
      - "FATF high-risk jurisdiction"
      - "Sectoral sanctions (Taliban-controlled entities)"
      - "Limited AML/CFT framework"
    sanction_basis:
      - source: "OFAC"
        program: "Afghanistan-Related Sanctions"
        reference: "Executive Order 14064"
      - source: "UN"
        program: "UNSCR Taliban Sanctions"
        reference: "UN Security Council Resolution 2615 (2021)"
    enforcement: "enhanced_due_diligence"
    restricted_credential_categories:
      - "financial"
      - "identity"

  - code: "BY"
    name: "Belarus"
    iso_3166_alpha3: "BLR"
    risk_factors:
      - "EU sectoral sanctions"
      - "Association with sanctioned regime"
      - "Restricted financial sector access"
    sanction_basis:
      - source: "EU"
        program: "EU Belarus Sanctions"
        reference: "Council Regulation (EU) 2006/765"
      - source: "OFAC"
        program: "Belarus Sanctions"
        reference: "Executive Order 14038"
    enforcement: "enhanced_due_diligence"
    restricted_credential_categories:
      - "financial"

  - code: "MM"
    name: "Myanmar (Burma)"
    iso_3166_alpha3: "MMR"
    risk_factors:
      - "FATF high-risk jurisdiction"
      - "Military regime sanctions"
      - "Strategic deficiencies in AML/CFT"
    sanction_basis:
      - source: "OFAC"
        program: "Burma Sanctions"
        reference: "Executive Order 14014"
      - source: "EU"
        program: "EU Myanmar Sanctions"
        reference: "Council Regulation (EU) 2013/401"
    enforcement: "enhanced_due_diligence"
    restricted_credential_categories:
      - "financial"
      - "identity"

  - code: "RU"
    name: "Russia (Russian Federation)"
    iso_3166_alpha3: "RUS"
    risk_factors:
      - "Comprehensive sectoral sanctions"
      - "SWIFT exclusions for major banks"
      - "Export controls"
      - "Oligarch and state entity designations"
    sanction_basis:
      - source: "OFAC"
        program: "Russia/Ukraine-Related Sanctions"
        reference: "Executive Order 14024"
      - source: "EU"
        program: "EU Russia Sanctions"
        reference: "Council Regulation (EU) No 833/2014 (amended)"
    enforcement: "enhanced_due_diligence"
    restricted_credential_categories:
      - "financial"
    note: "Sub-regions RU_CRIMEA, RU_DNR, RU_LNR are fully embargoed (see sanctioned_regions)"

  - code: "VE"
    name: "Venezuela"
    iso_3166_alpha3: "VEN"
    risk_factors:
      - "Sectoral sanctions (oil, gold, financial)"
      - "Government entity designations"
      - "Cryptocurrency evasion concerns"
    sanction_basis:
      - source: "OFAC"
        program: "Venezuela Sanctions"
        reference: "Executive Order 13884"
    enforcement: "enhanced_due_diligence"
    restricted_credential_categories:
      - "financial"

  - code: "YE"
    name: "Yemen"
    iso_3166_alpha3: "YEM"
    risk_factors:
      - "Houthi-related designations"
      - "Conflict zone"
      - "Limited AML/CFT infrastructure"
    sanction_basis:
      - source: "OFAC"
        program: "Yemen-Related Sanctions"
        reference: "Executive Order 13611"
      - source: "UN"
        program: "UNSCR Yemen Sanctions"
        reference: "UN Security Council Resolution 2216 (2015)"
    enforcement: "enhanced_due_diligence"
    restricted_credential_categories:
      - "financial"
      - "identity"

  - code: "ZW"
    name: "Zimbabwe"
    iso_3166_alpha3: "ZWE"
    risk_factors:
      - "Targeted sanctions on entities and individuals"
      - "Governance concerns"
    sanction_basis:
      - source: "OFAC"
        program: "Zimbabwe Sanctions"
        reference: "Executive Order 13469"
    enforcement: "enhanced_due_diligence"
    restricted_credential_categories:
      - "financial"

# ---------------------------------------------------------------------------
# Project-Restricted Jurisdictions (SSID Project Rule)
# ---------------------------------------------------------------------------
# NOT internationally sanctioned (not OFAC/EU/UN blocked). These jurisdictions
# are restricted per SSID project governance rules due to elevated regulatory
# complexity, data-protection concerns, or project-specific risk assessment.
# Enforcement: enhanced_due_diligence — all credential operations require
# additional compliance review. This is an SSID-internal policy decision,
# distinct from international sanctions lists.

project_restricted:
  - code: "IN"
    name: "India"
    iso_3166_alpha3: "IND"
    risk_factors:
      - "SSID project rule: elevated regulatory complexity"
      - "Complex KYC/AML regulatory landscape"
      - "Data localization requirements (RBI, DPDP Act)"
    restriction_basis:
      - source: "SSID_PROJECT_RULE"
        reference: "SSID Governance Decision — Jurisdiction Restriction Policy"
        note: "Not an international sanction. SSID-internal project policy."
    enforcement: "enhanced_due_diligence"
    restricted_credential_categories:
      - "financial"
      - "identity"

  - code: "PK"
    name: "Pakistan"
    iso_3166_alpha3: "PAK"
    risk_factors:
      - "SSID project rule: elevated regulatory complexity"
      - "FATF grey list history (monitoring jurisdiction)"
      - "Complex foreign exchange and AML regulations"
    restriction_basis:
      - source: "SSID_PROJECT_RULE"
        reference: "SSID Governance Decision — Jurisdiction Restriction Policy"
        note: "Not an international sanction. SSID-internal project policy."
    enforcement: "enhanced_due_diligence"
    restricted_credential_categories:
      - "financial"
      - "identity"

# ---------------------------------------------------------------------------
# Source References
# ---------------------------------------------------------------------------
sources:
  OFAC:
    full_name: "Office of Foreign Assets Control (U.S. Department of the Treasury)"
    url: "https://ofac.treasury.gov/sanctions-programs-and-country-information"
    update_frequency: "continuous"
    api_available: true

  EU:
    full_name: "European Union Consolidated Sanctions List"
    url: "https://data.europa.eu/data/datasets/consolidated-list-of-persons-groups-and-entities-subject-to-eu-financial-sanctions"
    update_frequency: "continuous"
    api_available: true

  UN:
    full_name: "United Nations Security Council Consolidated List"
    url: "https://www.un.org/securitycouncil/sanctions/information"
    update_frequency: "as_adopted"
    api_available: true

  FATF:
    full_name: "Financial Action Task Force"
    url: "https://www.fatf-gafi.org/en/countries/black-and-grey-lists.html"
    update_frequency: "triannual"
    api_available: false
    note: "FATF grey/black list updates inform high_risk classifications"

# ---------------------------------------------------------------------------
# Enforcement Rules
# ---------------------------------------------------------------------------
enforcement_rules:
  blacklisted:
    action: "deny"
    credential_issuance: "blocked"
    credential_verification: "blocked"
    onboarding: "blocked"
    override: "requires_rfc_and_legal_counsel"

  sanctioned_regions:
    action: "deny"
    credential_issuance: "blocked"
    credential_verification: "blocked"
    onboarding: "blocked"
    override: "requires_rfc_and_legal_counsel"
    detection_method: "ip_geolocation_and_document_analysis"

  high_risk:
    action: "enhanced_due_diligence"
    credential_issuance: "restricted_categories_blocked"
    credential_verification: "allowed_with_edd"
    onboarding: "allowed_with_edd"
    override: "compliance_officer_approval"
    additional_requirements:
      - "manual_identity_verification"
      - "source_of_funds_documentation"
      - "ongoing_monitoring"
      - "quarterly_review"

  project_restricted:
    action: "enhanced_due_diligence"
    credential_issuance: "restricted_categories_blocked"
    credential_verification: "allowed_with_edd"
    onboarding: "allowed_with_edd"
    override: "compliance_officer_approval"
    note: "SSID project rule — NOT international sanctions. Distinct from high_risk (FATF/sanctions-based)."
    additional_requirements:
      - "manual_identity_verification"
      - "source_of_funds_documentation"
      - "ongoing_monitoring"
      - "quarterly_review"
      - "project_governance_sign_off"

