schema_version: "1.0.0"
title: "SSID Deprecation Strategy"
description: "Rules for deprecating modules, APIs, policies, and provider integrations"
stages:
  - stage: "announced"
    description: "Deprecation announced, alternative documented"
    min_notice_days: 90
  - stage: "soft_deprecated"  
    description: "Warnings emitted, functionality still available"
    min_duration_days: 60
  - stage: "hard_deprecated"
    description: "Functionality removed, only evidence/archive remains"
rules:
  - "No removal without announced + soft_deprecated stages completed"
  - "All deprecated items must have replacement documented"
  - "Evidence of deprecation decision must be in 02_audit_logging/reports/"
  - "Registry entries updated to status: deprecated with sunset_date"
