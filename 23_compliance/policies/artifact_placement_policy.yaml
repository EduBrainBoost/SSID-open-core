schema_version: "1.0.0"
policy_id: "SSID-APP-001"
name: "Artifact Placement Policy"
description: "Defines which artifact types may exist in which locations"
rules:
  registry_artifacts:
    allowed: ["24_meta_orchestration/registry/"]
    forbidden_in_modules: true
  policy_artifacts:
    allowed: ["23_compliance/policies/"]
    forbidden_in_modules: true
  exception_artifacts:
    allowed: ["23_compliance/exceptions/"]
    forbidden_in_modules: true
  evidence_artifacts:
    allowed: ["23_compliance/evidence/", "02_audit_logging/evidence/"]
    forbidden_in_modules: true
  risk_artifacts:
    allowed: ["07_governance_legal/risk/"]
    forbidden_in_modules: true
  ci_workflows:
    allowed: [".github/workflows/", "24_meta_orchestration/triggers/ci/"]
  hooks:
    allowed: ["12_tooling/hooks/"]
  worm_storage:
    allowed: ["02_audit_logging/storage/worm/immutable_store/"]
  tests:
    allowed: ["11_test_simulation/"]
  scripts:
    allowed: ["12_tooling/scripts/"]
    note: "Not for canonical central registry artifacts"
