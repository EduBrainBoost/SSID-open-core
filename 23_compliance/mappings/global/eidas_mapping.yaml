ssid_context: >
  SSID provides decentralized identity infrastructure that must interoperate
  with the European Digital Identity (EUDI) Wallet ecosystem. eIDAS 2.0
  mandates Member States to offer EUDI Wallets by November 2026. SSID
  positions as a complementary identity layer using OpenID4VC and
  Verifiable Credentials that can bridge into the EUDI ecosystem.

non_custodial_note: >
  eIDAS 2.0 expects wallet providers and trust service providers to
  manage identity attributes. SSID's non-custodial model requires
  careful positioning — SSID is NOT a QTSP but an interoperability layer.

