ssid_context: >
  SSID is non-custodial, hash-only identity infrastructure.
  No raw PII is stored — only SHA3-256 hashes. This fundamentally
  reduces GDPR scope but does not eliminate it. Hash-based processing
  still constitutes personal data processing under GDPR recital 26
  if re-identification is feasible.

non_custodial_note: >
  SSID never holds custody of user data. Users control their own keys.
  Only hashed representations (SHA3-256) are stored on-chain/off-chain.
  This minimizes but does not eliminate GDPR obligations.

