ssid_context: >
  SSID 01_ai_layer implements AI components for identity scoring,
  bias detection, anomaly detection, and decision support. These AI
  systems interact with identity verification, financial risk assessment,
  and access control. Identity scoring may trigger high-risk classification
  under Annex III Category 1 (biometric identification) or Category 7
  (creditworthiness assessment/access to essential services).

non_custodial_note: >
  Non-custodial architecture means AI models operate on hashed data only.
  No raw biometric or PII data is processed by SSID AI systems. This
  reduces but does not eliminate AI Act obligations for high-risk systems.

