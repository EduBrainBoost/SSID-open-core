ssid_context: >
  DORA establishes ICT risk management requirements for financial entities
  and their critical third-party ICT service providers. SSID may qualify
  as a critical third-party ICT provider if financial institutions rely
  on it for identity verification. DORA applies directly since Jan 2025.

non_custodial_note: >
  Non-custodial architecture reduces DORA scope but does not eliminate it.
  If SSID is designated as a critical ICT third-party provider by ESAs,
  direct oversight provisions (Chapter V, Section II) would apply.

