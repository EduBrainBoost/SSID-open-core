# NIS2 — Network and Information Security Directive 2
# Directive (EU) 2022/2555
# Transposition deadline: 17 October 2024
# SSID Compliance Mapping
#
# SAFE-FIX: No PII, no secrets. Pure regulatory mapping.
# Generated: 2026-03-29

regulation:
  id: NIS2
  full_name: "Directive on measures for a high common level of cybersecurity across the Union"
  reference: "Directive (EU) 2022/2555"
  transposition_deadline: "2024-10-17"
  scope: >
    Applies to essential and important entities across critical sectors
    (energy, transport, banking, health, digital infrastructure, ICT
    service management, public administration) and important sectors
    (postal, waste, chemicals, food, manufacturing, digital providers,
    research). Replaces the original NIS Directive.
  ssid_applicability: >
    SSID is NOT a critical infrastructure operator and is unlikely to
    be classified as an essential entity under NIS2 Annex I. However,
    SSID may qualify as an "important entity" under Annex II if it
    provides digital identity services at scale (Sector: Digital
    Infrastructure / Trust Service Providers). Additionally, SSID's
    financial entity clients subject to NIS2 may impose NIS2-derived
    security requirements contractually. Applicability is LIMITED but
    non-zero — primarily through supply chain obligations (Art. 21(2)(d))
    and potential trust service provider classification.

coverage_level: partial

applicability_assessment:
  essential_entity: false
  important_entity: possible
  classification_rationale: >
    Annex II Sector 8 (Digital Providers) includes trust service providers
    and managed security service providers. If SSID provides qualified
    trust services under eIDAS2, NIS2 essential entity classification
    applies automatically (Art. 3(1)(f)). Current assessment: SSID does
    not yet hold qualified trust service provider status, so classification
    as important entity is more likely.
  supply_chain_relevance: high
  supply_chain_rationale: >
    NIS2 Art. 21(2)(d) requires essential and important entities to address
    supply chain security. Financial entities using SSID for identity
    services must assess SSID's cybersecurity posture under NIS2 supply
    chain provisions.

key_articles:

  - article: "Art. 21 — Cybersecurity Risk-Management Measures"
    description: >
      Essential and important entities must adopt appropriate and
      proportionate technical, operational, and organisational measures
      to manage cybersecurity risks. Minimum measures include:
      (a) risk analysis and information system security policies,
      (b) incident handling,
      (c) business continuity and crisis management,
      (d) supply chain security,
      (e) security in network and information systems acquisition,
      (f) vulnerability handling and disclosure,
      (g) cybersecurity assessment practices,
      (h) cryptography and encryption,
      (i) human resources security and access control,
      (j) multi-factor authentication and secure communication.
    ssid_relevance: high
    ssid_assessment: >
      Even with limited direct applicability, SSID should align to
      Art. 21 measures as baseline cybersecurity hygiene and to meet
      client supply chain requirements. Most measures already map to
      existing SSID roots.
    coverage: partial
    gaps:
      - "Formal NIS2-aligned risk analysis policy document"
      - "Coordinated vulnerability disclosure process (Art. 21(2)(f))"
    ssid_root_mapping:
      - root: 15_infra
        rationale: "Network and information system security (Art. 21(2)(a)(e))"
      - root: 03_core
        rationale: "Access control and authentication (Art. 21(2)(i)(j))"
      - root: 21_post_quantum_crypto
        rationale: "Cryptography and encryption (Art. 21(2)(h))"
      - root: 14_zero_time_auth
        rationale: "Multi-factor authentication (Art. 21(2)(j))"
      - root: 19_adapters
        rationale: "Supply chain security for integrations (Art. 21(2)(d))"
      - root: 17_observability
        rationale: "Cybersecurity assessment and monitoring (Art. 21(2)(g))"

  - article: "Art. 23 — Reporting Obligations"
    description: >
      Significant incidents must be reported: early warning within 24 hours,
      incident notification within 72 hours, and final report within 1 month.
      Applies to incidents with significant impact on service provision.
    ssid_relevance: medium
    ssid_assessment: >
      Directly applicable only if SSID is classified as essential or
      important entity. Indirectly relevant as clients may require SSID
      to support their incident reporting timelines.
    coverage: partial
    gaps:
      - "NIS2-specific incident severity classification"
      - "24-hour early warning notification capability"
    ssid_root_mapping:
      - root: 02_audit_logging
        rationale: "Incident detection, classification, and evidence"
      - root: 17_observability
        rationale: "Significant incident detection and alerting"
      - root: 24_meta_orchestration
        rationale: "Cross-system incident response coordination"

  - article: "Art. 21(2)(d) — Supply Chain Security"
    description: >
      Entities must address security of supply chains and relationships
      with direct suppliers and service providers, including vulnerability
      assessment of each supplier.
    ssid_relevance: high
    ssid_assessment: >
      SSID is in the supply chain of financial entities. Those entities
      must assess SSID's security posture. SSID must be able to
      demonstrate compliance and provide security assurance to clients.
    coverage: partial
    gaps:
      - "Supply chain security attestation for clients"
      - "Third-party security assessment documentation"
    ssid_root_mapping:
      - root: 19_adapters
        rationale: "Third-party integrations and dependency management"
      - root: 07_governance_legal
        rationale: "Security assurance documentation for clients"
      - root: 23_compliance
        rationale: "Compliance attestation and evidence"

  - article: "Art. 24-25 — Use of European Cybersecurity Certification Schemes"
    description: >
      Member States may require essential and important entities to use
      certified ICT products, services, and processes under EU cybersecurity
      certification schemes.
    ssid_relevance: low
    ssid_assessment: >
      Relevant only if SSID seeks EU cybersecurity certification (e.g.,
      EUCC) for its identity services. Not mandatory unless required
      by Member State implementing legislation.
    coverage: not_applicable
    gaps: []
    ssid_root_mapping:
      - root: 23_compliance
        rationale: "Certification tracking if pursued"

  - article: "Art. 32-33 — Supervisory and Enforcement Measures"
    description: >
      Administrative fines up to EUR 10M or 2% of worldwide turnover
      for essential entities, EUR 7M or 1.4% for important entities.
    ssid_relevance: low
    ssid_assessment: >
      Enforcement risk is limited given SSID's likely classification
      as important entity at most. Indirect risk through client
      contractual obligations is more significant.
    coverage: not_applicable
    gaps: []
    ssid_root_mapping:
      - root: 07_governance_legal
        rationale: "Legal risk assessment and enforcement preparedness"

