eu_regulatorik:
  version: "2.1.0"
  description: >
    Mapping of SSID platform controls to EU regulatory requirements.
    Consolidates MiCA, GDPR, AML6/AMLR, eIDAS2, EU AI Act, DORA,
    NIS2, Data Act, and PSD2/PSD3 control mappings.

mappings:
  - regulation: MiCA
    ssid_controls:
      - control: non_custodial_architecture
        requirement: Art. 67 CASP obligations
        coverage: full
        notes: Non-custodial design eliminates custody risk
      - control: audit_trail_chain
        requirement: Art. 68 record-keeping
        coverage: full
      - control: kyc_provider_registry
        requirement: Art. 72 AML integration
        coverage: full

  - regulation: GDPR
    ssid_controls:
      - control: hash_only_no_pii
        requirement: Art. 5(1)(c) data minimisation
        coverage: exceeds
      - control: data_portability_api
        requirement: Art. 20 right to data portability
        coverage: full
      - control: consent_management
        requirement: Art. 6-7 lawful basis / consent
        coverage: full
      - control: dpia_process
        requirement: Art. 35 DPIA
        coverage: full

  - regulation: AML6_AMLR
    ssid_controls:
      - control: kyc_verification_flow
        requirement: CDD requirements
        coverage: full
      - control: sanctions_screening
        requirement: Sanctions compliance
        coverage: full
      - control: travel_rule_ivms101
        requirement: Wire transfer regulation
        coverage: full
      - control: suspicious_activity_detection
        requirement: SAR obligations
        coverage: full

  - regulation: eIDAS2
    ssid_controls:
      - control: did_credential_system
        requirement: Electronic attestation of attributes
        coverage: partial
        notes: Full coverage pending EUDI wallet specifications
      - control: post_quantum_signatures
        requirement: Future cryptographic requirements
        coverage: future_ready

  - regulation: EU_AI_Act
    ssid_controls:
      - control: ai_risk_classification
        requirement: Art. 6 risk classification
        coverage: full
        classification: limited_risk
      - control: bias_audit_quarterly
        requirement: Art. 9 risk management
        coverage: full
      - control: model_transparency
        requirement: Art. 13 transparency
        coverage: full
      - control: human_oversight
        requirement: Art. 14 human oversight
        coverage: full

  - regulation: DORA
    ssid_controls:
      - control: ict_risk_framework
        requirement: Art. 5-16 ICT risk management
        coverage: full
      - control: incident_response
        requirement: Art. 17-23 incident reporting
        coverage: full
      - control: resilience_testing
        requirement: Art. 24-27 digital resilience testing
        coverage: full

  - regulation: NIS2
    ssid_controls:
      - control: cybersecurity_framework
        requirement: Art. 21 cybersecurity measures
        coverage: full
      - control: incident_reporting_24h
        requirement: Art. 23 incident notification
        coverage: full

  - regulation: PSD2_PSD3
    ssid_controls:
      - control: strong_customer_authentication
        requirement: SCA requirements
        coverage: full
      - control: open_banking_api
        requirement: API access requirements
        coverage: partial

  - regulation: Data_Act
    ssid_controls:
      - control: data_portability_api
        requirement: Data sharing and portability
        coverage: full
      - control: interoperability_standards
        requirement: Interoperability requirements
        coverage: full

gap_analysis:
  total_controls_mapped: 28
  full_coverage: 23
  partial_coverage: 3
  future_ready: 1
  not_applicable: 1
