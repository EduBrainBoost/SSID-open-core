ssid_context: >
  OECD CARF establishes automatic exchange of information on crypto-asset
  transactions between tax authorities. EU DAC8 implements CARF within
  the EU. Reporting Crypto-Asset Service Providers (RCASPs) must report
  user identity and transaction data. SSID is NOT an RCASP but provides
  identity infrastructure that RCASPs may use for user identification.

non_custodial_note: >
  SSID does not custody crypto-assets, does not execute transactions,
  and does not qualify as an RCASP. SSID's role is limited to providing
  hash-based identity attestation that RCASPs can use to identify
  users for CARF/DAC8 reporting purposes.

