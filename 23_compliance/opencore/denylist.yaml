# SSID Open-Core Denylist
# Defines the 19 denied roots and their denial reasons.
# Generated: 2026-03-29
# Authority: ROOT-24-LOCK + Open-Core Policy

schema_version: "1.0.0"

# Default policy: DENY everything not explicitly allowed
default_policy: DENY

denied_roots:
  01_ai_layer:
    reason: "IP"
    description: "Proprietary AI/ML models, scoring algorithms, bias metrics"
    risk: "CRITICAL"
    contains_ip: true
    contains_pii_risk: true

  02_audit_logging:
    reason: "WORM"
    description: "WORM-sealed audit evidence, internal compliance logs, incident reports"
    risk: "CRITICAL"
    contains_worm: true
    contains_evidence: true

  04_deployment:
    reason: "INFRA"
    description: "Internal deployment configs, Kubernetes manifests, infrastructure secrets references"
    risk: "HIGH"
    contains_infra_refs: true

  05_documentation:
    reason: "IP"
    description: "Internal architecture documentation, proprietary design decisions, ADRs"
    risk: "MEDIUM"
    contains_ip: true

  06_data_pipeline:
    reason: "IP"
    description: "Proprietary data processing pipelines, ETL logic, data transformation rules"
    risk: "HIGH"
    contains_ip: true
    contains_data_schemas: true

  07_governance_legal:
    reason: "NDA"
    description: "Legal agreements, NDA templates, governance frameworks with partner references"
    risk: "CRITICAL"
    contains_nda: true
    contains_legal: true

  08_identity_score:
    reason: "IP"
    description: "Proprietary identity scoring algorithms, weight matrices, calibration data"
    risk: "CRITICAL"
    contains_ip: true
    contains_scoring_logic: true

  09_meta_identity:
    reason: "IP"
    description: "Meta-identity resolution logic, cross-reference algorithms"
    risk: "CRITICAL"
    contains_ip: true

  10_interoperability:
    reason: "IP"
    description: "Proprietary integration adapters, partner API contracts"
    risk: "HIGH"
    contains_ip: true
    contains_partner_refs: true

  11_test_simulation:
    reason: "IP"
    description: "Internal test infrastructure, simulation data, attack vectors"
    risk: "HIGH"
    contains_ip: true
    contains_test_vectors: true

  13_ui_layer:
    reason: "IP"
    description: "Proprietary UI components, internal dashboard logic"
    risk: "MEDIUM"
    contains_ip: true

  14_zero_time_auth:
    reason: "IP"
    description: "Proprietary zero-time authentication protocol, session handling"
    risk: "CRITICAL"
    contains_ip: true
    contains_auth_logic: true

  15_infra:
    reason: "INFRA"
    description: "Infrastructure definitions, cloud provider configs, network topology"
    risk: "HIGH"
    contains_infra_refs: true
    contains_cloud_config: true

  17_observability:
    reason: "INFRA"
    description: "Internal monitoring, alerting rules, SLO definitions"
    risk: "MEDIUM"
    contains_infra_refs: true

  18_data_layer:
    reason: "IP"
    description: "Proprietary data models, schema migrations, storage logic"
    risk: "HIGH"
    contains_ip: true
    contains_data_schemas: true

  19_adapters:
    reason: "IP"
    description: "Proprietary protocol adapters, vendor-specific integrations"
    risk: "HIGH"
    contains_ip: true
    contains_partner_refs: true

  20_foundation:
    reason: "IP"
    description: "Foundation libraries, core primitives, shared internal utilities"
    risk: "HIGH"
    contains_ip: true

  21_post_quantum_crypto:
    reason: "IP"
    description: "Post-quantum cryptographic implementations, Kyber/Dilithium specifics"
    risk: "CRITICAL"
    contains_ip: true
    contains_crypto: true

  22_datasets:
    reason: "NDA"
    description: "Proprietary datasets, training data, calibration sets"
    risk: "CRITICAL"
    contains_ip: true
    contains_data: true

# Deny reasons legend
deny_reasons:
  IP: "Intellectual Property - proprietary algorithms and logic"
  WORM: "Write-Once-Read-Many sealed evidence and audit trails"
  NDA: "Non-Disclosure Agreement protected content"
  INFRA: "Internal infrastructure configuration and secrets references"

# Additional deny patterns (apply globally)
global_deny_patterns:
  - path: "**/.ssid-system/**"
    reason: "Internal session and lock management"
  - path: "**/evidence/**"
    reason: "WORM-sealed audit evidence"
  - path: "**/quarantine/**"
    reason: "Quarantined files under review"
  - path: "**/worm/**"
    reason: "Immutable audit records"
  - path: "**/*secret*"
    reason: "Potential credentials or secrets"
  - path: "**/*credential*"
    reason: "Credential references"
  - path: "**/*.pem"
    reason: "Certificate/key material"
  - path: "**/*.key"
    reason: "Private key material"
