financial_security:
  version: "1.1.0"
  description: >
    Financial security controls for SSID platform.
    Defines security requirements for fee processing, treasury management,
    smart contract interactions, and financial data integrity.

transaction_security:
  authentication:
    methods:
      - mtls
      - jwt_with_did_session
    multi_factor: required_for_treasury_operations
    session_timeout_minutes: 15
    max_concurrent_sessions: 3

  authorization:
    model: role_based_with_attribute_constraints
    fee_operations:
      - role: fee_processor
        permissions: [read_fee_schedule, process_fee]
        constraints: [within_daily_limit]
      - role: treasury_admin
        permissions: [read_treasury, propose_allocation]
        constraints: [requires_dual_approval]
      - role: auditor
        permissions: [read_all_financial_logs]
        constraints: [read_only]

smart_contract_security:
  audit_requirements:
    pre_deployment_audit: mandatory
    auditor_qualification: certified_smart_contract_auditor
    re_audit_triggers:
      - logic_change
      - dependency_update
      - vulnerability_disclosure
  deployment_controls:
    multi_sig_required: true
    min_signers: 3
    timelock_hours: 48
    emergency_pause: enabled
  monitoring:
    transaction_anomaly_detection: enabled
    reentrancy_guard: enabled
    overflow_protection: enabled

fee_processing:
  platform_fee_basis_points: 300
  max_single_transaction_eur: 100000
  daily_volume_limit_eur: 1000000
  settlement_delay_hours: 24
  reconciliation_frequency: daily
  discrepancy_threshold_eur: 0.01
  discrepancy_action: auto_flag_and_quarantine

treasury_controls:
  multi_sig_wallet: true
  cold_storage_percent: 80
  hot_wallet_max_eur: 50000
  rebalancing_frequency: weekly
  access_logging: all_operations
  insurance_coverage: true

encryption:
  financial_data_at_rest: AES-256-GCM
  financial_data_in_transit: TLS-1.3
  key_management: vault_managed
  key_rotation_days: 90
  post_quantum_readiness: hybrid_mode

incident_response:
  financial_incident_classification:
    - severity: critical
      examples: [unauthorized_transfer, smart_contract_exploit]
      response_time_minutes: 15
      auto_pause: true
    - severity: high
      examples: [reconciliation_discrepancy, unusual_volume]
      response_time_minutes: 60
      auto_pause: false
    - severity: medium
      examples: [fee_calculation_error, delayed_settlement]
      response_time_hours: 4

compliance:
  pci_dss_applicable: false
  soc2_type2: aligned
  dora_compliant: true
  regular_penetration_testing: quarterly
