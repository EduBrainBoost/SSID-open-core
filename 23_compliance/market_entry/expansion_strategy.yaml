expansion_strategy:
  version: "1.0.0"
  description: >
    SSID market entry and expansion strategy.
    Defines phased geographic rollout, regulatory prerequisites,
    and go/no-go criteria for each target market.

phases:
  - phase: 1
    name: Core EU Markets
    target_date: "2026-Q2"
    status: active
    markets:
      - country: DE
        priority: primary
        prerequisites:
          - bafin_casp_authorization
          - gdpr_compliance_verified
          - local_legal_entity
        go_criteria:
          - licence_approved
          - kyc_provider_integrated
          - local_support_team
      - country: FR
        priority: primary
        prerequisites:
          - amf_dasp_registration
          - gdpr_compliance_verified
      - country: NL
        priority: primary
        prerequisites:
          - dnb_registration
          - gdpr_compliance_verified

  - phase: 2
    name: DACH + Nordics
    target_date: "2026-Q4"
    status: planned
    markets:
      - country: AT
        priority: secondary
        prerequisites: [fma_authorization, gdpr_compliance]
      - country: CH
        priority: primary
        prerequisites: [finma_licence, fadp_compliance]
      - country: LI
        priority: secondary
        prerequisites: [fma_tvtg_registration]
      - country: SE
        priority: secondary
        prerequisites: [fi_authorization]
      - country: DK
        priority: secondary
        prerequisites: [dfsa_registration]

  - phase: 3
    name: UK + Singapore
    target_date: "2027-Q2"
    status: planned
    markets:
      - country: GB
        priority: primary
        prerequisites: [fca_registration, uk_gdpr_compliance]
      - country: SG
        priority: primary
        prerequisites: [mas_mpi_licence, pdpa_compliance]

  - phase: 4
    name: Americas + APAC Expansion
    target_date: "2027-Q4"
    status: assessment
    markets:
      - country: US
        priority: primary
        prerequisites: [state_mtl_licenses, fincen_msb, legal_review]
      - country: CA
        priority: secondary
        prerequisites: [fintrac_registration, pipeda_compliance]
      - country: JP
        priority: secondary
        prerequisites: [fsa_registration, appi_compliance]
      - country: AU
        priority: secondary
        prerequisites: [austrac_dce_registration]

go_no_go_criteria:
  mandatory:
    - regulatory_licence_obtained
    - kyc_provider_available
    - legal_opinion_positive
    - data_residency_resolved
    - local_banking_partner
  recommended:
    - local_language_support
    - local_partnership_signed
    - market_demand_validated

risk_assessment:
  high_risk_markets:
    - US
    - CN
    - IN
  medium_risk_markets:
    - JP
    - HK
    - BR
  low_risk_markets:
    - EU_EEA
    - CH
    - LI
    - SG
