# GDPR (DSGVO) Mapping for SSID
# Regulation: EU Regulation 2016/679 (General Data Protection Regulation)
# Context: Non-custodial, hash-only, data-minimized architecture
# Version: 1.0.0
# Last updated: 2026-03-15

regulation_id: "EU-2016-679"
name: "General Data Protection Regulation (GDPR / DSGVO)"
effective_date: "2018-05-25"
description: >
  The GDPR establishes rules for processing personal data in the EU/EEA.
  SSID's architecture is designed around data minimization and hash-only
  storage, which inherently reduces GDPR compliance surface. SSID does
  not store raw personal data; it processes only cryptographic hashes
  and verifiable attestations.

articles_relevant:
  - article: "Art. 5 - Principles"
    relevance: "critical"
    subarticles:
      - sub: "Art. 5(1)(a) - Lawfulness, Fairness, Transparency"
        ssid_context: >
          SSID processes identity data lawfully based on user consent
          and legitimate interest. Transparency is achieved through
          open-source codebase and published data processing documentation.

      - sub: "Art. 5(1)(b) - Purpose Limitation"
        ssid_context: >
          Identity hashes are processed solely for identity verification
          and score computation. No secondary use, no profiling,
          no advertising.

      - sub: "Art. 5(1)(c) - Data Minimisation"
        ssid_context: >
          Core SSID principle. Only SHA-256 hashes of identity attributes
          are stored. Raw PII never persists in SSID infrastructure.

      - sub: "Art. 5(1)(e) - Storage Limitation"
        ssid_context: >
          Hash-only storage means no raw personal data is retained.
          Hashes cannot be reversed to reconstruct personal data.

      - sub: "Art. 5(1)(f) - Integrity and Confidentiality"
        ssid_context: >
          Cryptographic hash integrity, append-only audit logs,
          and post-quantum cryptography (21_post_quantum_crypto)
          ensure data integrity and confidentiality.

  - article: "Art. 6 - Lawful Basis"
    relevance: "high"
    ssid_context: >
      SSID relies on the following lawful bases:
      (a) Consent - user explicitly consents to identity verification;
      (f) Legitimate interest - hash-only processing for security
      and fraud prevention with minimal privacy impact.
    ssid_lawful_bases:
      - "Art. 6(1)(a) - Consent"
      - "Art. 6(1)(f) - Legitimate Interest"

  - article: "Art. 9 - Special Categories of Data"
    relevance: "high"
    ssid_context: >
      SSID does not process special category data (biometric,
      health, political, religious, etc.) in raw form. If biometric
      verification is used, only the verification result hash is
      stored, never the biometric template itself.
    ssid_controls:
      - "No raw biometric storage"
      - "Hash-only verification results"
      - "Biometric processing delegated to certified third-party providers"

  - article: "Art. 17 - Right to Erasure (Right to be Forgotten)"
    relevance: "critical"
    ssid_context: >
      SSID stores only cryptographic hashes. Hashes are not considered
      personal data if they cannot be reversed or re-linked to the
      data subject (CJEU guidance, WP29 Opinion 05/2014). SSID
      implements key deletion (crypto-shredding) where the user's
      linking key is destroyed, rendering hashes permanently
      unlinkable.
    ssid_implementation:
      mechanism: "crypto_shredding"
      description: >
        User requests erasure -> SSID deletes the user's identity
        linking key -> remaining hashes become orphaned and
        cannot be associated with any data subject.
      component: "03_core/identity"

  - article: "Art. 25 - Data Protection by Design and by Default"
    relevance: "critical"
    ssid_context: >
      SSID is architected from the ground up with privacy by design:
      hash-only storage, selective disclosure, zero-knowledge proofs,
      non-custodial user control, and minimal data collection.
    ssid_controls:
      - "Hash-only architecture (no raw PII storage)"
      - "Selective disclosure via ZKP"
      - "Non-custodial: user holds own credentials"
      - "Minimal data collection by design"
      - "Privacy impact assessment per new feature"

  - article: "Art. 32 - Security of Processing"
    relevance: "high"
    ssid_context: >
      SSID implements technical and organizational measures
      including encryption, pseudonymization (hashing), access
      controls, and post-quantum cryptographic primitives.
    ssid_controls:
      - "SHA-256 hashing for all identity attributes"
      - "Post-quantum cryptography readiness (21_post_quantum_crypto)"
      - "Append-only audit logging (02_audit_logging)"
      - "Role-based access control"
      - "Regular security assessments"

ssid_data_minimization:
  - control_id: "GDPR-DM-01"
    name: "Hash-Only Identity Storage"
    description: >
      All identity attributes are hashed with SHA-256 before storage.
      Only the hash is persisted; the raw attribute is discarded
      after hashing.
    gdpr_articles: ["Art. 5(1)(c)", "Art. 25"]
    component: "03_core/identity"

  - control_id: "GDPR-DM-02"
    name: "No Raw PII in Logs"
    description: >
      Audit logs contain only hashed references, timestamps, and
      event types. No raw personal data is written to log sinks.
    gdpr_articles: ["Art. 5(1)(c)", "Art. 5(1)(f)"]
    component: "02_audit_logging"

  - control_id: "GDPR-DM-03"
    name: "Selective Disclosure"
    description: >
      Users can prove specific attributes (e.g., age >= 18,
      jurisdiction = EU) without revealing underlying data.
      Implemented via zero-knowledge proofs.
    gdpr_articles: ["Art. 5(1)(c)", "Art. 25"]
    component: "14_zero_time_auth"

  - control_id: "GDPR-DM-04"
    name: "No Cross-Service Tracking"
    description: >
      SSID generates unique, unlinkable pseudonyms per relying party.
      No global user identifier is shared across services.
    gdpr_articles: ["Art. 5(1)(b)", "Art. 5(1)(c)"]
    component: "09_meta_identity"

  - control_id: "GDPR-DM-05"
    name: "User-Controlled Data Lifecycle"
    description: >
      Users can revoke attestations and trigger crypto-shredding
      at any time. Non-custodial design means the user is the
      sole controller of their identity data.
    gdpr_articles: ["Art. 17", "Art. 5(1)(e)"]
    component: "03_core/identity"

hash_only_controls:
  - control_id: "GDPR-HO-01"
    name: "SHA-256 One-Way Hashing"
    algorithm: "SHA-256"
    description: >
      All PII is processed through SHA-256 before any storage
      or transmission within SSID. The hash function is
      computationally irreversible.
    reversibility: "computationally_infeasible"
    gdpr_impact: >
      Hashed data may still be personal data under GDPR if
      re-identification is possible (WP29 Opinion 05/2014).
      SSID mitigates this through salted hashing and key
      separation.

  - control_id: "GDPR-HO-02"
    name: "Salted Hashing with Per-User Keys"
    description: >
      Each user's identity attributes are hashed with a unique,
      user-controlled salt. Without the salt, the hash cannot
      be linked to the data subject.
    gdpr_impact: >
      Per-user salting ensures that hashes are unlinkable across
      users and services, significantly reducing re-identification
      risk.

  - control_id: "GDPR-HO-03"
    name: "Crypto-Shredding for Erasure"
    description: >
      Deletion of the user's salt/linking key renders all
      associated hashes permanently unlinkable, achieving
      effective erasure under Art. 17.
    gdpr_impact: >
      Accepted by multiple DPAs as a valid erasure mechanism
      for hash-based systems (see EDPB Guidelines 04/2020).

  - control_id: "GDPR-HO-04"
    name: "No Hash Table / Rainbow Table Exposure"
    description: >
      SSID does not maintain lookup tables that could reverse
      hashes. Pre-image resistance is maintained through
      salting and key separation.

dpia_required: true
dpia_rationale: >
  While SSID minimizes personal data processing, a DPIA is
  recommended due to: (a) large-scale identity processing,
  (b) use of new technologies (ZKP, DLT), (c) systematic
  monitoring aspects of identity verification.
dpia_reference: "23_compliance/evidence/compliance/gdpr_dpia.json"
