threshold_rationale:
  version: "1.0.0"
  description: >
    Internal documentation of compliance metric thresholds and their
    rationale. Each threshold is justified by regulatory requirement,
    industry benchmark, or risk-based analysis.

thresholds:
  - metric: identity_verification_success_rate
    threshold_percent: 95.0
    direction: minimum
    rationale: >
      Industry benchmark for KYC verification success rates.
      Below 95% indicates potential issues with document quality,
      provider availability, or user experience friction.
    regulatory_basis: MiCA Art. 67, FATF Recommendation 10
    review_frequency: monthly

  - metric: sanctions_screening_latency_ms
    threshold_ms: 500
    direction: maximum
    rationale: >
      Real-time screening must complete within 500ms to not degrade
      user experience. OFAC and EU sanctions lists require immediate
      screening before any transaction processing.
    regulatory_basis: EU Sanctions Regulation, OFAC SDN requirements
    review_frequency: weekly

  - metric: false_positive_rate_aml
    threshold_percent: 5.0
    direction: maximum
    rationale: >
      AML false positive rates above 5% create unsustainable manual
      review burden. Industry best practice targets 2-3%.
    regulatory_basis: FATF risk-based approach guidance
    review_frequency: quarterly

  - metric: data_breach_detection_time_hours
    threshold_hours: 24
    direction: maximum
    rationale: >
      GDPR Art. 33 requires notification within 72 hours.
      Detection must occur within 24h to allow 48h for assessment
      and notification preparation.
    regulatory_basis: GDPR Art. 33, NIS2 Art. 23
    review_frequency: annual

  - metric: audit_trail_completeness_percent
    threshold_percent: 100.0
    direction: minimum
    rationale: >
      Every operation must be logged. Incomplete audit trails
      indicate system failure or tampering. Zero tolerance.
    regulatory_basis: MiCA Art. 68, DORA Art. 12
    review_frequency: continuous

  - metric: ai_model_bias_disparity_ratio
    threshold_ratio: 0.80
    direction: minimum
    rationale: >
      Demographic parity ratio below 0.80 indicates unacceptable
      bias. EU AI Act requires demonstrable fairness.
      Quarterly bias audits must verify this threshold.
    regulatory_basis: EU AI Act Art. 9, ISO 42001
    review_frequency: quarterly

  - metric: system_uptime_percent
    threshold_percent: 99.9
    direction: minimum
    rationale: >
      Professional and Enterprise SLA commitments require 99.9%
      uptime. Below this triggers SLA penalty clauses.
    regulatory_basis: DORA Art. 11, contractual SLA
    review_frequency: monthly

  - metric: pqc_migration_readiness_percent
    threshold_percent: 50.0
    direction: minimum
    rationale: >
      By 2027, at least 50% of cryptographic operations should
      support post-quantum algorithms. NIST PQC timeline and
      BSI TR-02102 guidance drive this target.
    regulatory_basis: BSI TR-02102, NIST PQC migration guidance
    review_frequency: semi_annual

  - metric: travel_rule_compliance_rate_percent
    threshold_percent: 99.0
    direction: minimum
    rationale: >
      FATF Recommendation 16 requires travel rule compliance for
      all qualifying transfers. 99% accounts for edge cases
      requiring manual resolution.
    regulatory_basis: FATF Rec. 16, EU TFR
    review_frequency: monthly

governance:
  threshold_change_process: rfc_required
  approval_authority: compliance_committee
  documentation_required: true
  effective_after_approval: true
