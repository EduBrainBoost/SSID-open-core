# =============================================================================
# SSID Compliance Automation Configuration (R021)
# =============================================================================
# This config drives the AutomatedComplianceMonitor.
# Path: 23_compliance/config/compliance_automation_config.yaml
# =============================================================================

# ---------------------------------------------------------------------------
# Frameworks to monitor
# ---------------------------------------------------------------------------
frameworks:
  - name: mica
    path: 23_compliance/frameworks/mica/
    description: "Markets in Crypto-Assets Regulation"
    check_interval_hours: 24
    priority: critical
    yaml_files:
      - mica_controls.yaml
      - mica_mapping.yaml

  - name: eidas
    path: 23_compliance/frameworks/eidas/
    description: "Electronic Identification, Authentication and Trust Services"
    check_interval_hours: 24
    priority: critical
    yaml_files:
      - eidas_mapping.yaml
      - eidas_trust_services.yaml

  - name: gdpr
    path: 23_compliance/frameworks/gdpr/
    description: "General Data Protection Regulation"
    check_interval_hours: 12
    priority: critical
    yaml_files:
      - gdpr_controls.yaml
      - gdpr_mapping.yaml

  - name: fatf
    path: 23_compliance/frameworks/fatf/
    description: "Financial Action Task Force Recommendations"
    check_interval_hours: 48
    priority: high
    yaml_files:
      - fatf_controls.yaml
      - fatf_mapping.yaml

  - name: amld6
    path: 23_compliance/frameworks/amld6/
    description: "Anti-Money Laundering Directive 6"
    check_interval_hours: 48
    priority: high
    yaml_files:
      - amld6_controls.yaml
      - amld6_mapping.yaml

# ---------------------------------------------------------------------------
# Alert channels
# ---------------------------------------------------------------------------
alert_channels:
  - type: log
    target: 23_compliance/logs/compliance_alerts.log
    severity_threshold: medium

  - type: webhook
    target: "${COMPLIANCE_WEBHOOK_URL}"
    severity_threshold: critical
    enabled: false

  - type: email
    target: "${COMPLIANCE_ALERT_EMAIL}"
    severity_threshold: high
    enabled: false

# ---------------------------------------------------------------------------
# Report output
# ---------------------------------------------------------------------------
report_output_path: 23_compliance/reports/
report_formats:
  - markdown
  - json
report_retention_days: 365
report_prefix: "compliance_report"

# ---------------------------------------------------------------------------
# Evidence requirements per framework
# ---------------------------------------------------------------------------
evidence_requirements:
  mica:
    max_evidence_age_days: 90
    required_evidence_types:
      - control_implementation
      - audit_trail
      - whitepaper_compliance
    evidence_path: 23_compliance/evidence/mica/
    review_cadence: quarterly

  eidas:
    max_evidence_age_days: 90
    required_evidence_types:
      - trust_service_certification
      - identity_proofing_records
      - assurance_level_mapping
    evidence_path: 23_compliance/evidence/eidas/
    review_cadence: quarterly

  gdpr:
    max_evidence_age_days: 60
    required_evidence_types:
      - data_processing_records
      - dpia_results
      - consent_mechanisms
      - data_subject_rights_procedures
    evidence_path: 23_compliance/evidence/gdpr/
    review_cadence: monthly

  fatf:
    max_evidence_age_days: 90
    required_evidence_types:
      - kyc_aml_procedures
      - transaction_monitoring
      - suspicious_activity_reports
    evidence_path: 23_compliance/evidence/fatf/
    review_cadence: quarterly

  amld6:
    max_evidence_age_days: 90
    required_evidence_types:
      - aml_policy_documentation
      - risk_assessment
      - beneficial_ownership_records
      - reporting_procedures
    evidence_path: 23_compliance/evidence/amld6/
    review_cadence: quarterly

# ---------------------------------------------------------------------------
# Monitoring schedule
# ---------------------------------------------------------------------------
monitoring_schedule:
  interval_hours: 24
  start_time: "02:00"
  timezone: "UTC"
  run_on_startup: true
  max_concurrent_checks: 3
  timeout_per_framework_seconds: 300

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
settings:
  evidence_base_dir: 23_compliance/evidence/
  frameworks_base_dir: 23_compliance/frameworks/
  log_level: INFO
  dry_run: false
  fail_on_critical: true
  stale_evidence_threshold_days: 90
