# Fee Allocation Policy — SSID 7-Säulen Model + Developer Reward
# SoT: gebuehren_abo_modelle v5.4.3 + ssid_token_economics v1.0.0
# Total fee rate: exactly 3.00% of transaction volume
#   - 2.00% = System Pool (7-Säulen internal distribution below)
#   - 1.00% = Developer Reward (non-custodial, automatic on-chain)
# All pillar values are percentages of transaction volume.

version: "5.5.0"
sot_rule: "gebuehren_abo_modelle_v5.4.3 + ssid_token_economics_v1.0.0"
total_fee_percent: 3.00
system_pool_percent: 2.00
developer_reward_percent: 1.00

# Total 2.00% system treasury = 1.00% burn + 1.00% operational (7 pillars)
burn_allocation:
  burn_from_treasury_percent: 1.00
  description: "50% of 2.00% system treasury is burned"
  daily_cap_percent: 0.5   # of circulating supply
  monthly_cap_percent: 2.0  # of circulating supply

pillars:
  # 7 pillars sum to 1.00% (the non-burned half of the 2.00% system treasury)
  legal_compliance:
    label: "Legal/Compliance"
    percent: 0.175
    destination: "07_governance_legal"
    purpose: "Regulatory compliance, legal counsel, audit preparation"

  audit_security:
    label: "Audit/Security"
    percent: 0.15
    destination: "02_audit_logging"
    purpose: "WORM evidence, security audits, penetration testing"

  tech_maintenance:
    label: "Tech Maintenance"
    percent: 0.15
    destination: "15_infra"
    purpose: "Infrastructure maintenance, CI/CD, monitoring"

  dao_treasury:
    label: "DAO Treasury"
    percent: 0.125
    destination: "03_core/dao"
    purpose: "Governance reserves, protocol development fund"

  community_bonus:
    label: "Community Bonus"
    percent: 0.10
    destination: "08_identity_score"
    purpose: "Reward pool for community contributors (POFI-linked)"

  liquidity_reserve:
    label: "Liquidity Reserve"
    percent: 0.10
    destination: "03_core/liquidity"
    purpose: "DEX liquidity provision and emergency reserve"

  marketing:
    label: "Marketing"
    percent: 0.20
    destination: "20_foundation"
    purpose: "Growth, partnerships, ecosystem development"

# Developer Reward (separate from 7-Säulen system pool)
developer_reward:
  label: "Developer Reward"
  percent: 1.00
  destination: "03_core/contracts/RewardTreasury"
  purpose: "Automatic 1% fee to code publishers (non-custodial, on-chain)"
  mechanism: "smart_contract_automatic"
  custodial: false

# Tolerance for floating-point sum checks
# System pool pillars must sum to exactly 1.00% (operational, after 1.00% burn)
# Total (system + developer) must sum to exactly 3.00%
sum_tolerance: 0.001
