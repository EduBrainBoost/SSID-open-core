version: "1.0"
description: "SSID 7-Säulen fee distribution policy"

fee_distribution:
  identity_verification: 0.3
  compliance_monitoring: 0.25
  evidence_anchoring: 0.25
  governance_participation: 0.2
  protocol_improvement: 0.3
  security_operations: 0.35
  data_stewardship: 0.15

total_percent: 2.0

constraints:
  - total_must_equal_2_percent: true
  - no_pillar_exceeds_0_5_percent: false
  - quarterly_review_required: true

approval_requirements:
  - governance_vote
  - compliance_officer
  - auditor_sign_off
