# JFSA — Japan Jurisdiction Compliance Policy
# SSID-open-core | 23_compliance/jurisdictions/apac/
# Classification: Compliance | Level-3 Specification
# Generated: 2026-03-15

policy:
  id: "APAC-JFSA-001"
  name: "JFSA Crypto-Asset Exchange Service Provider Framework (Japan)"
  version: "1.0.0"
  status: "active"
  regulatory_references:
    - ref: "Act on Payment Services (資金決済に関する法律) — Act No. 59 of 2009, as amended 2020"
      note: "Primary framework for crypto-asset exchange service providers (CAESP)"
    - ref: "Financial Instruments and Exchange Act (金融商品取引法, FIEA) — Act No. 25 of 1948, as amended"
      note: "Regulation of crypto-asset derivatives and security tokens (STOs)"
    - ref: "Act on Prevention of Transfer of Criminal Proceeds (犯罪による収益の移転防止に関する法律)"
      note: "AML/CFT obligations — Criminal Proceeds Transfer Prevention Act"
    - ref: "Act on Protection of Personal Information (個人情報の保護に関する法律, APPI) — amended 2022"
      note: "Japan personal data protection law"
    - ref: "JFSA Supervisory Guidelines for Crypto-Asset Exchange Service Providers (2020)"
      note: "Detailed supervisory expectations"
    - ref: "FATF-aligned Travel Rule — implemented via JFSA guidance 2022"
      note: "Japanese Travel Rule implementation"
  issuing_body: "Financial Services Agency (金融庁, JFSA)"
  reference_url: "https://www.fsa.go.jp/en/regulated/crypto/"
  jurisdiction: "Japan"
  scope: "Crypto-Asset Exchange Service Providers (CAESPs) operating in Japan"
  last_reviewed: "2026-03-15"

applicability:
  entities:
    - "Crypto-Asset Exchange Service Providers (CAESPs)"
    - "Type I Financial Instruments Business Operators (for crypto derivatives)"
    - "Security Token Offering (STO) issuers and intermediaries"
  caesp_activities:
    - "Buying/selling crypto-assets against fiat"
    - "Exchanging crypto-assets"
    - "Managing crypto-assets on behalf of users"
    - "Intermediation of above activities"
  registration: "JFSA registration mandatory — no exemptions for foreign operators serving Japan"

requirements:
  registration_and_governance:
    caesp_registration:
      - "Application to JFSA (or delegated FSB)"
      - "Japanese entity or branch required"
      - "Fit-and-proper assessment of management"
    capital_requirement: "Minimum net assets per JFSA regulations"
    cold_storage: "95%+ of user crypto-assets in cold storage"
    segregation: "User assets strictly segregated from company assets"
    annual_audit: "External audit of user asset management"

  customer_due_diligence:
    kyc_basis: "Criminal Proceeds Transfer Prevention Act"
    trigger: "At account opening and for transactions above ¥100,000"
    fields_required:
      - field: "customer_name_hash"
        format: "sha256_hash"
        note: "Full legal name (kanji + kana for Japanese nationals) — hashed"
      - field: "dob_hash"
        format: "sha256_hash"
      - field: "address_hash"
        format: "sha256_hash"
        note: "Registered address in Japan"
      - field: "my_number_hash"
        format: "sha256_hash"
        conditional: "Individual Number (My Number) — required for high-risk cases"
        note: "Highly sensitive — double-hashed with separate salt"
      - field: "corporate_registration_hash"
        format: "sha256_hash"
        conditional: "For corporate customers — corporate registration number"
    identity_verification: "Face-to-face or eKYC via JFSA-approved method"

  travel_rule:
    threshold_jpy: 100000
    alignment: "FATF Recommendation 16 — see global/fatf/travel_rule/fatf_travel_rule.yaml"
    implementation: "JVCEA (Japan Virtual and Crypto Assets Exchange Association) industry standard"
    fields:
      originator:
        - "name_hash: sha256_hash"
        - "account_hash: sha256_hash"
        - "institution_id: CAESP identifier"
      beneficiary:
        - "name_hash: sha256_hash"
        - "account_hash: sha256_hash"

  suspicious_transaction_reporting:
    basis: "Criminal Proceeds Transfer Prevention Act Art. 8"
    filing_body: "Japan Financial Intelligence Unit (JAFIC)"
    method: "Goho-Net (suspicious transaction reporting system)"
    ssid_approach: "Hash-pattern anomaly scoring — no PII transmitted to JAFIC reporting system"

  security_token_offerings:
    basis: "FIEA — electronic record transfer rights"
    requirements:
      - "Type I FIBO registration for STO intermediation"
      - "Disclosure document (有価証券届出書) for public STOs"
    ssid_approach: "SSID provides identity verification for STO investor onboarding (hash-only)"

  appi_compliance:
    data_minimization: "Collect only necessary personal data"
    third_party_provision: "Prior consent or statutory exception required"
    cross_border_transfer: "Requires data subject consent or adequate protection in recipient country"
    ssid_approach: >
      SSID stores only SHA-256 hashes. Under APPI 2022 amendments, pseudonymized
      information (仮名加工情報) has reduced obligations. Hash-only architecture
      achieves effective pseudonymization.

ssid_compliance:
  approach: "hash_only_non_custodial"
  data_handling: "hash_only"
  storage: "non_custodial"
  pii: "never_stored"
  evidence_chain: "sha256_chain"

  capability_mapping:
    customer_name: "sha256(name_normalized_unicode) — SSID identity layer"
    my_number: "sha256(sha256(my_number) + per_user_salt) — double-hashed sensitive field"
    dob: "sha256(dob_iso8601)"
    address: "sha256(address_normalized_japan_format)"
    corporate_registration: "sha256(corporate_number)"
    travel_rule: "Aligned to FATF TR policy — JVCEA standard hash format"
    suspicious_tx: "JAFIC reporting via hash-based trigger — no plaintext PII"

  my_number_special_handling:
    note: >
      Individual Number (My Number) is subject to strict handling rules under
      the Act on the Use of Numbers to Identify a Specific Individual in
      Administrative Procedures. SSID applies double-hashing with independently
      managed salt to minimize re-identification risk.

evidence_requirements:
  format: "SHA-256 hash manifest"
  storage_path: "23_compliance/evidence/compliance/"
  retention_years: 7
  regulatory_minimum_years: 7
  suspicious_tx_path: "23_compliance/evidence/compliance/jafic_triggers/"
  audit_trail: "JFSA-compliant immutable transaction log"
  cold_storage_evidence: "Annual audit hash of cold storage balance proofs"

governance:
  owner: "23_compliance"
  review_cycle: "annual"
  related_policies:
    - "jurisdictions/apac/mas_policy.yaml"
    - "global/fatf/travel_rule/fatf_travel_rule.yaml"
  regulatory_body: "Financial Services Agency (JFSA)"
  self_regulatory:
    - "JVCEA (Japan Virtual and Crypto Assets Exchange Association)"
    - "JSTOA (Japan Security Token Offering Association)"
  intelligence_unit: "JAFIC (Japan Financial Intelligence Center)"
