# MiCA Regulation — EU Jurisdiction Compliance Policy
# SSID-open-core | 23_compliance/jurisdictions/eu/
# Classification: Compliance | Level-3 Specification
# Generated: 2026-03-15

policy:
  id: "EU-MICA-001"
  name: "Markets in Crypto-Assets (MiCA) Regulation"
  version: "1.0.0"
  status: "active"
  regulatory_reference: "Regulation (EU) 2023/1114 of 31 May 2023"
  issuing_body: "European Parliament and Council of the EU"
  reference_url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32023R1114"
  jurisdiction: "European Union"
  scope: "Crypto-asset service providers (CASPs) operating in the EU"
  effective_date: "2024-12-30"
  fully_applicable: "2024-12-30"
  last_reviewed: "2026-03-15"

applicability:
  entities:
    - "Crypto-Asset Service Providers (CASPs)"
    - "Issuers of crypto-assets"
    - "Issuers of Asset-Referenced Tokens (ARTs)"
    - "Issuers of E-Money Tokens (EMTs)"
  asset_types:
    - "Utility tokens"
    - "Asset-referenced tokens (ARTs)"
    - "E-money tokens (EMTs)"
  exclusions:
    - "NFTs qualifying as unique and non-fungible"
    - "DeFi protocols without identifiable CASP"
    - "Intragroup transfers"

requirements:
  authorization:
    casp_license:
      - "CASP authorization required from national competent authority (NCA)"
      - "Passport rights across EU once authorized in one member state"
    whitepaper:
      - "Crypto-asset whitepaper mandatory before public offer"
      - "Whitepaper hash registered with ESMA"

  customer_due_diligence:
    kyc_level: "risk_based"
    aml_compliance: "AMLD6 + MiCA Title VI"
    travel_rule: "FATF Recommendation 16 — see global/fatf/travel_rule/fatf_travel_rule.yaml"
    fields_required:
      - field: "customer_identity_hash"
        format: "sha256_hash"
        note: "Full name hashed — never stored plaintext"
      - field: "national_id_hash"
        format: "sha256_hash"
      - field: "address_hash"
        format: "sha256_hash"
      - field: "source_of_funds_attestation"
        format: "boolean_with_evidence_hash"

  market_integrity:
    prohibitions:
      - "Market manipulation"
      - "Insider dealing"
      - "Unlawful disclosure of inside information"
    surveillance: "Transaction monitoring via hash-based anomaly detection"

  prudential:
    own_funds_requirement: "Minimum own funds per CASP category (Art. 67)"
    custody_segregation: "Client assets segregated and non-commingled"

  disclosure:
    periodic_reporting: "Annual report to NCA"
    incident_reporting: "Significant operational incidents within 24h"

ssid_compliance:
  approach: "hash_only_non_custodial"
  data_handling: "hash_only"
  storage: "non_custodial"
  pii: "never_stored"
  evidence_chain: "sha256_chain"

  capability_mapping:
    customer_identity: "sha256(full_name_normalized) — SSID identity layer"
    national_id: "sha256(national_id) — SSID credential shard"
    address: "sha256(address_normalized) — SSID credential shard"
    source_of_funds: "boolean attestation + sha256(evidence_ref)"
    whitepaper_hash: "sha256(whitepaper_content) — registered on-chain"
    transaction_monitoring: "Hash-based pattern matching — no plaintext retention"

  non_custodial_note: >
    SSID does not custody crypto-assets or hold PII. The CASP authorization
    requirement applies to entities that offer services — SSID provides
    compliance infrastructure (hash-based identity proofs) to licensed CASPs.

evidence_requirements:
  format: "SHA-256 hash manifest"
  storage_path: "23_compliance/evidence/compliance/"
  retention_years: 5
  regulatory_minimum_years: 5
  audit_trail: "Immutable hash chain per MiCA Art. 75"

governance:
  owner: "23_compliance"
  review_cycle: "annual"
  related_policies:
    - "jurisdictions/eu/gdpr_policy.yaml"
    - "jurisdictions/eu/eidas_policy.yaml"
    - "global/fatf/travel_rule/fatf_travel_rule.yaml"
  competent_authority: "National Competent Authority (NCA) per member state + ESMA oversight"
