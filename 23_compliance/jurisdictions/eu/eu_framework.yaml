# EU Compliance Framework for SSID
# Jurisdiction: European Union / EEA
# Context: Non-custodial, hash-only, utility-token infrastructure
# Version: 1.0.0
# Last updated: 2026-03-15

jurisdiction_id: "EU-EEA"
name: "European Union / European Economic Area Compliance Framework"
description: >
  Comprehensive regulatory framework mapping for SSID operations
  within the EU/EEA. Covers digital identity, crypto-asset regulation,
  data protection, cybersecurity, and financial services regulation.

applicable_regulations:
  # Primary regulations (detailed mappings in global/)
  - regulation_id: "EU-2016-679"
    name: "GDPR"
    status: "active"
    ssid_impact: "high"
    detailed_mapping: "23_compliance/global/gdpr.yaml"

  - regulation_id: "EU-2023-1114"
    name: "MiCA"
    status: "active"
    ssid_impact: "high"
    detailed_mapping: "23_compliance/global/mica.yaml"

  - regulation_id: "EU-2024-1183"
    name: "eIDAS 2.0"
    status: "active"
    ssid_impact: "high"
    detailed_mapping: "23_compliance/global/eidas.yaml"

  # Additional EU regulations
  - regulation_id: "EU-2022-2554"
    name: "DORA (Digital Operational Resilience Act)"
    status: "active"
    effective_date: "2025-01-17"
    ssid_impact: "medium"
    description: >
      ICT risk management, incident reporting, resilience testing,
      and third-party risk management for financial entities.
      Relevant for SSID when integrated by financial institutions.
    ssid_controls:
      - "ICT risk management framework in 15_infra"
      - "Incident response plans per module (DORA IR)"
      - "Third-party risk assessment for verification providers"
      - "Business continuity and disaster recovery"

  - regulation_id: "EU-2022-2555"
    name: "NIS2 Directive"
    status: "active"
    effective_date: "2024-10-18"
    ssid_impact: "medium"
    description: >
      Network and information security requirements for essential
      and important entities. SSID as identity infrastructure may
      qualify as an important entity in some member states.
    ssid_controls:
      - "Security incident notification within 24 hours"
      - "Risk management measures (Art. 21)"
      - "Supply chain security assessment"
      - "Vulnerability disclosure policy"

  - regulation_id: "EU-2023-2854"
    name: "Data Act"
    status: "active"
    effective_date: "2025-09-12"
    ssid_impact: "low"
    description: >
      Rules on fair access to and use of data. Limited impact
      on SSID as it does not generate IoT or product data.

  - regulation_id: "EU-2024-1689"
    name: "EU AI Act"
    status: "active"
    ssid_impact: "medium"
    description: >
      AI risk classification and requirements. SSID's AI/ML
      components (01_ai_layer) for identity scoring must comply
      with transparency and non-discrimination requirements.
    ssid_controls:
      - "AI model transparency documentation"
      - "Bias and fairness testing (01_ai_layer)"
      - "Human oversight mechanisms"
      - "Identity scoring classified as limited-risk AI system"

  - regulation_id: "EU-2015-849"
    name: "AMLD6 / AML Regulation"
    status: "transitioning"
    ssid_impact: "medium"
    description: >
      Anti-money laundering requirements. SSID is not an obliged
      entity but provides identity infrastructure that obliged
      entities (banks, CASPs) can use for CDD.
    ssid_controls:
      - "KYC verification attestation support"
      - "Sanctions screening integration point"
      - "Hash-based transaction monitoring support"

  - regulation_id: "EU-PSD2-PSD3"
    name: "PSD2 / PSD3 (Payment Services Directive)"
    status: "active"
    ssid_impact: "low"
    description: >
      Payment services regulation. Not directly applicable to
      SSID as it does not provide payment services. SSID token
      is a utility token, not a payment instrument.

eu_specific_requirements:
  - requirement_id: "EU-REQ-01"
    name: "Data Localization"
    description: >
      GDPR restricts transfer of personal data to third countries
      without adequate protection. SSID's hash-only approach
      mitigates this as hashes are not personal data when properly
      salted and the linking key remains in the EU.
    ssid_control: "EU data processing with hash-only cross-border transfer"

  - requirement_id: "EU-REQ-02"
    name: "DPO Appointment"
    description: >
      A Data Protection Officer may be required if SSID processes
      personal data on a large scale (GDPR Art. 37).
    ssid_control: "DPO assessment documented in governance"

  - requirement_id: "EU-REQ-03"
    name: "EU Representative"
    description: >
      If SSID operates from outside the EU but offers services to
      EU data subjects, an EU representative must be appointed
      (GDPR Art. 27).
    ssid_control: "EU representative designation in legal entity structure"

  - requirement_id: "EU-REQ-04"
    name: "EUDI Wallet Conformance"
    description: >
      By November 2026, SSID identity components must be
      interoperable with EUDI Wallets per eIDAS 2.0.
    ssid_control: "EUDI Wallet adapter (19_adapters)"
    deadline: "2026-11-01"

  - requirement_id: "EU-REQ-05"
    name: "Environmental Sustainability Disclosure"
    description: >
      MiCA Art. 6(1)(j) requires disclosure of environmental
      impact of consensus mechanisms. SSID must document its
      energy consumption and sustainability measures.
    ssid_control: "Environmental impact disclosure in white paper"

member_state_specifics:
  - country: "DE"
    name: "Germany"
    notes:
      - "BaFin oversight for crypto-asset activities"
      - "Strict interpretation of GDPR by state DPAs"
      - "eIDAS pilot: German ID wallet (BundesIdent)"

  - country: "FR"
    name: "France"
    notes:
      - "AMF registration for DASPs (Digital Asset Service Providers)"
      - "CNIL strict on cookie consent and data minimization"

  - country: "LI"
    name: "Liechtenstein"
    notes:
      - "TVTG (Token and VT Service Provider Act) - progressive token framework"
      - "Cross-reference: 23_compliance/jurisdictions/li_tvtg/"

  - country: "CH"
    name: "Switzerland"
    notes:
      - "Not EU but part of extended framework via bilateral agreements"
      - "FINMA token classification guidance"
      - "DLT Act (2021) - progressive blockchain legislation"
      - "Cross-reference: 23_compliance/jurisdictions/ch_dlt/"

ssid_non_custodial_position:
  statement: >
    SSID operates as non-custodial identity infrastructure within the EU.
    Users maintain sole control over their identity credentials and keys.
    SSID does not hold, transfer, or manage crypto-assets or personal data
    on behalf of users. This architecture provides natural alignment with
    EU regulatory principles of user sovereignty and data protection.
  relevant_exemptions:
    - "MiCA: Not a CASP (non-custodial)"
    - "AMLD6: Not an obliged entity (no custody/exchange)"
    - "PSD2/PSD3: Not a payment service provider"
    - "GDPR: Minimal processing, hash-only storage"
