# FinCEN — US Jurisdiction Compliance Policy
# SSID-open-core | 23_compliance/jurisdictions/us/
# Classification: Compliance | Level-3 Specification
# Generated: 2026-03-15

policy:
  id: "US-FINCEN-001"
  name: "FinCEN Virtual Currency & BSA Compliance Framework"
  version: "1.0.0"
  status: "active"
  regulatory_references:
    - ref: "Bank Secrecy Act (BSA) of 1970 — 31 U.S.C. § 5311 et seq."
      note: "Foundation of US AML framework"
    - ref: "FinCEN Guidance FIN-2013-G001"
      note: "Application of BSA to virtual currency"
    - ref: "FinCEN Guidance FIN-2019-G001"
      note: "Application of FinCEN regulations to CVCs and digital assets"
    - ref: "FinCEN NPRM — CVC Recordkeeping and Travel Rule (2020)"
      note: "Proposed extension of Travel Rule to CVCs — threshold $250 international"
    - ref: "Anti-Money Laundering Act of 2020 (AMLA 2020)"
      note: "Significant AML reform — includes virtual asset provisions"
    - ref: "31 CFR Part 1010, 1020, 1022"
      note: "BSA implementing regulations"
  issuing_body: "Financial Crimes Enforcement Network (FinCEN), U.S. Department of Treasury"
  reference_url: "https://www.fincen.gov/resources/statutes-and-regulations/bank-secrecy-act"
  jurisdiction: "United States of America"
  scope: "Money services businesses (MSBs), VASPs, financial institutions handling virtual assets"
  last_reviewed: "2026-03-15"

applicability:
  entities:
    - "Money Services Businesses (MSBs)"
    - "Virtual Currency Exchangers and Administrators"
    - "Convertible Virtual Currency (CVC) operators"
    - "Hosted and unhosted wallet providers (proposed)"
    - "DeFi protocols with identifiable control (enforcement risk)"
  msb_categories:
    - "Money transmitter"
    - "Currency dealer or exchanger"
    - "Check casher"
    - "Issuer of traveler's checks, money orders, stored value"
  exclusions:
    - "Purely non-custodial, decentralized protocols (current guidance — evolving)"
    - "End-users of virtual currency (not acting as MSB)"

requirements:
  msb_registration:
    mandate: "All MSBs must register with FinCEN (31 CFR § 1022.380)"
    renewal: "Every 2 years"
    state_licensing: "Separate state money transmitter licenses required (varies by state)"

  aml_program:
    components:
      - "Written AML policies and procedures"
      - "Designated BSA/AML Compliance Officer"
      - "Ongoing employee training"
      - "Independent testing/audit"

  customer_identification_program:
    cip_rule: "31 CFR § 1020.220"
    fields_required:
      - field: "customer_name_hash"
        format: "sha256_hash"
        note: "Legal name — hash stored in SSID, never plaintext"
      - field: "dob_hash"
        format: "sha256_hash"
        note: "Date of birth"
      - field: "address_hash"
        format: "sha256_hash"
        note: "Residential address"
      - field: "id_number_hash"
        format: "sha256_hash"
        note: "SSN, ITIN, passport, or equivalent"
    verification: "Document-based or non-documentary methods"

  beneficial_ownership:
    rule: "31 CFR § 1010.230 — Customer Due Diligence Rule"
    threshold: "25% equity / control prong"
    fields:
      - field: "beneficial_owner_name_hash"
        format: "sha256_hash"
      - field: "beneficial_owner_id_hash"
        format: "sha256_hash"

  travel_rule:
    domestic_threshold_usd: 3000
    international_proposed_usd: 250
    cvc_threshold_usd: 3000
    reference: "31 CFR § 1010.410(f) + FinCEN NPRM 2020"
    alignment: "global/fatf/travel_rule/fatf_travel_rule.yaml"
    fields_required:
      - field: "originator_name_hash"
        format: "sha256_hash"
      - field: "originator_account_hash"
        format: "sha256_hash"
      - field: "beneficiary_name_hash"
        format: "sha256_hash"
      - field: "beneficiary_account_hash"
        format: "sha256_hash"

  suspicious_activity_reporting:
    sar_threshold_usd: 2000
    filing_deadline: "30 days from detection (60 days if no identified suspect)"
    ssid_approach: "Anomaly scoring on hash patterns — SAR trigger without PII access"

  currency_transaction_reporting:
    ctr_threshold_usd: 10000
    form: "FinCEN Form 112"
    fields: "Name, address, SSN — hashed in SSID; MSB extracts for CTR filing"

  recordkeeping:
    retention_years: 5
    required_records:
      - "CIP records"
      - "Transaction records above threshold"
      - "Travel Rule transmission records"
      - "SAR filings (retain 5 years)"

ssid_compliance:
  approach: "hash_only_non_custodial_msb_support"
  data_handling: "hash_only"
  storage: "non_custodial"
  pii: "never_stored"
  evidence_chain: "sha256_chain"

  capability_mapping:
    customer_name: "sha256(name_normalized) — SSID identity layer"
    dob: "sha256(dob_iso8601)"
    address: "sha256(address_normalized)"
    ssn_itin: "sha256(id_number) — separated by cryptographic salt"
    beneficial_owner: "sha256(owner_identity) — CDD rule compliance"
    travel_rule_originator: "sha256(name) + sha256(account) — FinCEN compliant"
    sar_trigger: "Hash-based anomaly detection — no PII accessed for scoring"

  msb_position: >
    SSID provides identity infrastructure to MSBs. SSID itself is non-custodial
    and does not transmit value. MSBs using SSID remain responsible for their
    own FinCEN registration, AML program, and reporting obligations.
    SSID provides hash-based identity evidence to support MSB compliance workflows.

evidence_requirements:
  format: "SHA-256 hash manifest"
  storage_path: "23_compliance/evidence/compliance/"
  retention_years: 5
  regulatory_minimum_years: 5
  sar_evidence_path: "23_compliance/evidence/compliance/sar_triggers/"
  audit_trail: "Immutable BSA-compliant transaction log"

governance:
  owner: "23_compliance"
  review_cycle: "annual"
  related_policies:
    - "jurisdictions/us/sec_policy.yaml"
    - "global/fatf/travel_rule/fatf_travel_rule.yaml"
  regulatory_body: "Financial Crimes Enforcement Network (FinCEN)"
  enforcement_agencies:
    - "FinCEN"
    - "IRS (BSA examination)"
    - "Federal Reserve, OCC, FDIC (for bank-affiliated entities)"
    - "State regulators"
