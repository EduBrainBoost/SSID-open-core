coverage_matrix:
  version: "1.0.0"
  description: >
    Jurisdiction coverage matrix for SSID compliance.
    Maps each supported jurisdiction to its compliance readiness level,
    applicable regulations, and operational status.

coverage_levels:
  full: All required licences obtained, controls implemented and audited
  substantial: Controls implemented, licence applications in progress
  partial: Gap analysis complete, implementation in progress
  assessment: Initial regulatory assessment underway
  planned: On roadmap, not yet started

jurisdictions:
  eu_eea:
    - code: DE
      name: Germany
      level: full
      regulations: [MiCA, GDPR, AML6, eIDAS2, EU_AI_Act, NIS2, DORA]
    - code: FR
      name: France
      level: full
      regulations: [MiCA, GDPR, AML6, eIDAS2]
    - code: NL
      name: Netherlands
      level: full
      regulations: [MiCA, GDPR, AML6, eIDAS2]
    - code: AT
