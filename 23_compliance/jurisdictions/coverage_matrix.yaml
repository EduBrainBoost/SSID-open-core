      regulations: [MiCA, GDPR, AML6]
    - code: IE
      name: Ireland
      level: substantial
      regulations: [MiCA, GDPR, AML6]
    - code: LU
      name: Luxembourg
      level: substantial
      regulations: [MiCA, GDPR, AML6]
    - code: IT
      name: Italy
      level: partial
      regulations: [MiCA, GDPR, AML6]
    - code: ES
      name: Spain
