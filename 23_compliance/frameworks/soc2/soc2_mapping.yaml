# SOC 2 Compliance Mapping — SSID Platform
# SoT v4.1.0 | Classification: Compliance
# Framework: SOC 2 Trust Service Criteria (AICPA TSC 2017, updated 2022)
# Generated: 2026-03-15

framework_id: "soc2"
framework_name: "SOC 2 Trust Service Criteria"
standard: "AICPA TSC 2017 (2022 points of focus update)"
report_type: "Type II"
version: "1.0.0"
final_authority: "03_core"
applicability: >
  SSID is a self-sovereign identity platform providing identity verification,
  attestation, and credential management services. SOC 2 Type II applicability
  spans the Security (CC) trust service category as mandatory, with Availability,
  Processing Integrity, Confidentiality, and Privacy as applicable additional
  categories given the nature of identity data processing.

trust_service_categories:
  - id: "security"
    criteria_prefix: "CC"
    criteria_range: "CC1-CC9"
    required: true
    rationale: "Mandatory for all SOC 2 engagements; core security controls across SSID platform"
  - id: "availability"
    criteria_prefix: "A"
    required: true
    rationale: "Identity verification services must maintain availability SLAs for relying parties"
  - id: "processing_integrity"
    criteria_prefix: "PI"
    required: true
    rationale: "Identity attestation processing must be complete, valid, accurate, and timely"
  - id: "confidentiality"
    criteria_prefix: "C"
    required: true
    rationale: "Cryptographic credentials and identity attributes are confidential information"
  - id: "privacy"
    criteria_prefix: "P"
    required: true
    rationale: "Personal identity data subject to privacy TSC; SSID processes PII for all users"

