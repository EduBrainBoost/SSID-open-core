# ISO 27001 Compliance Mapping — SSID Platform
# SoT v4.1.0 | Classification: Compliance
# Framework: ISO/IEC 27001:2022 (Information Security Management Systems)
# Generated: 2026-03-15

framework_id: "iso27001"
framework_name: "ISO/IEC 27001 Information Security Management"
standard: "ISO/IEC 27001:2022"
supersedes: "ISO/IEC 27001:2013"
version: "1.0.0"
final_authority: "03_core"
applicability: >
  SSID is a self-sovereign identity platform handling personal data, cryptographic
  credentials, and identity attestations. ISO 27001 Annex A controls apply to the
  entire SSID platform as information security management requirements for
  confidentiality, integrity, and availability of identity data.

# ---------------------------------------------------------------------
# ANNEX A DOMAIN MAPPINGS — SSID roots per ISO 27001:2022 Annex A
# Domains A.5 through A.8 (consolidated from A.5-A.18 in 2013 edition)
# ISO 27001:2022 reorganised to 93 controls across 4 themes:
#   A.5 Organisational (37 controls)
#   A.6 People (8 controls)
#   A.7 Physical (14 controls)
#   A.8 Technological (34 controls)
# Cross-referenced with legacy A.5-A.18 numbering for auditability.
# ---------------------------------------------------------------------

