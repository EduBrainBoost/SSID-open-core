# MiCA Compliance Mapping — SSID Platform
# SoT v4.1.0 | Classification: Compliance
# Framework: Markets in Crypto-Assets Regulation (EU) 2023/1114
# Generated: 2026-03-15

framework_id: "mica"
framework_name: "Markets in Crypto-Assets Regulation"
regulation: "(EU) 2023/1114"
effective_date: "2024-12-30"
jurisdiction: ["EU", "EEA"]
version: "1.0.0"
final_authority: "03_core"
applicability: >
  SSID is a self-sovereign identity platform. MiCA applicability arises
  where SSID capabilities support crypto-asset service providers (CASPs),
  e-money token issuers, or asset-referenced token issuers as identity
  infrastructure for KYC/AML, travel rule compliance, or wallet identity.

# ---------------------------------------------------------------------
# CASP REQUIREMENTS MAPPED TO SSID CAPABILITIES
# ---------------------------------------------------------------------

articles:

