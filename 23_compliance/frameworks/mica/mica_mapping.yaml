        rationale: "Identity assurance scoring for CASP staff and clients"
      - root: "03_core"
        rationale: "Identity validation pipeline for CASP authorisation files"
      - root: "23_compliance"
        rationale: "CASP compliance profile registry and status tracking"
    ssid_shards:
      - shard: "23_compliance/shards/01_identitaet_personen"
        note: "Management body identity verification for CASP authorisation"
      - shard: "23_compliance/shards/13_unternehmen_gewerbe"
        note: "Legal entity identity for CASP registration"
    status: "mapped"
    gap: null

