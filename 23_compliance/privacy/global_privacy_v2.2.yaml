global_privacy:
  version: "2.2.0"
  description: >
    Global privacy compliance configuration for SSID.
    Defines privacy-by-design principles, data handling rules,
    and jurisdiction-specific privacy requirements.

core_principles:
  non_custodial: true
  pii_storage: never
  hash_algorithm: sha3-256
  data_minimisation: enforced
  purpose_limitation: enforced
  storage_limitation: enforced

data_categories:
  - category: identity_hashes
    contains_pii: false
    storage: permanent
    encryption: AES-256-GCM
    access: identity_owner_and_authorized_verifiers

  - category: verification_records
    contains_pii: false
    storage: retention_period
    retention_days: 1825
    encryption: AES-256-GCM
    access: compliance_and_audit

  - category: consent_records
    contains_pii: false
    storage: retention_period
    retention_days: 2555
    encryption: AES-256-GCM
    access: identity_owner_and_compliance

  - category: analytics_aggregates
    contains_pii: false
    storage: permanent
    encryption: AES-256-GCM
    access: internal_analytics

data_subject_rights:
  right_of_access:
    supported: true
    response_time_days: 30
    format: machine_readable_json

  right_to_rectification:
    supported: true
    scope: metadata_only
    notes: Hash-based records are immutable by design

  right_to_erasure:
    supported: partial
    scope: personal_metadata
    notes: Cryptographic erasure via key destruction for linked data
    audit_trail_exempt: true

  right_to_portability:
    supported: true
    formats:
      - w3c_vc_jwt
      - w3c_vc_json_ld
      - ssid_portable_json
    api_ref: 10_interoperability/api_portability/export_import_config.yaml

  right_to_object:
    supported: true
    scope: automated_processing

cross_border_transfers:
  default_mechanism: adequacy_decision
  fallback_mechanism: standard_contractual_clauses
  supplementary_measures:
    - encryption_in_transit
    - pseudonymisation
    - access_controls
  prohibited_transfers_to:
    - countries_without_adequacy_or_scc

privacy_impact_assessment:
  required_for:
    - new_data_processing_activities
    - new_jurisdiction_expansion
    - new_kyc_provider_integration
    - ai_model_deployment
  review_frequency: annual
  approval_authority: data_protection_officer

jurisdiction_overlays:
  gdpr:
    ref: 23_compliance/mappings/gdpr
    dpo_required: true
    lead_supervisory_authority: DE_BfDI
  ccpa_cpra:
    ref: 23_compliance/privacy/ccpa_cpra
    opt_out_required: true
  lgpd:
    ref: 23_compliance/privacy/lgpd_br
    dpo_required: true
  pipl:
    ref: 23_compliance/privacy/pipl_cn
    data_localisation: required
  appi:
    ref: 23_compliance/privacy/appi_jp
    cross_border_consent: required
