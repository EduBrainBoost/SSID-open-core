contract_id: "registry_enforcement_policy-contract"
rule_id: "registry_enforcement_policy"
package: "data.ssid.registry_enforcement"
type: compliance_contract
version: "1.0.0"
derived_from: "23_compliance/policies/registry/registry_enforcement_policy.rego"
enforcement: rego_policy
status: active
default_decision: deny
description: >
  Ensures all artifacts are registered, hash-consistent, and properly referenced.
  Guards must be fail-closed (unknown_value_behavior must be "fail").
deny_conditions:
  - id: "REGISTRY_ENFORCE_001"
    trigger: "artifact on_disk=true without hash_sha256 (unregistered)"
  - id: "REGISTRY_ENFORCE_002"
    trigger: "SHA256 mismatch between disk hash and registry hash"
  - id: "REGISTRY_ENFORCE_003"
    trigger: "artifact without evidence_ref or empty evidence_ref"
  - id: "REGISTRY_ENFORCE_004"
    trigger: "SoT artifact without source_of_truth_ref"
  - id: "REGISTRY_ENFORCE_005"
    trigger: "guard with unknown_value_behavior=skip (fail-open)"
warn_conditions:
  - id: "REGISTRY_WARN_001"
    trigger: "artifact registered but not on disk (stale)"
  - id: "REGISTRY_WARN_002"
    trigger: "non-SoT artifact with source_of_truth_ref set"
input_schema:
  artifacts: "list of {name, path, hash_sha256, evidence_ref, source_of_truth_ref, on_disk, disk_hash}"
  guards: "list of {name, unknown_value_behavior}"
