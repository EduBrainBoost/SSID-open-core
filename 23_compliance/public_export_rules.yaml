# public_export_rules.yaml — SSID Open Core Export Rules
# Defines what may and may not be exported to the public open-core repo.

version: "1.0"
schema: public_export_rules/v1

allow:
  roots:
    - 01_ai_layer
    - 02_audit_logging
    - 03_core
    - 04_deployment
    - 05_documentation
    - 06_data_pipeline
    - 07_governance_legal
    - 08_identity_score
    - 09_meta_identity
    - 10_interoperability
    - 11_test_simulation
    - 12_tooling
    - 13_ui_layer
    - 14_zero_time_auth
    - 15_infra
    - 16_codex
    - 17_observability
    - 18_data_layer
    - 19_adapters
    - 20_foundation
    - 21_post_quantum_crypto
    - 22_datasets
    - 23_compliance
    - 24_meta_orchestration

  file_patterns:
    - "*.py"
    - "*.yaml"
    - "*.yml"
    - "*.json"
    - "*.md"
    - "*.toml"
    - "*.ini"
    - "*.rego"
    - "*.sh"
    - "*.txt"

  root_level_files:
    - README.md
    - LICENSE
    - CONTRIBUTING.md
    - SECURITY.md
    - AGENTS.md
    - CODEOWNERS
    - pyproject.toml
    - pytest.ini

deny:
  roots: []  # All 24 roots are now scaffolded in open-core

  file_patterns:
    - "*.env"
    - "*.pem"
    - "*.key"
    - "*.p12"
    - "*.pfx"
    - "*.secret"
    - "*.credentials"
    - ".env*"
    - "**/.git/**"
    - "**/__pycache__/**"
    - "**/.ssid-system/**"

  content_patterns:
    - "PRIVATE KEY"
    - "API_KEY="
    - "SECRET="
    - "PASSWORD="
    - "Bearer "
    - "sk-"

sanitization:
  strip_comments_containing:
    - "INTERNAL"
    - "TODO(private)"
    - "CONFIDENTIAL"
  hash_pii: true
  hash_algorithm: SHA3-256
