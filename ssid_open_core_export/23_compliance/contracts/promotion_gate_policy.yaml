contract_id: "promotion_gate_policy-contract"
rule_id: "promotion_gate_policy"
package: "data.ssid.promotion_gate"
type: compliance_contract
version: "1.0.0"
derived_from: "23_compliance/policies/registry/promotion_gate_policy.rego"
enforcement: rego_policy
status: active
default_decision: deny
description: >
  Ensures artifacts promoted from canonical (SSID) to derivative (SSID-open-core)
  are complete, hash-consistent, scope-compliant, and free of forbidden patterns.
deny_conditions:
  - id: "PROMO_ENFORCE_001"
    trigger: "canonical artifact on_disk=true with no derivative counterpart"
  - id: "PROMO_ENFORCE_002"
    trigger: "derivative artifact with no canonical source"
  - id: "PROMO_ENFORCE_003"
    trigger: "derivative artifact matches forbidden pattern"
  - id: "PROMO_ENFORCE_004"
    trigger: "canonical/derivative hash drift for same path"
  - id: "PROMO_ENFORCE_005"
    trigger: "derivative artifact path not under any allowed export scope"
warn_conditions:
  - id: "PROMO_WARN_001"
    trigger: "canonical artifact exported without evidence_ref"
input_schema:
  canonical_artifacts: "list of {name, path, hash_sha256, evidence_ref, source_of_truth_ref, on_disk}"
  derivative_artifacts: "list of {name, path, hash_sha256, on_disk}"
  export_scopes: "list of allowed path prefix strings"
  forbidden_patterns: "list of forbidden path pattern strings"
