ssid_context: >
  SSID issues a utility token that provides access to identity verification
  services on the network. Under MiCA, this classifies as a crypto-asset
  other than ART/EMT, falling under Title II. SSID is NOT a CASP
  (Crypto-Asset Service Provider) — it provides infrastructure, not
  custody, exchange, or trading services.

non_custodial_note: >
  MiCA CASP obligations (Title V) do NOT apply to SSID because SSID
  provides non-custodial infrastructure. The token holder retains
  full control. SSID is subject to Title II (issuance of crypto-assets
  other than ARTs or EMTs) and must comply with white paper and
  marketing requirements.

