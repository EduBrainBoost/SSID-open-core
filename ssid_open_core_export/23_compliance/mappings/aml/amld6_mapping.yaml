ssid_context: >
  AMLD6 replaces AMLD5 and introduces stricter AML requirements.
  SSID as non-custodial identity infrastructure is NOT an obliged entity
  under AMLD6. However, SSID provides identity verification infrastructure
  that CASPs and VASPs (who ARE obliged entities) use to meet their
  customer due diligence (CDD) obligations.

non_custodial_note: >
  SSID does not hold customer funds or assets. It does not perform
  transactions on behalf of users. Therefore, SSID is NOT an obliged
  entity under AMLD6. The mapping below describes how SSID infrastructure
  SUPPORTS obliged entities in meeting their AMLD6 obligations.

