ssid_context: >
  The FATF Travel Rule requires VASPs and financial institutions to
  collect and transmit originator and beneficiary information during
  crypto-asset transfers. SSID is NOT a VASP — it provides identity
  infrastructure that VASPs can use to comply with the Travel Rule
  through hash-based identity attestation and ZKP selective disclosure.

non_custodial_note: >
  SSID does not transmit, exchange, or transfer crypto-assets. It does
  not qualify as a VASP under FATF definitions. SSID provides the
  identity attestation layer that VASPs integrate for Travel Rule compliance.

