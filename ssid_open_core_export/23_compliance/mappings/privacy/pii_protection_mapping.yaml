regulation_id: "SSID_PII_PROTECTION"
regulation_name: "SSID PII Protection Mapping"
version: "1.0.0"
last_reviewed: "2026-03-29"

description: >
  Maps SSID's PII protection mechanisms across all applicable regulations.
  SSID's core architectural principle: NEVER store raw PII — only SHA3-256
  hashes. This mapping documents how PII protection is enforced at
  every layer of the SSID architecture.

non_custodial_principle: >
  SSID operates under a strict non-custodial model. No PII is stored
  in any SSID system — only cryptographic hashes (SHA3-256). Users
  maintain sole custody of their identity data.

