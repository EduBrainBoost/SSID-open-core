    control_type: "technical"
    implementation_status: "implemented"
    evidence_path: "23_compliance/evidence/core/salted_hashing.json"
    regulations_supported:
      - "GDPR Art. 32"
    notes: "Prevents rainbow table attacks; salt stored in user-controlled vault"

