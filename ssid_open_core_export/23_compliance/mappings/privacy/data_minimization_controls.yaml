regulation_id: "SSID_DATA_MIN"
regulation_name: "SSID Data Minimization Controls"
version: "1.0.0"
last_reviewed: "2026-03-29"

description: >
  Comprehensive mapping of SSID's data minimization controls that enforce
  the non-custodial, hash-only architectural principle. These controls
  underpin compliance with GDPR Art. 5(1)(c), Art. 25, and the broader
  privacy-by-design philosophy.

non_custodial_principle: >
  SSID NEVER stores raw PII. Only SHA3-256 hashes are persisted.
  Users hold their own data and keys. This is enforced at architectural,
  technical, and policy levels across all 24 canonical roots.

controls:
  - control_id: "DM-001"
    title: "SHA3-256 hash-only storage"
    description: "All identity attributes stored as SHA3-256 hashes only"
    ssid_root: "03_core"
    ssid_shard: "identity/hash_store"
    control_type: "technical"
    implementation_status: "implemented"
    evidence_path: "23_compliance/evidence/core/hash_only_storage.json"
