# Open Core Export Allowlist (SSID → SSID-open-core)
# Policy: DENY-BY-DEFAULT. Only paths listed here are exported to the public repo.
# Everything not listed is implicitly excluded from the open-core mirror.
#
# Usage with git-filter-repo:
#   git filter-repo \
#     --path README.md \
#     --path LICENSE \
#     --path CONTRIBUTING.md \
#     --path .gitignore \
#     --path 03_core/ \
#     --path 12_tooling/cli/ \
#     --path 12_tooling/scripts/ \
#     --path 16_codex/decisions/ \
#     --path 16_codex/contracts/sot/ \
#     --path 23_compliance/policies/sot/ \
#     --path 23_compliance/exceptions/ \
#     --path 24_meta_orchestration/dispatcher/ \
#     --force
#
# Governance: Changes to this file require ADR review.
# Last reviewed: 2026-02-12

version: "1.0"
policy: deny-by-default
classification: PUBLIC - Open Core Export Control

# Root-level files allowed in public mirror
root_files:
  - README.md
  - LICENSE
  - CONTRIBUTING.md
  - .gitignore
  - pytest.ini

# Module paths allowed in public mirror (recursive)
# Only structural, non-proprietary, non-secret paths
allowed_paths:
  # Core validators (SoT logic, no secrets)
  - 03_core/validators/sot/

  # CLI tooling (gates, dispatcher wrapper, validator CLI)
  - 12_tooling/cli/
  - 12_tooling/scripts/

  # Architecture decisions and SoT contracts (public governance)
  - 16_codex/decisions/
  - 16_codex/contracts/sot/

  # Compliance policies (OPA rules, exception definitions)
  - 23_compliance/policies/sot/
  - 23_compliance/exceptions/

  # Export allowlist itself (transparency/audit)
  - 23_compliance/policies/open_core_export_allowlist.yaml

  # Dispatcher implementation (canonical, no secrets)
  - 24_meta_orchestration/dispatcher/

# Paths explicitly DENIED from public export (redundant with deny-by-default, but explicit for audit)
denied_paths:
  # Evidence, logs, raw data (internal audit only)
  - 02_audit_logging/

  # Deployment configs (may contain infra details)
  - 04_deployment/

  # Legacy documentation (contains prompt artifacts, vendor refs)
  - 05_documentation/

  # Data pipelines (proprietary processing logic)
  - 06_data_pipeline/

  # Governance/legal documents (internal)
  - 07_governance_legal/

  # Identity scoring (proprietary algorithms)
  - 08_identity_score/

  # Meta identity (proprietary)
  - 09_meta_identity/

  # Interoperability adapters (may contain API details)
  - 10_interoperability/

  # Test simulation (internal test infra)
  - 11_test_simulation/

  # UI layer (proprietary frontend)
  - 13_ui_layer/

  # Zero-time auth (proprietary crypto)
  - 14_zero_time_auth/

  # Infrastructure (secrets, cloud configs)
  - 15_infra/

  # Observability (internal monitoring)
  - 17_observability/

  # Data layer (database schemas, internal)
  - 18_data_layer/

  # Adapters (vendor-specific integrations)
  - 19_adapters/

  # Foundation (internal base libraries)
  - 20_foundation/

  # Post-quantum crypto (proprietary research)
  - 21_post_quantum_crypto/

  # Datasets (training/test data, PII risk)
  - 22_datasets/

  # Registry and orchestration internals
  - 24_meta_orchestration/registry/

  # Shards (internal module decomposition)
  - "*/shards/"

# Deny patterns (filename-level, catch-all)
denied_patterns:
  - "*.env"
  - "*.env.*"
  - "*.pem"
  - "*.key"
  - "*.p12"
  - "*.jks"
  - "*.pfx"
  - "*.secrets"
  - "*.secret"
  - "*.token"
  - ".claude/"
  - ".ssid_sandbox/"
  - "__pycache__/"
  - "*.pyc"
