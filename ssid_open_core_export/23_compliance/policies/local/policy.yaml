version: "1.0.0"
root: "23_compliance"
generated_utc: "2026-03-15T00:00:00Z"
sot_version: "4.1.0"
status: "ROOT-24-LOCK"

description: >
  Policy definitions for the Compliance & Governance module. 23_compliance is
  the central compliance authority for the entire SSID platform. It hosts all
  regulatory mappings, evidence artifacts, anti-gaming rules, policy files, and
  retention policies that all other roots reference. This root's policies govern
  the governance layer itself.

policies:
  # --- Access Control ---
  - id: "AC-COMP-001"
    category: "access_control"
    title: "Compliance Evidence Write Authority"
    requirement: >
      Write access to 23_compliance/evidence/ is restricted to the originating
      module's automated pipelines and compliance reviewers. Manual evidence
      manipulation without audit trail is prohibited.
    enforcement: "strict"
    evidence_required: true
    evidence_path: "23_compliance/evidence/compliance/"

  - id: "AC-COMP-002"
    category: "access_control"
    title: "Regulatory Mapping Governance"
    requirement: >
      Updates to regulatory mappings in 23_compliance/mappings/ require
      dual-review with both compliance_reviewer and architecture_reviewer.
      Automated tools may append evidence but may not modify existing mappings.
    enforcement: "strict"
    evidence_required: true

  - id: "AC-COMP-003"
    category: "access_control"
    title: "Anti-Gaming Rules Write Control"
    requirement: >
      Changes to anti_gaming/ rules require compliance_reviewer approval.
      Anti-gaming rules are platform-wide and cannot be overridden by
      individual module policies.
    enforcement: "strict"
    evidence_required: true

  - id: "AC-COMP-004"
    category: "access_control"
    title: "Exception Registry Governance"
    requirement: >
      Exceptions recorded in exceptions/ require documented justification,
      risk acceptance sign-off, and expiry date. Open-ended exceptions
      with no expiry are prohibited.
    enforcement: "strict"
    evidence_required: true

  # --- Data Handling ---
  - id: "DH-COMP-001"
    category: "data_handling"
    title: "Evidence Immutability"
    requirement: >
      All evidence artifacts in 23_compliance/evidence/ must be write-once
      append-only. Deletion or modification of filed evidence is prohibited.
      Evidence integrity must be verified via cryptographic hash on every read.
    enforcement: "strict"
    evidence_required: false

  - id: "DH-COMP-002"
    category: "data_handling"
    title: "Privacy Evidence Separation"
    requirement: >
      Privacy-related evidence (GDPR, consent records) must be stored in
      23_compliance/privacy/ with stricter access controls than general
      compliance evidence. Cross-referencing is permitted but data co-location
      with non-privacy evidence is prohibited.
    enforcement: "strict"
    evidence_required: true

  - id: "DH-COMP-003"
    category: "data_handling"
    title: "Retention Schedule Enforcement"
    requirement: >
      All evidence and compliance data must adhere to retention schedules
      defined per regulatory framework. Automated deletion must be documented.
      Retention beyond schedule requires legal hold documentation.
    enforcement: "strict"
    evidence_required: true
    references:
      - "GDPR Art. 5(1)(e)"

  # --- Operational ---
  - id: "OP-COMP-001"
    category: "operational"
    title: "Claims Guard Active Status"
    requirement: >
      23_compliance/policies/claims_guard.rego must be active and enforced on
      every release pipeline run. Releases that bypass claims_guard are prohibited.
      Claims guard status must be verified in CI/CD pipeline.
    enforcement: "strict"
    evidence_required: true
    references:
      - "23_compliance/policies/claims_guard.rego"

  - id: "OP-COMP-002"
    category: "operational"
    title: "Audit Cycle Execution"
    requirement: >
      The audit cycle defined in audit_cycle.yaml must be executed on schedule.
      Missed audit cycles must be escalated to compliance_reviewer within 24 hours.
      Audit results must be filed in evidence/ within 5 business days.
    enforcement: "strict"
    evidence_required: true
    references:
      - "23_compliance/audit_cycle.yaml"

  - id: "OP-COMP-003"
    category: "operational"
    title: "Structure Policy Enforcement"
    requirement: >
      The ROOT-24-LOCK structure policy in 23_compliance/policies/structure_policy.yaml
      must be enforced on every CI pipeline run. Structure violations must block
      deployment.
    enforcement: "strict"
    evidence_required: false
    references:
      - "23_compliance/policies/structure_policy.yaml"

  - id: "OP-COMP-004"
    category: "operational"
    title: "Sector Audit Completeness"
    requirement: >
      sector_audits/ must contain audit records for all active regulated sectors.
      Missing sector coverage must be documented as an open finding with a remediation
      timeline.
    enforcement: "advisory"
    evidence_required: true

  # --- Compliance ---
  - id: "CO-COMP-001"
    category: "compliance"
    title: "Comprehensive Regulatory Coverage"
    requirement: >
      23_compliance/mappings/ must maintain current mappings for: eIDAS2, GDPR,
      MiCA, NIS2, DORA, EU AI Act, PSD2, PSD3. Each mapping must have a
      last-reviewed date not older than 12 months.
    enforcement: "strict"
    evidence_required: true

  - id: "CO-COMP-002"
    category: "compliance"
    title: "Regional Compliance Completeness"
    requirement: >
      regional/ must cover all jurisdictions where the platform operates.
      Entering a new jurisdiction requires a compliance gap analysis filed
      in 23_compliance/regional/ before go-live.
    enforcement: "strict"
    evidence_required: true
    references:
      - "23_compliance/regional/"

  - id: "CO-COMP-003"
    category: "compliance"
    title: "AI/ML Compliance Readiness"
    requirement: >
      ai_ml_ready/ must document EU AI Act conformance for all AI modules.
      High-risk AI systems must have conformity assessment documentation
      before production deployment.
    enforcement: "strict"
    evidence_required: true
    references:
      - "23_compliance/ai_ml_ready/"

enforcement_defaults:
  mode: "strict"
  override_requires: "dual_review"
  audit_log_target: "02_audit_logging/"
  evidence_base: "23_compliance/evidence/compliance/"
