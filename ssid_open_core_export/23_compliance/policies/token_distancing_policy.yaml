schema_version: "1.0.0"
policy_id: "SSID-OC-TDP-001"
name: "Token Distancing Policy"
description: "Prevents integration of foreign token claims in SSID-open-core"
scope: "SSID-open-core"
effective_date: "2026-03-28"
rules:
  - id: "TDP-001"
    description: "No foreign BSC/BEP-20 token code or references"
    enforcement: "reject"
  - id: "TDP-002"
    description: "No token airdrop, DAO governance, or NFT integration from third parties"
    enforcement: "reject"
  - id: "TDP-003"
    description: "No custody or fund-holding functionality"
    enforcement: "reject"
  - id: "TDP-004"
    description: "No external token listing endorsements"
    enforcement: "reject"
  - id: "TDP-005"
    description: "SSID token is utility/governance only, no payment function"
    enforcement: "enforce"
