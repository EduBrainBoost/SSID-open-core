# SSID Blockchain Proof Privacy Policy
# SoT v4.1.0 | ROOT-24-LOCK | Module: 23_compliance
#
# Defines privacy rules for all blockchain-anchored proofs.
# Core principle: Only hashes on-chain, never PII.
#
# Cross-ref: 23_compliance/policies/hash_only_data.rego
# Cross-ref: 23_compliance/policies/non_custodial_enforcement.rego

version: "1.0.0"
policy_id: "blockchain_proof_privacy"
status: active
last_updated: "2026-03-29"
review_cycle: "quarterly"
enforcement: fail_closed

principle: >
  All blockchain-anchored proofs must preserve user privacy.
  Only cryptographic hashes (SHA3-256) are stored on-chain.
  No personally identifiable information (PII) is ever written to any
  distributed ledger. Correlation between on-chain hashes and off-chain
  identity requires explicit user consent.

rules:
  - id: "bpp_001_hash_only"
    description: "Only SHA3-256 hashes are permitted on-chain, never raw PII"
    enforcement: "hash_only_data.rego + smart_contract_validation"
    hash_algorithm: "SHA3-256"
    prohibited_on_chain:
      - "name"
      - "address"
      - "date_of_birth"
      - "national_id"
      - "email"
      - "phone"
      - "biometric_data"
      - "document_images"
      - "any_pii"

  - id: "bpp_002_selective_disclosure"
    description: "Zero-knowledge proofs for selective disclosure where possible"
    enforcement: "policy + zkp_verifier"
    details: >
      Where technically feasible, proofs must use zero-knowledge proof
      protocols to allow selective attribute disclosure without revealing
      the full credential or underlying data.
    preferred_protocols:
      - "zk-SNARKs"
      - "zk-STARKs"
      - "BBS+ signatures"

  - id: "bpp_003_no_correlation_without_consent"
    description: "No correlation between on-chain hashes and off-chain identity without user consent"
    enforcement: "consent_manager + policy"
    details: >
      SSID systems and any third-party integrators must not attempt to
      correlate on-chain hash references with off-chain identity data
      unless the data subject has provided explicit, informed, revocable
      consent for the specific correlation purpose.
    consent_requirements:
      - "explicit_opt_in"
      - "purpose_limitation"
      - "revocable_at_any_time"
      - "granular_per_attribute"

  - id: "bpp_004_hash_salting"
    description: "All hashes must be salted using keyed hashing (HMAC or equivalent)"
    enforcement: "validator + smart_contract"
    details: >
      To prevent rainbow table attacks and cross-reference correlation,
      all hashes stored on-chain must use keyed hashing. The salt/key
      must be unique per user and stored securely off-chain.
    requirements:
      - "unique_salt_per_user"
      - "salt_stored_off_chain_only"
      - "salt_never_on_chain"
      - "minimum_salt_length_256_bits"
    prohibited:
      - "unsalted_hashes"
      - "shared_salts_across_users"
      - "deterministic_hashes_without_salt"

  - id: "bpp_005_retention"
    description: "On-chain hash references are permanent; off-chain data follows GDPR retention"
    enforcement: "gdpr_erasure.rego + retention_scheduler"
    on_chain:
      retention: "permanent"
      rationale: "Immutable ledger -- hashes contain no PII and cannot be erased"
    off_chain:
      retention: "gdpr_compliant"
      erasure_right: true
      max_retention_without_consent: "as_per_gdpr_article_17"
      deletion_proof: "sha3_256_hash_of_deletion_record"

  - id: "bpp_006_no_pii_metadata"
    description: "Transaction metadata must not leak PII"
    enforcement: "validator + policy"
    details: >
      On-chain transaction metadata (timestamps, gas payer addresses,
      contract interaction patterns) must not be structured in a way
      that enables PII inference or deanonymization.

compliance_refs:
  - "23_compliance/policies/hash_only_data.rego"
  - "23_compliance/policies/non_custodial_enforcement.rego"
  - "23_compliance/policies/gdpr_erasure.rego"
  - "23_compliance/policies/kyc_proof_only_policy.yaml"
  - "21_post_quantum_crypto/"
  - "07_governance_legal/LEGAL_NON_CUSTODIAL_NOTICE.md"
