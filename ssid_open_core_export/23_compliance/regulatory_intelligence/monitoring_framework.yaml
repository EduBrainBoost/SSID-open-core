# ---------------------------------------------------------------------------
# Classification Taxonomy
# ---------------------------------------------------------------------------
classification:
  categories:
    applicable:
      description: >
        Regulatory change directly impacts SSID system architecture,
        operations, or compliance posture. Requires impact assessment
        and potential system modification.
      action: "impact_assessment_required"
      sla: "5_business_days"
      escalation: "compliance_lead"

    observed:
      description: >
        Regulatory change is relevant to the SSID domain but does not
        currently require system changes. Monitored for future impact.
      action: "add_to_watch_list"
      sla: "10_business_days"
      escalation: "none"

    excluded:
      description: >
        Regulatory change has been reviewed and determined to be outside
        SSID scope. No action required.
      action: "archive_with_rationale"
      sla: "none"
      escalation: "none"

    deprecated:
      description: >
        Previously applicable regulation that has been superseded,
        repealed, or is no longer relevant. Retained for audit trail.
      action: "archive_and_update_references"
      sla: "10_business_days"
      escalation: "none"

  classification_workflow:
    - step: 1
      action: "automated_keyword_classification"
      description: "NLP-based keyword matching against SSID domain taxonomy"
      confidence_threshold: 0.85

    - step: 2
      action: "automated_jurisdiction_mapping"
      description: "Map change to affected SSID jurisdictions and credential types"

    - step: 3
      action: "manual_review"
      description: "Compliance analyst reviews automated classification"
      trigger: "confidence < 0.85 OR category = applicable"

    - step: 4
      action: "final_classification"
      description: "Classification confirmed and entered into regulatory register"

# ---------------------------------------------------------------------------
# Change Detection Mechanism
# ---------------------------------------------------------------------------
change_detection:

  content_hashing:
    description: >
      Each monitored source page/feed is hashed (SHA-256) at every poll.
      A hash change triggers the diff pipeline.
    algorithm: "sha256"
    scope: "normalized_text_content"
    storage: "append_only_hash_log"

  diff_pipeline:
    - step: 1
      action: "content_diff"
      description: "Compute textual diff between previous and current content"
      tool: "unified_diff"

    - step: 2
      action: "change_significance_scoring"
      description: >
        NLP-based scoring of change significance. Filters out minor
        formatting changes, date updates, and non-substantive edits.
      threshold: 0.3
      note: "Score 0-1, where 1 = major regulatory change"

    - step: 3
      action: "keyword_extraction"
      description: "Extract regulatory keywords and map to SSID domain areas"
      domain_keywords:
        - "digital identity"
        - "verifiable credential"
        - "decentralized identifier"
        - "self-sovereign"
        - "blockchain"
        - "distributed ledger"
        - "cryptocurrency"
        - "virtual asset"
        - "AML"
        - "KYC"
        - "sanctions"
        - "data protection"
        - "privacy"
        - "post-quantum"
        - "eIDAS"
        - "GDPR"
        - "stablecoin"
        - "token"

    - step: 4
      action: "deduplication"
      description: >
        Cross-reference against existing regulatory register to prevent
        duplicate entries from multiple sources reporting the same change.
      method: "semantic_similarity"
      threshold: 0.9

    - step: 5
      action: "classification_trigger"
      description: "Significant, non-duplicate changes enter the classification workflow"

  false_positive_handling:
    strategy: "confidence_gated_manual_review"
    auto_dismiss_threshold: 0.1
    auto_classify_threshold: 0.85
    manual_review_range: "0.1-0.85"

# ---------------------------------------------------------------------------
# Alert Channels
# ---------------------------------------------------------------------------
alert_channels:

  critical:
    description: "Immediate alerts for sanctions changes, enforcement actions, and high-impact regulatory shifts"
    channels:
      - type: "webhook"
        target: "compliance_ops_channel"
        format: "structured_json"
        latency: "immediate"
      - type: "email"
        target: "compliance_lead_distribution_list"
        format: "html_digest"
        latency: "immediate"
      - type: "ticket"
        target: "compliance_board"
        format: "structured_issue"
        latency: "immediate"
        auto_assign: "compliance_lead"
    triggers:
      - "blacklisted jurisdiction change"
      - "sanctions list update (OFAC SDN, EU Consolidated)"
      - "enforcement action against SSID-relevant entity"
      - "eIDAS implementation deadline change"
      - "GDPR enforcement decision with identity sector impact"

  high:
    description: "Timely alerts for significant regulatory developments requiring assessment"
    channels:
      - type: "webhook"
        target: "compliance_ops_channel"
        format: "structured_json"
        latency: "within_1h"
      - type: "email"
        target: "compliance_team_distribution_list"
        format: "html_digest"
        latency: "daily_batch"
    triggers:
      - "new regulation adopted (applicable classification)"
      - "FATF grey/black list update"
      - "significant guidance from monitored authority"
      - "post-quantum standard publication (NIST/IETF)"

  medium:
    description: "Regular updates on observed regulatory developments"
    channels:
      - type: "email"
        target: "compliance_team_distribution_list"
        format: "weekly_digest"
        latency: "weekly"
      - type: "dashboard"
        target: "regulatory_intelligence_dashboard"
        format: "structured_entry"
        latency: "on_classification"
    triggers:
      - "observed classification changes"
      - "consultation papers and proposals"
      - "industry guidance updates"

  low:
    description: "Informational updates logged for audit and reference"
    channels:
      - type: "dashboard"
        target: "regulatory_intelligence_dashboard"
        format: "structured_entry"
        latency: "on_classification"
    triggers:
      - "excluded classification (for audit trail)"
      - "deprecated regulation updates"
      - "minor source content changes"

# ---------------------------------------------------------------------------
# Operational Parameters
# ---------------------------------------------------------------------------
operational:
  data_retention:
    raw_content: "90_days"
    content_hashes: "indefinite"
    classification_records: "indefinite"
    alert_history: "7_years"
    note: "Retention aligned with 23_compliance/audit_cycle.yaml"

  health_monitoring:
    source_availability_check: "1h"
    stale_source_threshold: "72h"
    stale_source_action: "alert_and_manual_check"
    feed_parse_error_threshold: 3
    feed_parse_error_action: "disable_source_and_alert"

  performance_targets:
    critical_alert_latency: "<15min"
    high_alert_latency: "<1h"
    classification_sla: "5_business_days"
    source_coverage: ">95%_uptime"

