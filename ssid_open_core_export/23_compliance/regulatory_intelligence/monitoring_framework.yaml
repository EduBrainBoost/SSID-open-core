# SSID Regulatory Intelligence Monitoring Framework
# SoT v4.1.0 | ROOT-24-LOCK | Module: 23_compliance
#
# Defines the monitoring infrastructure for tracking regulatory changes
# across jurisdictions relevant to the SSID ecosystem. Covers source
# types, monitored authorities, update cycles, classification taxonomy,
# change detection mechanisms, and alert routing.

version: "1.0.0"
last_updated: "2026-03-28"
review_cycle: "quarterly"

# ---------------------------------------------------------------------------
# Source Types
# ---------------------------------------------------------------------------
source_types:

  rss:
    description: "RSS/Atom feeds from regulatory authority websites and legal gazettes"
    polling_interval: "6h"
    parser: "feedparser_v6"
    reliability: "high"
    latency: "6-24h from publication"
    failure_mode: "retry_3x_then_alert"

  api:
    description: "Structured API endpoints providing machine-readable regulatory data"
    polling_interval: "4h"
    parser: "json_schema_validator"
    reliability: "very_high"
    latency: "near_realtime"
    failure_mode: "retry_exponential_backoff"
    authentication: "api_key_via_vault"

  gazette:
    description: "Official government gazettes and legal journals (PDF/HTML)"
    polling_interval: "24h"
    parser: "pdf_text_extraction_plus_nlp"
    reliability: "high"
    latency: "24-72h from enactment"
    failure_mode: "queue_for_manual_review"

  scraper:
    description: "Web scraping for authorities without RSS or API access"
    polling_interval: "12h"
    parser: "headless_browser_extraction"
    reliability: "moderate"
    latency: "12-48h from publication"
    failure_mode: "content_hash_comparison_on_failure"
    note: "Scraper targets are reviewed quarterly for structural changes"

