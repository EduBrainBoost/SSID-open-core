# SSID Open-Core Allowlist
# Defines the 5 canonical roots permitted in the open-core repository.
# Generated: 2026-03-29
# Authority: ROOT-24-LOCK + Open-Core Policy

schema_version: "1.0.0"

allowed_roots:
  03_core:
    description: "Core identity logic, public-facing SDK and schemas"
    rules:
      - "Public API surface only"
      - "No internal state machines"
      - "No proprietary scoring algorithms"
    allowed_subdirectories:
      - "shards/"
      - "docs/"
      - "contracts/"
      - "interfaces/"
      - "conformance/"
      - "governance/"
      - "policies/"
    notes: "Kernel-adjacent code requires manual review before inclusion"

  12_tooling:
    description: "Developer tooling, CLI utilities, linters, generators"
    rules:
      - "No internal deployment scripts"
      - "No credentials or vault references"
      - "Open-source compatible tooling only"
    allowed_subdirectories:
      - "shards/"
      - "docs/"
      - "contracts/"
      - "interfaces/"
      - "conformance/"
      - "governance/"
      - "policies/"
    notes: "Tooling must not depend on proprietary infrastructure"

  16_codex:
    description: "System-of-Truth documentation, canonical schemas, registry"
    rules:
      - "No internal architecture decisions (ADRs stay private)"
      - "No system-secrets references"
      - "Public documentation and schema definitions only"
    allowed_subdirectories:
      - "shards/"
      - "docs/"
      - "contracts/"
      - "interfaces/"
      - "conformance/"
      - "governance/"
      - "policies/"
    notes: "Codex is the public-facing documentation layer"

  23_compliance:
    description: "Compliance frameworks, audit templates, governance artifacts"
    rules:
      - "No internal audit results"
      - "No WORM-sealed evidence"
      - "Framework templates and public policies only"
    allowed_subdirectories:
      - "shards/"
      - "docs/"
      - "contracts/"
      - "interfaces/"
      - "conformance/"
      - "governance/"
      - "policies/"
      - "opencore/"
    notes: "Compliance artifacts must be sanitized before open-core inclusion"

  24_meta_orchestration:
    description: "Orchestration schemas, workflow definitions, meta-layer"
    rules:
      - "No internal orchestration state"
      - "No agent configurations with secrets"
      - "Public workflow schemas and interfaces only"
    allowed_subdirectories:
      - "shards/"
      - "docs/"
      - "contracts/"
      - "interfaces/"
      - "conformance/"
      - "governance/"
      - "policies/"
    notes: "Orchestration logic visible, internal state hidden"

# Global file extension allowlist
allowed_extensions:
  code:
    - ".py"
    - ".ts"
    - ".tsx"
    - ".js"
    - ".jsx"
    - ".rs"
    - ".go"
  config:
    - ".yaml"
    - ".yml"
    - ".json"
    - ".toml"
  documentation:
    - ".md"
    - ".mdx"
    - ".txt"
  schema:
    - ".schema.json"
    - ".openapi.yaml"
  ci:
    - ".yml"  # under .github/workflows only

# Forbidden patterns (NEVER allowed in open-core)
forbidden_patterns:
  - "**/.env"
  - "**/.env.*"
  - "**/secrets/**"
  - "**/keys/**"
  - "**/credentials/**"
  - "**/private/**"
  - "**/worm/**"
  - "**/evidence/**"
  - "**/internal/**"
  - "**/quarantine/**"
  - "**/*.pem"
  - "**/*.key"
  - "**/*.p12"
  - "**/*.pfx"
  - "**/*secret*"
  - "**/*credential*"
  - "**/*private_key*"
  - "**/*.lock"  # lock files from session isolation
  - "**/.ssid-system/**"

# Root-level files allowed
allowed_root_files:
  - "README.md"
  - "CONTRIBUTING.md"
  - "LICENSE"
  - "DCO.txt"
  - "SECURITY.md"
  - "AGENTS.md"
  - "CLAUDE.md"
  - ".gitignore"
  - ".env.example"
  - "pyproject.toml"
  - "pytest.ini"

# CI/CD allowed
allowed_ci:
  path: ".github/workflows/"
  allowed_files:
    - "open_core_ci.yml"
    - "cron_daily_structure_gate.yml"
  forbidden_patterns:
    - "*deploy*"
    - "*internal*"
    - "*sanctions*"
    - "*quarterly_audit*"
