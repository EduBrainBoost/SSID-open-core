# eIDAS 2.0 — EU Jurisdiction Compliance Policy
# SSID-open-core | 23_compliance/jurisdictions/eu/
# Classification: Compliance | Level-3 Specification
# Generated: 2026-03-15

policy:
  id: "EU-EIDAS2-001"
  name: "eIDAS 2.0 — Electronic Identification and Trust Services"
  version: "1.0.0"
  status: "active"
  regulatory_reference: "Regulation (EU) 2024/1183 amending Regulation (EU) No 910/2014 (eIDAS)"
  issuing_body: "European Parliament and Council of the EU"
  reference_url: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX%3A32024R1183"
  jurisdiction: "European Union"
  scope: "Electronic identification, authentication, and digital wallets across EU member states"
  effective_date: "2024-05-20"
  wallet_deployment_deadline: "2026-11-20"
  last_reviewed: "2026-03-15"

applicability:
  entities:
    - "Member state identity providers"
    - "Qualified Trust Service Providers (QTSPs)"
    - "Relying parties accepting EU Digital Identity Wallets"
    - "SSID as identity infrastructure provider"
  services:
    - "Electronic identification (eID)"
    - "EU Digital Identity Wallet (EUDIW)"
    - "Qualified electronic signatures (QES)"
    - "Qualified electronic seals"
    - "Qualified website authentication certificates (QWAC)"

requirements:
  eu_digital_identity_wallet:
    mandate: "Member states must provide EUDIW to all citizens and legal entities"
    acceptance: "Large online platforms and public services must accept EUDIW"
    attributes:
      - field: "person_identification_data_hash"
        format: "sha256_hash"
        note: "PID — hashed before SSID storage; selective disclosure via ZK-proof"
      - field: "qualified_electronic_signature_ref"
        format: "certificate_hash"
      - field: "diplomas_professional_certs_hash"
        format: "sha256_hash"
        conditional: "optional attestation"

  assurance_levels:
    low: "Basic authentication"
    substantial: "Multi-factor authentication required"
    high: "Hardware-backed credential + face/biometric match (hash only in SSID)"

  qualified_electronic_signature:
    legal_effect: "Equivalent to handwritten signature (Art. 25)"
    requirements:
      - "Qualified certificate from QTSP"
      - "Qualified Signature Creation Device (QSCD)"
    ssid_approach: "SSID provides hash of signing certificate; private key never leaves device"

  interoperability:
    cross_border: "Mandatory mutual recognition across all EU member states"
    technical_framework: "ARF (Architecture Reference Framework) v1.4+"
    protocols:
      - "OpenID4VC (OpenID for Verifiable Credentials)"
      - "SD-JWT (Selective Disclosure JWT)"
      - "ISO/IEC 18013-5 (mDL)"

  data_minimization:
    principle: "Only attributes strictly necessary for service may be requested"
    selective_disclosure: "Mandatory — users choose which attributes to share"
    ssid_implementation: "ZK-proof selective disclosure — SSID reveals only required claims"

ssid_compliance:
  approach: "hash_only_non_custodial_zk_selective_disclosure"
  data_handling: "hash_only"
  storage: "non_custodial"
  pii: "never_stored"
  evidence_chain: "sha256_chain"
  zk_proof: true

  capability_mapping:
    person_identification_data: "sha256(PID_normalized) — never stored plaintext"
    age_attestation: "ZK-proof of age >= threshold — no DOB stored"
    address_attestation: "ZK-proof of address in jurisdiction — no plaintext"
    professional_qualification: "sha256(cert_content) — verifiable hash"
    wallet_instance_attestation: "sha256(wallet_binding_key) per device"

  assurance_level_mapping:
    low: "SSID credential tier 1"
    substantial: "SSID credential tier 2 + MFA evidence"
    high: "SSID credential tier 3 + hardware attestation hash"

  eidas_bridge:
    description: >
      SSID acts as a eIDAS-conformant identity bridge: accepts EUDIW-issued
      Verifiable Credentials, maps to SSID shard proofs, emits hash-only
      compliance evidence. PII never traverses SSID storage layers.

evidence_requirements:
  format: "SHA-256 hash manifest"
  storage_path: "23_compliance/evidence/compliance/"
  retention_years: 7
  regulatory_minimum_years: 7
  audit_trail: "Cryptographic log of authentication events (hash only)"

governance:
  owner: "23_compliance"
  review_cycle: "annual"
  related_policies:
    - "jurisdictions/eu/gdpr_policy.yaml"
    - "jurisdictions/eu/micar_policy.yaml"
  supervisory_body: "National Supervisory Bodies + ENISA technical coordination"
