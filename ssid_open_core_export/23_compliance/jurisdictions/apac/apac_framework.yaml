# APAC Compliance Framework for SSID (Minimal)
# Jurisdiction: Asia-Pacific Region
# Context: Non-custodial, hash-only, utility-token infrastructure
# Version: 1.0.0
# Last updated: 2026-03-15

jurisdiction_id: "APAC"
name: "Asia-Pacific Compliance Framework"
description: >
  Minimal regulatory mapping for SSID operations relevant to the
  Asia-Pacific region. Covers key jurisdictions with progressive
  digital asset and identity frameworks. SSID's non-custodial,
  utility-token architecture is assessed per jurisdiction.

jurisdictions:
  - jurisdiction_id: "SG"
    name: "Singapore"
    primary_regulator: "Monetary Authority of Singapore (MAS)"
    applicable_regulations:
      - regulation_id: "SG-PSA"
        name: "Payment Services Act 2019 (PSA)"
        ssid_impact: "low"
        description: >
          PSA regulates payment services including digital payment
          token (DPT) services. SSID as non-custodial infrastructure
          is not a DPT service provider.
        ssid_position: "Non-custodial; no PSA license required."

      - regulation_id: "SG-SFA"
        name: "Securities and Futures Act"
        ssid_impact: "low"
        description: >
          Governs capital markets products. SSID utility token
          is not a capital markets product under MAS guidance.

      - regulation_id: "SG-PDPA"
        name: "Personal Data Protection Act 2012"
        ssid_impact: "medium"
        description: >
          Singapore's data protection law. Hash-only processing
          minimizes compliance requirements. Consent and purpose
          limitation requirements apply.
        ssid_controls:
          - "Hash-only data processing"
          - "Consent-based identity verification"
          - "Data protection officer designation"

    cross_reference: "23_compliance/jurisdictions/sg_hk_jp_au/"

  - jurisdiction_id: "HK"
    name: "Hong Kong SAR"
    primary_regulator: "Securities and Futures Commission (SFC) / HKMA"
    applicable_regulations:
      - regulation_id: "HK-VASP"
        name: "VASP Licensing Regime (AMLO Amendment)"
        effective_date: "2023-06-01"
        ssid_impact: "low"
        description: >
          Hong Kong requires VASP licensing for virtual asset
          trading platforms. SSID is not a trading platform
          and does not provide custody.
        ssid_position: "Non-custodial; no VASP license required."

      - regulation_id: "HK-PDPO"
        name: "Personal Data (Privacy) Ordinance"
        ssid_impact: "medium"
        description: >
          Hong Kong's data privacy law with six data protection
          principles. SSID's hash-only approach aligns with
          data minimization principles.

    cross_reference: "23_compliance/jurisdictions/sg_hk_jp_au/"

  - jurisdiction_id: "JP"
    name: "Japan"
    primary_regulator: "Financial Services Agency (JFSA)"
    applicable_regulations:
      - regulation_id: "JP-PSA"
        name: "Payment Services Act (Japan)"
        ssid_impact: "low"
        description: >
          Regulates crypto-asset exchange services. SSID does
          not operate as an exchange or custodian.
        ssid_position: "Non-custodial; no CAESP registration required."

      - regulation_id: "JP-FIEA"
        name: "Financial Instruments and Exchange Act"
        ssid_impact: "low"
        description: >
          Governs securities and electronically recorded
          transferable rights. SSID utility token is not
          classified as a security token (Type I/II).

      - regulation_id: "JP-APPI"
        name: "Act on Protection of Personal Information"
        ssid_impact: "medium"
        description: >
          Japan's comprehensive data protection law, amended 2022.
          Hash-only processing aligns with data minimization.
          Cross-border transfer restrictions require assessment.
        ssid_controls:
          - "Hash-only processing minimizes PII exposure"
          - "Cross-border transfer assessment for identity hashes"

    travel_rule_note: >
      Japan was an early adopter of the FATF Travel Rule for
      crypto-assets. VASPs using SSID for Travel Rule compliance
      should reference fatf_travel_rule.yaml.
    cross_reference: "23_compliance/jurisdictions/sg_hk_jp_au/"

  - jurisdiction_id: "AU"
    name: "Australia"
    primary_regulator: "ASIC / AUSTRAC"
    applicable_regulations:
      - regulation_id: "AU-AML-CTF"
        name: "AML/CTF Act 2006"
        ssid_impact: "low"
        description: >
          AUSTRAC regulates digital currency exchanges.
          SSID is not a digital currency exchange.
        ssid_position: "Non-custodial; no AUSTRAC registration as DCE."

      - regulation_id: "AU-PRIVACY"
        name: "Privacy Act 1988 (Australian Privacy Principles)"
        ssid_impact: "medium"
        description: >
          13 Australian Privacy Principles govern personal
          information handling. Hash-only approach supports
          APP 3 (collection) and APP 11 (security).

    cross_reference: "23_compliance/jurisdictions/sg_hk_jp_au/"

  - jurisdiction_id: "KR"
    name: "South Korea"
    primary_regulator: "Financial Services Commission (FSC)"
    applicable_regulations:
      - regulation_id: "KR-VASP"
        name: "Act on Reporting and Using Specified Financial Transaction Information"
        ssid_impact: "low"
        description: >
          Requires VASP registration with Korea Financial
          Intelligence Unit (KoFIU). SSID is non-custodial
          and does not operate as a VASP.

      - regulation_id: "KR-VPPA"
        name: "Virtual Asset User Protection Act"
        effective_date: "2024-07-19"
        ssid_impact: "low"
        description: >
          User protection requirements for virtual asset
          service providers. Not directly applicable to
          non-custodial infrastructure.

      - regulation_id: "KR-PIPA"
        name: "Personal Information Protection Act"
        ssid_impact: "medium"
        description: >
          Korea's comprehensive data protection law.
          Strict consent requirements and cross-border
          transfer restrictions.

regional_frameworks:
  - framework_id: "APAC-FATF-ADOPTION"
    name: "FATF Travel Rule Adoption in APAC"
    description: >
      Most APAC jurisdictions have adopted or are implementing
      FATF Travel Rule requirements. SSID provides hash-based
      identity attestations to support VASP compliance.
    adoption_status:
      SG: "implemented"
      HK: "implemented"
      JP: "implemented (early adopter)"
      AU: "implemented"
      KR: "implemented"
    cross_reference: "23_compliance/global/fatf_travel_rule.yaml"

  - framework_id: "APAC-CBDC"
    name: "CBDC Initiatives in APAC"
    description: >
      Multiple APAC jurisdictions are developing CBDCs. SSID's
      identity infrastructure could support CBDC identity
      verification requirements.
    initiatives:
      - "SG: Project Orchid (retail CBDC)"
      - "HK: e-HKD pilot"
      - "JP: Digital Yen pilot"
      - "AU: eAUD pilot"
      - "KR: Digital Won pilot"
    ssid_relevance: "future_opportunity"

ssid_non_custodial_position:
  statement: >
    SSID operates as non-custodial identity infrastructure across
    APAC jurisdictions. It does not qualify as a VASP, digital
    currency exchange, or payment service provider in any assessed
    APAC jurisdiction. The utility token model and hash-only
    architecture minimize regulatory exposure.
  key_exemptions:
    - "SG: Not a DPT service provider (non-custodial)"
    - "HK: Not a VASP (non-custodial, no trading)"
    - "JP: Not a CAESP (non-custodial, no exchange)"
    - "AU: Not a DCE (non-custodial)"
    - "KR: Not a VASP (non-custodial)"
