mena_africa_jurisdictions:
  version: "1.2.0"
  description: >
    Compliance requirements for SSID operations in the MENA
    (Middle East and North Africa) and Africa regions.

jurisdictions:
  - country_code: AE
    name: United Arab Emirates
    regulations:
      - regulation_id: ae_vara
        name: Virtual Asset Regulatory Authority
        authority: VARA (Dubai)
        requirements:
          - vara_licence
          - aml_cft_compliance
          - consumer_protection
          - market_conduct_rules
          - technology_governance
        status: active

      - regulation_id: ae_adgm_fsra
        name: ADGM Financial Services Regulatory Authority
        authority: FSRA (Abu Dhabi)
        requirements:
          - fsp_licence
          - aml_cft_compliance
          - prudential_requirements
          - conduct_of_business
        status: active

      - regulation_id: ae_cbuae_aml
        name: CBUAE AML/CFT Framework
        authority: CBUAE
        requirements:
          - customer_due_diligence
          - suspicious_transaction_reporting
          - sanctions_screening
          - travel_rule_compliance
        status: active

  - country_code: BH
    name: Bahrain
    regulations:
      - regulation_id: bh_cbb_crypto
        name: CBB Cryptoasset Module (2024)
        authority: Central Bank of Bahrain
        requirements:
          - cbb_licence
          - capital_requirements
          - aml_cft_compliance
          - custody_segregation
          - disclosure_requirements
        status: active

  - country_code: SA
    name: Saudi Arabia
    regulations:
      - regulation_id: sa_digital_assets
        name: Digital Asset Framework (emerging)
        authority: SAMA / CMA
        requirements:
          - regulatory_sandbox_participation
          - aml_cft_compliance
        status: assessment
        notes: Framework under development

  - country_code: ZA
    name: South Africa
    regulations:
      - regulation_id: za_fsca_crypto
        name: FSCA Crypto Assets Declaration
        authority: FSCA
        requirements:
          - fsp_licence_as_financial_product
          - fit_and_proper_requirements
          - conduct_standards
        status: active

      - regulation_id: za_popia
        name: Protection of Personal Information Act
        authority: Information Regulator
        requirements:
          - data_protection_officer
          - lawful_processing
          - cross_border_transfer_safeguards
          - data_breach_notification
        status: active

      - regulation_id: za_fica
        name: Financial Intelligence Centre Act
        authority: FIC
        requirements:
          - accountable_institution_registration
          - customer_due_diligence
          - suspicious_transaction_reporting
          - sanctions_compliance
        status: active

  - country_code: MU
    name: Mauritius
    regulations:
      - regulation_id: mu_vaitos
        name: Virtual Asset and Initial Token Offering Services Act 2021
        authority: FSC Mauritius
        requirements:
          - vaitos_licence
          - aml_cft_compliance
          - client_asset_segregation
          - disclosure_requirements
        status: active

  - country_code: NG
    name: Nigeria
    regulations:
      - regulation_id: ng_sec_digital_assets
        name: SEC Rules on Digital Assets
        authority: SEC Nigeria
        requirements:
          - registration_with_sec
          - minimum_capital_requirements
          - aml_cft_compliance
        status: active
        notes: Evolving regulatory environment

compliance_mapping:
  ssid_controls:
    non_custodial_design: addresses_custody_requirements
    hash_only_no_pii: exceeds_popia_data_minimisation
    sanctions_screening: covers_cbuae_and_fica
    travel_rule: ivms101_compliant
