americas_jurisdictions:
  version: "1.3.0"
  description: >
    Compliance requirements for SSID operations in the Americas region.
    Covers United States, Canada, Brazil, and Mexico.

jurisdictions:
  - country_code: US
    name: United States
    regulations:
      - regulation_id: us_bsa_aml
        name: Bank Secrecy Act / AML
        authority: FinCEN
        requirements:
          - msb_registration
          - sar_filing
          - ctr_reporting_above_10000_usd
          - kyc_cip_compliance
        status: active

      - regulation_id: us_ofac_sanctions
        name: OFAC Sanctions Programs
        authority: OFAC / Treasury
        requirements:
          - sdn_list_screening
          - country_sanctions_compliance
          - secondary_sanctions_awareness
        status: active

      - regulation_id: us_irs_1099_da
        name: IRS Form 1099-DA Digital Assets
        authority: IRS
        effective_date: "2026-01-01"
        requirements:
          - broker_reporting
          - cost_basis_tracking
          - taxpayer_identification
        status: active

      - regulation_id: us_state_mtl
        name: State Money Transmitter Licenses
        authority: state_regulators
        requirements:
          - per_state_licensing
          - surety_bond
          - net_worth_requirements
        status: active
        notes: Requirements vary by state

  - country_code: CA
    name: Canada
    regulations:
      - regulation_id: ca_pcmltfa
        name: Proceeds of Crime (Money Laundering) and Terrorist Financing Act
        authority: FINTRAC
        requirements:
          - msb_registration_fintrac
          - kyc_verification
          - large_cash_reporting_10000_cad
          - suspicious_transaction_reporting
          - travel_rule_3000_cad
        status: active

      - regulation_id: ca_pipeda
        name: PIPEDA
        authority: Privacy Commissioner
        requirements:
          - consent_based_data_collection
          - data_breach_notification
          - cross_border_transfer_safeguards
        status: active

  - country_code: BR
    name: Brazil
    regulations:
      - regulation_id: br_lgpd
        name: Lei Geral de Protecao de Dados
        authority: ANPD
        requirements:
          - data_protection_officer
          - privacy_impact_assessment
          - consent_management
          - data_subject_rights
        status: active

      - regulation_id: br_crypto_framework
        name: Brazilian Crypto Asset Framework (Law 14478)
        authority: Banco Central do Brasil
        requirements:
          - vasp_registration
          - segregation_of_customer_assets
          - aml_cft_compliance
        status: active

  - country_code: MX
    name: Mexico
    regulations:
      - regulation_id: mx_fintech_law
        name: Ley Fintech
        authority: CNBV
        requirements:
          - itf_authorization
          - aml_compliance
          - consumer_protection
          - operational_risk_management
        status: active

compliance_mapping:
  ssid_controls:
    non_custodial_design: covers_all_jurisdictions
    hash_only_no_pii: covers_all_privacy_regulations
    real_time_sanctions_screening: covers_ofac_and_fintrac
    audit_trail: covers_all_record_keeping_requirements
