# FATF Compliance Mapping — SSID Platform
# SoT v4.1.0 | Classification: Compliance
# Framework: FATF 40 Recommendations (2012, updated 2023)
# Generated: 2026-03-15

framework_id: "fatf"
framework_name: "Financial Action Task Force 40 Recommendations"
edition: "2012 (updated October 2023)"
jurisdiction: ["global"]
version: "1.0.0"
final_authority: "03_core"
applicability: >
  SSID provides identity infrastructure for Virtual Asset Service Providers
  (VASPs) and traditional financial institutions subject to FATF
  Recommendations. Primary applicability: Recommendations 1, 10, 15, 16, 24, 25.

# ---------------------------------------------------------------------
# FATF RECOMMENDATIONS MAPPED TO SSID CAPABILITIES
# ---------------------------------------------------------------------

recommendations:

  - recommendation: "R.1"
    title: "Assessing risks and applying a risk-based approach"
    ssid_role: "identity_risk_scoring_infrastructure"
    ssid_roots:
      - root: "08_identity_score"
        rationale: "Risk-based identity scoring; automated risk classification (low/medium/high)"
      - root: "03_core"
        rationale: "Risk gate: service access conditioned on risk assessment result"
      - root: "23_compliance"
        rationale: "Risk policy registry; country risk matrix and sector risk profiles"
    ssid_shards:
      - shard: "23_compliance/shards/01_identitaet_personen"
        note: "Customer risk profiling data"
      - shard: "23_compliance/shards/10_finanzen_banking"
        note: "Financial behaviour risk indicators"
    status: "mapped"
    gap: null

  - recommendation: "R.10"
    title: "Customer Due Diligence"
    ssid_role: "primary_cdd_infrastructure"
    ssid_roots:
      - root: "08_identity_score"
        rationale: "CDD execution engine; identity verification and risk scoring"
      - root: "03_core"
        rationale: "CDD gate before business relationship establishment"
      - root: "09_meta_identity"
        rationale: "Composite identity resolution from multiple sources"
    ssid_shards:
      - shard: "23_compliance/shards/01_identitaet_personen"
        note: "Customer identity (name, address, DoB, nationality, ID number)"
      - shard: "23_compliance/shards/02_dokumente_nachweise"
        note: "Identity document verification"
      - shard: "23_compliance/shards/13_unternehmen_gewerbe"
        note: "Legal entity CDD (type, name, registered address, UBO)"
    cdd_elements:
      - "Identity verification of customer and beneficial owner"
      - "Understanding nature and purpose of business relationship"
      - "Ongoing monitoring"
    status: "mapped"
    gap: null

  - recommendation: "R.12"
    title: "Politically Exposed Persons (PEPs)"
    ssid_role: "pep_screening_and_edd"
    ssid_roots:
      - root: "08_identity_score"
        rationale: "PEP status determination; integration with PEP list providers"
      - root: "03_core"
        rationale: "Senior management approval gate for PEP onboarding"
    ssid_shards:
      - shard: "23_compliance/shards/01_identitaet_personen"
        note: "PEP determination from role and affiliation data"
      - shard: "23_compliance/shards/09_arbeit_karriere"
        note: "Professional/political role data for PEP classification"
    pep_categories:
      - "domestic_pep"
      - "foreign_pep"
      - "international_organisation_pep"
      - "family_members"
      - "close_associates"
    status: "mapped"
    gap: null

  - recommendation: "R.15"
    title: "New technologies — Virtual Assets and VASPs"
    ssid_role: "vasp_identity_compliance_infrastructure"
    ssid_roots:
      - root: "08_identity_score"
        rationale: "VASP customer KYC; virtual asset holder identity scoring"
      - root: "10_interoperability"
        rationale: "VASP-to-VASP travel rule message exchange (TRISA/OpenVASP)"
      - root: "21_post_quantum_crypto"
        rationale: "Cryptographic identity binding for virtual asset wallets"
      - root: "03_core"
        rationale: "VASP risk assessment gate; ML/TF risk of new tech products"
    ssid_shards:
      - shard: "23_compliance/shards/10_finanzen_banking"
        note: "Virtual asset wallet identity binding"
      - shard: "23_compliance/shards/15_handel_transaktionen"
        note: "Virtual asset transaction identity"
    status: "mapped"
    gap: null

  - recommendation: "R.16"
    title: "Wire transfers and Travel Rule"
    ssid_role: "travel_rule_identity_data_provider"
    ssid_roots:
      - root: "10_interoperability"
        rationale: "Travel rule protocol handler (IVMS101 data model; TRISA, OpenVASP, SWIFT gpi)"
      - root: "03_core"
        rationale: "Originator/beneficiary data validation before transmission"
      - root: "21_post_quantum_crypto"
        rationale: "Encrypted and signed travel rule messages"
      - root: "02_audit_logging"
        rationale: "WORM log of all travel rule transmissions"
    ssid_shards:
      - shard: "23_compliance/shards/01_identitaet_personen"
        note: "Originator: name, account number, address/DoB/national ID (threshold-dependent)"
      - shard: "23_compliance/shards/15_handel_transaktionen"
        note: "Transaction reference and amount linking"
    threshold_eur: 1000
    threshold_usd: 1000
    data_model: "IVMS101"
    status: "mapped"
    gap: null

  - recommendation: "R.24"
    title: "Transparency and beneficial ownership of legal persons"
    ssid_role: "ubo_verification_and_registry_access"
    ssid_roots:
      - root: "03_core"
        rationale: "UBO chain resolution; ownership threshold enforcement (25%)"
      - root: "10_interoperability"
        rationale: "UBO register API access (national beneficial ownership registers)"
      - root: "08_identity_score"
        rationale: "UBO risk scoring and screening"
    ssid_shards:
      - shard: "23_compliance/shards/13_unternehmen_gewerbe"
        note: "Legal entity ownership structure"
      - shard: "23_compliance/shards/01_identitaet_personen"
        note: "Natural person UBO identity verification"
    status: "mapped"
    gap: null

  - recommendation: "R.25"
    title: "Transparency and beneficial ownership of legal arrangements (trusts)"
    ssid_role: "trust_beneficiary_identity_verification"
    ssid_roots:
      - root: "03_core"
        rationale: "Trust party identity verification (settlor, trustee, beneficiaries)"
      - root: "08_identity_score"
        rationale: "Trust party risk scoring"
    ssid_shards:
      - shard: "23_compliance/shards/01_identitaet_personen"
        note: "Trust party identity verification"
      - shard: "23_compliance/shards/13_unternehmen_gewerbe"
        note: "Corporate trustee identity"
    status: "mapped"
    gap: null

  - recommendation: "R.16 + INR.15"
    title: "FATF Travel Rule — Virtual Assets specific"
    ssid_role: "va_travel_rule_compliance"
    ssid_roots:
      - root: "10_interoperability"
        rationale: "IVMS101 message formatting; VASP counterparty discovery"
      - root: "03_core"
        rationale: "Pre-transfer identity validation; beneficiary VASP verification"
      - root: "21_post_quantum_crypto"
        rationale: "End-to-end encryption of travel rule data in transit"
    ssid_shards:
      - shard: "23_compliance/shards/01_identitaet_personen"
        note: "IVMS101 NaturalPerson or LegalPerson data set"
      - shard: "23_compliance/shards/10_finanzen_banking"
        note: "Virtual asset account (wallet) identifier"
    ivms101_fields:
      originator:
        - "name"
        - "geographicAddress or nationalIdentification or dateAndPlaceOfBirth"
        - "customerIdentification"
        - "accountNumber (wallet address)"
      beneficiary:
        - "name"
        - "accountNumber (wallet address)"
    status: "mapped"
    gap: null
