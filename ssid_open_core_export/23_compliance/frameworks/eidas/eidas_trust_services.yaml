# eIDAS Trust Service Requirements — SSID Platform
# SoT v4.1.0 | Classification: Compliance
# Framework: eIDAS Regulation (EU) No 910/2014 + eIDAS 2.0 (EU) 2024/1183
# Generated: 2026-03-15

framework_id: "eidas"
document_type: "trust_service_requirements"
version: "1.0.0"
final_authority: "03_core"

# ---------------------------------------------------------------------
# QUALIFIED TRUST SERVICE REQUIREMENTS
# ---------------------------------------------------------------------

trust_services:

  - service_id: "EIDAS-TS-001"
    article: "Art. 15, Annex II"
    title: "Qualified Electronic Signature (QES)"
    description: >
      Electronic signature equivalent to handwritten signature. Requires
      qualified certificate from a QTSP on the EU Trusted List.
    ssid_roots:
      - root: "21_post_quantum_crypto"
        rationale: "Post-quantum signature algorithms (ML-DSA, SLH-DSA); FIPS 204/205 compliant"
      - root: "03_core"
        rationale: "Signature validation and QTSP certificate chain verification"
      - root: "14_zero_time_auth"
        rationale: "Signer authentication before signature creation"
    ssid_shards:
      - shard: "23_compliance/shards/14_vertraege_vereinbarungen"
        note: "Contract signing with QES"
      - shard: "23_compliance/shards/16_behoerden_verwaltung"
        note: "Official document signing for public authorities"
    requirements:
      - "QTSP on EU Trusted List (ETSI TS 119 431)"
      - "Signature creation device (QSCD) conformance"
      - "Certificate policy: NCP+ or QCP-n-qscd"
    status: "required"
    evidence_path: "23_compliance/evidence/eidas/qes/"

  - service_id: "EIDAS-TS-002"
    article: "Art. 18, Annex III"
    title: "Qualified Electronic Seal (QESeal)"
    description: >
      Legal person equivalent of QES. Ensures origin and integrity of
      documents issued by organisations.
    ssid_roots:
      - root: "21_post_quantum_crypto"
        rationale: "Seal signature keys; hardware-bound organisational keys"
      - root: "03_core"
        rationale: "Seal certificate validation; issuing authority verification"
    ssid_shards:
      - shard: "23_compliance/shards/13_unternehmen_gewerbe"
        note: "Corporate document sealing"
      - shard: "23_compliance/shards/02_dokumente_nachweise"
        note: "Sealed attestations and certificates"
    requirements:
      - "Qualified certificate for electronic seal"
      - "ETSI EN 319 122 (CAdES) or 319 132 (XAdES) conformance"
    status: "required"
    evidence_path: "23_compliance/evidence/eidas/qeseal/"

  - service_id: "EIDAS-TS-003"
    article: "Art. 33-34"
    title: "Qualified Electronic Time Stamp"
    description: >
      Qualified time stamp proving existence of data at a specific point in time.
      Required for long-term validity of signed documents.
    ssid_roots:
      - root: "02_audit_logging"
        rationale: "WORM audit trail with qualified timestamps on every event"
      - root: "21_post_quantum_crypto"
        rationale: "TSA (Time Stamping Authority) signature on timestamp tokens"
    ssid_shards: []
    requirements:
      - "RFC 3161 compliant TSA"
      - "Qualified TSA on EU Trusted List"
    status: "required"
    evidence_path: "23_compliance/evidence/eidas/timestamp/"

  - service_id: "EIDAS-TS-004"
    article: "Art. 38-40"
    title: "Qualified Website Authentication Certificate (QWAC)"
    description: >
      Qualified certificate for website authentication. Provides strong
      identity assurance for SSID platform endpoints.
    ssid_roots:
      - root: "15_infra"
        rationale: "TLS certificate management; QWAC provisioning for platform endpoints"
      - root: "03_core"
        rationale: "Certificate chain validation; QTSP registry"
    ssid_shards: []
    requirements:
      - "ETSI EN 319 411-2 (NCP-w or QCP-w)"
      - "CAB Forum Baseline Requirements"
      - "EU Trusted List QTSP"
    status: "required"
    evidence_path: "23_compliance/evidence/eidas/qwac/"

  - service_id: "EIDAS-TS-005"
    article: "Art. 45b (eIDAS 2.0)"
    title: "Qualified Electronic Attestation of Attributes (QEAA) Provider"
    description: >
      QTSP providing qualified attestations of attributes for the EUDIW.
      Attestations carry same legal weight as equivalent physical documents.
    ssid_roots:
      - root: "09_meta_identity"
        rationale: "Attribute attestation store; QEAA issuance pipeline"
      - root: "21_post_quantum_crypto"
        rationale: "Qualified cryptographic signatures on attribute attestations"
      - root: "10_interoperability"
        rationale: "OpenID4VCI protocol for attestation issuance to wallets"
    ssid_shards:
      - shard: "23_compliance/shards/01_identitaet_personen"
        note: "Core identity attribute attestations"
      - shard: "23_compliance/shards/05_gesundheit_medizin"
        note: "Health attribute attestations"
      - shard: "23_compliance/shards/06_bildung_qualifikationen"
        note: "Education attribute attestations"
    requirements:
      - "ETSI TS 119 461 (identity proofing)"
      - "ISO/IEC 27001 or equivalent"
      - "SOC 2 Type II"
    status: "required"
    evidence_path: "23_compliance/evidence/eidas/qeaa/"

  - service_id: "EIDAS-TS-006"
    article: "Art. 45f (eIDAS 2.0)"
    title: "Relying Party Registration"
    description: >
      Relying parties must register to request attributes from EUDIW.
      SSID must maintain relying party registry and access control.
    ssid_roots:
      - root: "03_core"
        rationale: "Relying party registry; access policy enforcement"
      - root: "23_compliance"
        rationale: "Relying party due diligence and approval records"
    ssid_shards: []
    requirements:
      - "Relying party registration with Member State authority"
      - "Attribute request justification"
      - "Purpose binding enforcement"
    status: "required"
    evidence_path: "23_compliance/evidence/eidas/relying_party/"
