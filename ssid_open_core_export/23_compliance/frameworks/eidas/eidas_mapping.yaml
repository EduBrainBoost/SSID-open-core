# eIDAS Compliance Mapping — SSID Platform
# SoT v4.1.0 | Classification: Compliance
# Framework: eIDAS Regulation (EU) No 910/2014 + eIDAS 2.0 (2024/1183)
# Generated: 2026-03-15

framework_id: "eidas"
framework_name: "Electronic Identification, Authentication and Trust Services"
regulation: "(EU) No 910/2014 | eIDAS 2.0 (EU) 2024/1183"
effective_date: "2016-07-01"
eidas2_applicability_date: "2026-05-20"
jurisdiction: ["EU", "EEA"]
version: "1.0.0"
final_authority: "03_core"

# ---------------------------------------------------------------------
# ELECTRONIC IDENTIFICATION MAPPINGS
# ---------------------------------------------------------------------

identification_schemes:

  - scheme_id: "EIDAS-ID-001"
    article: "Art. 6, 7, 8"
    title: "Electronic identification scheme — assurance levels"
    levels: ["low", "substantial", "high"]
    ssid_capability: "graduated_identity_assurance"
    ssid_roots:
      - root: "08_identity_score"
        rationale: "Identity Score & Reputation; assigns assurance level per credential set"
      - root: "03_core"
        rationale: "Final authority for assurance level validation"
      - root: "09_meta_identity"
        rationale: "Meta-identity aggregation across multiple identity shards"
    ssid_shards:
      - shard: "23_compliance/shards/01_identitaet_personen"
        assurance_level: "high"
        note: "Government-issued identity; highest assurance level"
      - shard: "23_compliance/shards/02_dokumente_nachweise"
        assurance_level: "substantial"
        note: "Document credentials; substantial assurance"
      - shard: "23_compliance/shards/09_arbeit_karriere"
        assurance_level: "low"
        note: "Professional credentials; low to substantial"
    status: "mapped"

  - scheme_id: "EIDAS-ID-002"
    article: "Art. 12"
    title: "Interoperability framework — cross-border recognition"
    ssid_capability: "cross_border_identity_recognition"
    ssid_roots:
      - root: "10_interoperability"
        rationale: "Cross-system integration layer; eIDAS node connector interface"
      - root: "03_core"
        rationale: "Identity assertion validator for cross-border responses"
    ssid_shards:
      - shard: "23_compliance/shards/01_identitaet_personen"
        note: "MinimumDataSet (MDS) attributes for cross-border assertion"
      - shard: "23_compliance/shards/16_behoerden_verwaltung"
        note: "Public authority interactions requiring cross-border ID"
    status: "mapped"

  - scheme_id: "EIDAS-ID-003"
    article: "Art. 6a (eIDAS 2.0)"
    title: "European Digital Identity Wallet (EUDIW)"
    ssid_capability: "eudiw_compatible_wallet"
    ssid_roots:
      - root: "09_meta_identity"
        rationale: "Meta-identity layer; EUDIW-compatible attribute store"
      - root: "10_interoperability"
        rationale: "EUDIW protocol adapter (OpenID4VCI, OpenID4VP)"
      - root: "21_post_quantum_crypto"
        rationale: "Cryptographic binding of wallet to holder"
      - root: "14_zero_time_auth"
        rationale: "Wallet authentication mechanism"
    ssid_shards:
      - shard: "23_compliance/shards/01_identitaet_personen"
        note: "Core identity attributes in EUDIW"
      - shard: "23_compliance/shards/02_dokumente_nachweise"
        note: "Document attestations (mDL, diploma, etc.)"
      - shard: "23_compliance/shards/05_gesundheit_medizin"
        note: "Health attestations (EHIC, prescriptions)"
      - shard: "23_compliance/shards/06_bildung_qualifikationen"
        note: "Educational credentials in wallet"
    status: "mapped"

  - scheme_id: "EIDAS-ID-004"
    article: "Art. 45c (eIDAS 2.0)"
    title: "Qualified Electronic Attestation of Attributes (QEAA)"
    ssid_capability: "qualified_attestation_issuance"
    ssid_roots:
      - root: "03_core"
        rationale: "Attestation validator; qualified provider registry"
      - root: "21_post_quantum_crypto"
        rationale: "Qualified signature on attestations"
    ssid_shards:
      - shard: "23_compliance/shards/02_dokumente_nachweise"
        note: "Qualified document attestations"
      - shard: "23_compliance/shards/06_bildung_qualifikationen"
        note: "Qualified educational attestations"
      - shard: "23_compliance/shards/13_unternehmen_gewerbe"
        note: "Qualified business attestations"
    status: "mapped"

