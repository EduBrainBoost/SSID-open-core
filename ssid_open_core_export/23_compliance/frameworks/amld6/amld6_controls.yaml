# AMLD6 Controls — SSID Platform
# SoT v4.1.0 | Classification: Compliance
# Framework: 6th Anti-Money Laundering Directive (EU) 2018/1673
# Generated: 2026-03-15

framework_id: "amld6"
version: "1.0.0"
final_authority: "03_core"

controls:

  - control_id: "AMLD6-C-001"
    article: "Art. 3 (AMLD5)"
    title: "Customer Due Diligence — identity verification gate"
    description: >
      Identity verification mandatory before establishing business relationship.
      Supports simplified, standard, and enhanced CDD based on risk score.
    implementation_root: "08_identity_score"
    supporting_roots: ["03_core", "09_meta_identity"]
    shards:
      - "23_compliance/shards/01_identitaet_personen"
      - "23_compliance/shards/02_dokumente_nachweise"
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/amld6/cdd/"

  - control_id: "AMLD6-C-002"
    article: "Art. 6 (AMLD5)"
    title: "PEP screening — Politically Exposed Persons"
    description: >
      Automated PEP screening against EU and international PEP lists.
      EDD triggered automatically for PEP matches. Continuous monitoring.
    implementation_root: "08_identity_score"
    supporting_roots: ["03_core", "23_compliance"]
    shards:
      - "23_compliance/shards/01_identitaet_personen"
      - "23_compliance/shards/09_arbeit_karriere"
    type: "detective"
    status: "required"
    evidence_path: "23_compliance/evidence/amld6/pep/"
    screening_lists:
      - "EU PEP database"
      - "FATF high-risk jurisdictions"
      - "UN Security Council sanctions"
      - "EU consolidated sanctions list"
      - "OFAC SDN list"

  - control_id: "AMLD6-C-003"
    article: "Art. 30-31 (AMLD5)"
    title: "Ultimate Beneficial Owner (UBO) identification"
    description: >
      Identification and verification of natural persons owning or controlling
      >25% of a legal entity. Recursive resolution through ownership chains.
    implementation_root: "03_core"
    supporting_roots: ["08_identity_score", "10_interoperability"]
    shards:
      - "23_compliance/shards/13_unternehmen_gewerbe"
      - "23_compliance/shards/01_identitaet_personen"
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/amld6/ubo/"

  - control_id: "AMLD6-C-004"
    article: "Art. 18 (AMLD5)"
    title: "Enhanced Due Diligence — high-risk triggers"
    description: >
      Automatic EDD escalation for: PEPs, high-risk countries, complex
      corporate structures, high transaction values, unusual patterns.
    implementation_root: "08_identity_score"
    supporting_roots: ["03_core", "09_meta_identity"]
    shards:
      - "23_compliance/shards/01_identitaet_personen"
      - "23_compliance/shards/10_finanzen_banking"
      - "23_compliance/shards/13_unternehmen_gewerbe"
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/amld6/edd/"

  - control_id: "AMLD6-C-005"
    article: "Art. 40 (AMLD5)"
    title: "5-year record retention — CDD and transaction data"
    description: >
      All CDD records and transaction data retained in WORM storage for
      minimum 5 years after end of business relationship or transaction.
    implementation_root: "02_audit_logging"
    supporting_roots: ["23_compliance"]
    shards:
      - "23_compliance/shards/01_identitaet_personen"
      - "23_compliance/shards/15_handel_transaktionen"
    type: "detective"
    status: "required"
    retention_years: 5
    evidence_path: "23_compliance/evidence/amld6/retention/"

  - control_id: "AMLD6-C-006"
    article: "Art. 23 (AMLD5)"
    title: "Suspicious Transaction Report (STR) — identity package"
    description: >
      On STR trigger, generate identity evidence package (name, DoB,
      address, transaction history) for Financial Intelligence Unit (FIU).
    implementation_root: "02_audit_logging"
    supporting_roots: ["03_core", "23_compliance"]
    shards:
      - "23_compliance/shards/01_identitaet_personen"
      - "23_compliance/shards/15_handel_transaktionen"
    type: "detective"
    status: "required"
    evidence_path: "23_compliance/evidence/amld6/str/"

  - control_id: "AMLD6-C-007"
    article: "Art. 1 (AMLD6)"
    title: "22 predicate offences — adverse media screening"
    description: >
      Screening against adverse media sources for indicators of AMLD6
      predicate offences (fraud, tax crimes, cybercrime, etc.).
    implementation_root: "08_identity_score"
    supporting_roots: ["03_core"]
    shards:
      - "23_compliance/shards/01_identitaet_personen"
    type: "detective"
    status: "required"
    evidence_path: "23_compliance/evidence/amld6/adverse_media/"

  - control_id: "AMLD6-C-008"
    article: "Art. 6 (AMLD6)"
    title: "Continuous monitoring — ongoing CDD"
    description: >
      Ongoing monitoring of business relationships. Re-KYC triggered by
      risk events (PEP status change, sanctions hit, transaction anomaly).
    implementation_root: "08_identity_score"
    supporting_roots: ["17_observability", "03_core"]
    shards:
      - "23_compliance/shards/01_identitaet_personen"
      - "23_compliance/shards/10_finanzen_banking"
    type: "detective"
    status: "required"
    evidence_path: "23_compliance/evidence/amld6/ongoing_monitoring/"
