# GDPR Controls — SSID Platform
# SoT v4.1.0 | Classification: Compliance
# Framework: General Data Protection Regulation (EU) 2016/679
# Generated: 2026-03-15

framework_id: "gdpr"
version: "1.0.0"
final_authority: "03_core"

# ---------------------------------------------------------------------
# REQUIRED CONTROLS PER GDPR ARTICLE
# ---------------------------------------------------------------------

controls:

  - control_id: "GDPR-C-001"
    article: "Art. 5(1)(a)"
    title: "Lawful basis enforcement gate"
    description: >
      Every processing operation must declare a lawful basis before execution.
      Processing is blocked if no valid basis is registered.
    implementation_root: "03_core"
    supporting_roots: ["23_compliance"]
    shards:
      - "23_compliance/shards/01_identitaet_personen"
      - "23_compliance/shards/14_vertraege_vereinbarungen"
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/gdpr/lawful_basis/"

  - control_id: "GDPR-C-002"
    article: "Art. 5(1)(c)"
    title: "Data minimisation enforcement"
    description: >
      Hash-only evidence strategy across all modules. No raw PII, agent output,
      or prompts persisted. Enforced via module.yaml data_statement.
    implementation_root: "02_audit_logging"
    supporting_roots: ["03_core", "23_compliance"]
    shards: []
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/audit/"

  - control_id: "GDPR-C-003"
    article: "Art. 5(1)(e)"
    title: "Storage limitation — retention policy"
    description: >
      Automated retention enforcement; data deleted after purpose fulfilment.
      Retention periods registered per shard category.
    implementation_root: "23_compliance"
    supporting_roots: ["02_audit_logging", "03_core"]
    shards:
      - "23_compliance/shards/01_identitaet_personen"
      - "23_compliance/shards/02_dokumente_nachweise"
      - "23_compliance/shards/05_gesundheit_medizin"
    type: "detective"
    status: "required"
    evidence_path: "23_compliance/evidence/gdpr/retention/"

  - control_id: "GDPR-C-004"
    article: "Art. 7"
    title: "Consent management system"
    description: >
      Granular, revocable consent records stored per identity shard.
      Withdrawal mechanism available at all times via UI layer.
    implementation_root: "03_core"
    supporting_roots: ["13_ui_layer", "23_compliance"]
    shards:
      - "23_compliance/shards/01_identitaet_personen"
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/gdpr/consent/"

  - control_id: "GDPR-C-005"
    article: "Art. 9"
    title: "Special category data gate"
    description: >
      Explicit consent and legal basis validation required before processing
      health, biometric, ethnic, religious, or political data.
    implementation_root: "03_core"
    supporting_roots: ["23_compliance"]
    shards:
      - "23_compliance/shards/05_gesundheit_medizin"
      - "23_compliance/shards/07_familie_soziales"
      - "23_compliance/shards/01_identitaet_personen"
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/gdpr/special_category/"

  - control_id: "GDPR-C-006"
    article: "Art. 15-22"
    title: "Data subject rights API"
    description: >
      Automated processing of access, rectification, erasure, portability,
      and objection requests. Response SLA: 30 days (Art. 12).
    implementation_root: "03_core"
    supporting_roots: ["09_meta_identity", "13_ui_layer", "02_audit_logging"]
    shards:
      - "23_compliance/shards/01_identitaet_personen"
      - "23_compliance/shards/02_dokumente_nachweise"
    type: "corrective"
    status: "required"
    evidence_path: "23_compliance/evidence/gdpr/subject_rights/"

  - control_id: "GDPR-C-007"
    article: "Art. 25"
    title: "Privacy by design — non-custodial architecture"
    description: >
      SSID is non-custodial by architecture. Personal data never stored
      centrally; only hashes persisted. Enforced at platform design level.
    implementation_root: "03_core"
    supporting_roots: ["21_post_quantum_crypto", "02_audit_logging"]
    shards: []
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/gdpr/privacy_by_design/"

  - control_id: "GDPR-C-008"
    article: "Art. 30"
    title: "Record of processing activities (RoPA)"
    description: >
      Automated RoPA generated from WORM audit trail and module interface
      declarations. Updated on every new processing activity registration.
    implementation_root: "02_audit_logging"
    supporting_roots: ["23_compliance"]
    shards: []
    type: "detective"
    status: "required"
    evidence_path: "23_compliance/evidence/audit/"

  - control_id: "GDPR-C-009"
    article: "Art. 32"
    title: "Encryption and access control"
    description: >
      Post-quantum encryption at rest and in transit. Zero-time authentication
      for access control. Integrity validation on all evidence paths.
    implementation_root: "21_post_quantum_crypto"
    supporting_roots: ["14_zero_time_auth", "03_core"]
    shards: []
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/post_quantum_crypto/"

  - control_id: "GDPR-C-010"
    article: "Art. 33"
    title: "Breach notification pipeline"
    description: >
      Automated breach detection from observability anomalies. 72-hour
      notification trigger to supervisory authority. Data subject notification
      if high risk.
    implementation_root: "17_observability"
    supporting_roots: ["02_audit_logging", "23_compliance"]
    shards: []
    type: "detective"
    status: "required"
    evidence_path: "23_compliance/evidence/gdpr/breach/"

  - control_id: "GDPR-C-011"
    article: "Art. 35"
    title: "DPIA — Data Protection Impact Assessment"
    description: >
      Mandatory DPIA for high-risk processing. Gate blocks deployment
      of new high-risk processing without completed DPIA on file.
    implementation_root: "23_compliance"
    supporting_roots: ["03_core"]
    shards:
      - "23_compliance/shards/05_gesundheit_medizin"
      - "23_compliance/shards/01_identitaet_personen"
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/gdpr/dpia/"

  - control_id: "GDPR-C-012"
    article: "Art. 44"
    title: "Third-country transfer gate"
    description: >
      Transfer mechanism validation before any cross-border data flow.
      Adequacy decision lookup, SCCs or BCRs required for non-adequate countries.
    implementation_root: "10_interoperability"
    supporting_roots: ["03_core", "23_compliance"]
    shards: []
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/gdpr/transfers/"
