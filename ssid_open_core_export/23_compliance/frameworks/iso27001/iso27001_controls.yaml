# ISO 27001 Implementation Controls — SSID Platform
# SoT v4.1.0 | Classification: Compliance
# Framework: ISO/IEC 27001:2022 Annex A
# Generated: 2026-03-15

framework_id: "iso27001"
version: "1.0.0"
final_authority: "03_core"

# ---------------------------------------------------------------------
# IMPLEMENTATION CONTROLS PER ISO 27001:2022 ANNEX A DOMAIN
# ---------------------------------------------------------------------

controls:

  # ---- ORGANISATIONAL CONTROLS ----

  - control_id: "ISO27K-C-001"
    annex_a_ref: "A.5.1"
    title: "Information security policy management"
    description: >
      Maintain, approve, and communicate information security policies.
      Policies reviewed annually or after significant changes. Top-level
      InfoSec policy endorsed by executive sponsor and published platform-wide.
    implementation_root: "23_compliance"
    supporting_roots: ["03_core", "07_governance_legal"]
    shards: []
    type: "preventive"
    status: "required"
    review_frequency: "annual"
    evidence_path: "23_compliance/evidence/iso27001/policies/"

  - control_id: "ISO27K-C-002"
    annex_a_ref: "A.5.2"
    title: "Information security roles and responsibilities"
    description: >
      Assign and document information security responsibilities.
      RACI matrix defines roles for CISO, data owners, system owners,
      compliance team, and developers. Reviewed at onboarding and annually.
    implementation_root: "07_governance_legal"
    supporting_roots: ["23_compliance", "24_meta_orchestration"]
    shards: []
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/iso27001/roles/"

  - control_id: "ISO27K-C-003"
    annex_a_ref: "A.5.3"
    title: "Segregation of duties"
    description: >
      Conflicting duties separated via role-based access controls.
      Identity issuance, verification, and audit roles are technically
      separated. No single operator can issue and approve their own identity.
    implementation_root: "03_core"
    supporting_roots: ["14_zero_time_auth", "24_meta_orchestration"]
    shards:
      - "23_compliance/shards/03_zugang_berechtigungen"
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/iso27001/segregation/"

  - control_id: "ISO27K-C-004"
    annex_a_ref: "A.5.7"
    title: "Threat intelligence collection and analysis"
    description: >
      Collect, analyse, and act on threat intelligence relevant to SSID
      platform security. Subscribe to CERT feeds, vulnerability databases,
      and identity-specific threat intel sources. Behavioural anomaly scoring
      feeds into threat response prioritisation.
    implementation_root: "17_observability"
    supporting_roots: ["08_identity_score", "23_compliance"]
    shards: []
    type: "detective"
    status: "required"
    evidence_path: "23_compliance/evidence/iso27001/threat_intel/"

  - control_ref_local: "ISO27K-C-005"
    annex_a_ref: "A.5.15"
    title: "Access control policy enforcement"
    description: >
      Access control policy implemented via zero-time authentication and
      role-based gate validators. Least-privilege by default. Access reviewed
      quarterly. Privileged access reviewed monthly.
    implementation_root: "14_zero_time_auth"
    supporting_roots: ["03_core", "23_compliance"]
    shards:
      - "23_compliance/shards/03_zugang_berechtigungen"
    type: "preventive"
    status: "required"
    review_frequency: "quarterly"
    evidence_path: "23_compliance/evidence/iso27001/access_control/"

  - control_id: "ISO27K-C-006"
    annex_a_ref: "A.5.16"
    title: "Identity lifecycle management"
    description: >
      Manage identity lifecycle from creation to deactivation.
      Includes provisioning, credential rotation, suspension, and deletion.
      Non-custodial design ensures identity data never stored centrally.
      Deprovisioning triggers automatic credential revocation.
    implementation_root: "03_core"
    supporting_roots: ["09_meta_identity", "08_identity_score", "14_zero_time_auth"]
    shards:
      - "23_compliance/shards/01_identitaet_personen"
      - "23_compliance/shards/13_unternehmen_gewerbe"
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/iso27001/identity_lifecycle/"

  - control_id: "ISO27K-C-007"
    annex_a_ref: "A.5.19"
    title: "Supplier security management"
    description: >
      Security requirements included in supplier contracts.
      Third-party integrations reviewed for security posture before onboarding.
      Annual supplier security reassessment. Critical suppliers subject to
      right-to-audit clause.
    implementation_root: "10_interoperability"
    supporting_roots: ["23_compliance", "07_governance_legal"]
    shards: []
    type: "preventive"
    status: "required"
    review_frequency: "annual"
    evidence_path: "23_compliance/evidence/iso27001/suppliers/"

  - control_id: "ISO27K-C-008"
    annex_a_ref: "A.5.23"
    title: "Cloud service security"
    description: >
      Cloud provider security evaluated against ISO 27001/SOC2 certifications.
      Data residency controls enforced per jurisdiction. Shared responsibility
      model documented. Exit strategy and data portability ensured.
    implementation_root: "15_infra"
    supporting_roots: ["04_deployment", "23_compliance"]
    shards: []
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/iso27001/cloud/"

  - control_id: "ISO27K-C-009"
    annex_a_ref: "A.5.24"
    title: "Incident management procedure"
    description: >
      Documented incident response procedure with defined severity levels.
      Automated detection via observability layer. Triage, containment,
      eradication, recovery, and lessons-learned phases. WORM audit trail
      for all incident response actions.
    implementation_root: "17_observability"
    supporting_roots: ["02_audit_logging", "23_compliance"]
    shards: []
    type: "corrective"
    status: "required"
    rto_target: "4h"
    rpo_target: "1h"
    evidence_path: "23_compliance/evidence/iso27001/incidents/"

  - control_id: "ISO27K-C-010"
    annex_a_ref: "A.5.29"
    title: "Business continuity for information security"
    description: >
      Business continuity plan maintained for SSID platform.
      Recovery procedures tested annually via simulation in 11_test_simulation.
      High-availability deployment ensures 99.9% uptime SLA.
    implementation_root: "15_infra"
    supporting_roots: ["04_deployment", "17_observability", "11_test_simulation"]
    shards: []
    type: "corrective"
    status: "required"
    test_frequency: "annual"
    evidence_path: "23_compliance/evidence/iso27001/bcp/"

  - control_id: "ISO27K-C-011"
    annex_a_ref: "A.5.31"
    title: "Regulatory compliance monitoring"
    description: >
      Maintain register of all applicable legal, regulatory, and contractual
      obligations. Monitor for regulatory changes. Cross-reference with
      GDPR, eIDAS, MiCA, FATF, AMLD6 framework mappings.
    implementation_root: "23_compliance"
    supporting_roots: ["07_governance_legal", "03_core"]
    shards: []
    type: "detective"
    status: "required"
    review_frequency: "quarterly"
    evidence_path: "23_compliance/evidence/iso27001/regulatory/"

  # ---- PEOPLE CONTROLS ----

  - control_id: "ISO27K-C-012"
    annex_a_ref: "A.6.1"
    title: "Pre-employment security screening"
    description: >
      Background checks for all staff with access to personal data or
      privileged systems. Checks include identity verification, right-to-work,
      criminal record, and professional qualification verification.
      SSID platform used to verify candidate credentials against shards.
    implementation_root: "08_identity_score"
    supporting_roots: ["23_compliance"]
    shards:
      - "23_compliance/shards/09_arbeit_karriere"
      - "23_compliance/shards/01_identitaet_personen"
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/iso27001/screening/"

  - control_id: "ISO27K-C-013"
    annex_a_ref: "A.6.3"
    title: "Security awareness and training"
    description: >
      Annual mandatory security training for all staff. Role-specific
      training for privileged users and developers. Phishing simulation
      quarterly. Training completion tracked and recorded.
    implementation_root: "23_compliance"
    supporting_roots: ["07_governance_legal"]
    shards:
      - "23_compliance/shards/06_bildung_qualifikationen"
    type: "preventive"
    status: "required"
    frequency: "annual"
    evidence_path: "23_compliance/evidence/iso27001/training/"

  # ---- TECHNOLOGICAL CONTROLS ----

  - control_id: "ISO27K-C-014"
    annex_a_ref: "A.8.2"
    title: "Privileged access management"
    description: >
      Privileged access granted on just-in-time basis only.
      All privileged sessions logged to WORM audit trail.
      Privileged access reviewed monthly. No standing privileged accounts.
      Break-glass procedure documented for emergency access.
    implementation_root: "14_zero_time_auth"
    supporting_roots: ["02_audit_logging", "03_core"]
    shards:
      - "23_compliance/shards/03_zugang_berechtigungen"
    type: "preventive"
    status: "required"
    review_frequency: "monthly"
    evidence_path: "23_compliance/evidence/iso27001/privileged_access/"

  - control_id: "ISO27K-C-015"
    annex_a_ref: "A.8.5"
    title: "Multi-factor and cryptographic authentication"
    description: >
      Zero-time authentication with post-quantum cryptographic challenge.
      No password-based authentication for administrative access.
      MFA enforced for all operator-facing interfaces.
    implementation_root: "14_zero_time_auth"
    supporting_roots: ["21_post_quantum_crypto"]
    shards: []
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/iso27001/authentication/"

  - control_id: "ISO27K-C-016"
    annex_a_ref: "A.8.7"
    title: "Malware and threat protection"
    description: >
      Container-native malware protection; no traditional AV required.
      Dependency scanning in CI/CD pipeline for known malicious packages.
      Runtime anomaly detection in observability layer.
    implementation_root: "17_observability"
    supporting_roots: ["15_infra", "04_deployment", "12_tooling"]
    shards: []
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/iso27001/malware/"

  - control_id: "ISO27K-C-017"
    annex_a_ref: "A.8.8"
    title: "Vulnerability management"
    description: >
      Automated vulnerability scanning in CI/CD pipeline (SAST, DAST, SCA).
      Critical vulnerabilities remediated within 24h; high within 7d.
      Vulnerability register maintained. Penetration test annually.
    implementation_root: "12_tooling"
    supporting_roots: ["04_deployment", "17_observability"]
    shards: []
    type: "detective"
    status: "required"
    sla_critical_hours: 24
    sla_high_days: 7
    evidence_path: "23_compliance/evidence/iso27001/vulnerabilities/"

  - control_id: "ISO27K-C-018"
    annex_a_ref: "A.8.10"
    title: "Cryptographic data deletion"
    description: >
      Secure data deletion via cryptographic erasure (key destruction).
      Hash-only architecture means deletion of hash pointers satisfies
      right-to-erasure without media destruction. Deletion events WORM-logged.
    implementation_root: "03_core"
    supporting_roots: ["18_data_layer", "02_audit_logging", "21_post_quantum_crypto"]
    shards:
      - "23_compliance/shards/01_identitaet_personen"
      - "23_compliance/shards/02_dokumente_nachweise"
    type: "corrective"
    status: "required"
    evidence_path: "23_compliance/evidence/iso27001/deletion/"

  - control_id: "ISO27K-C-019"
    annex_a_ref: "A.8.15"
    title: "Security event logging"
    description: >
      All security-relevant events logged to WORM audit trail.
      Log retention: 7 years minimum. Logs protected from tampering
      via cryptographic chaining. Centralised log aggregation in
      observability layer. Time synchronisation via NTP.
    implementation_root: "02_audit_logging"
    supporting_roots: ["17_observability"]
    shards: []
    type: "detective"
    status: "required"
    retention_years: 7
    evidence_path: "23_compliance/evidence/audit/"

  - control_id: "ISO27K-C-020"
    annex_a_ref: "A.8.24"
    title: "Cryptographic key management"
    description: >
      Post-quantum key generation, storage, rotation, and destruction.
      Key hierarchy defined: root CA, intermediate, leaf.
      Hardware security module (HSM) for root key material.
      Key rotation policy enforced per key type. Crypto-agility ensured
      for algorithm migration.
    implementation_root: "21_post_quantum_crypto"
    supporting_roots: ["03_core", "23_compliance"]
    shards: []
    type: "preventive"
    status: "required"
    rotation_policy:
      root_keys_years: 5
      signing_keys_months: 12
      session_keys_hours: 24
    evidence_path: "23_compliance/evidence/iso27001/crypto/"

  - control_id: "ISO27K-C-021"
    annex_a_ref: "A.8.25"
    title: "Secure development lifecycle"
    description: >
      Security integrated across all SDLC phases. Threat modelling for
      new features. Security requirements in user stories. SAST/DAST/SCA
      in CI pipeline. Security sign-off required before production release.
    implementation_root: "04_deployment"
    supporting_roots: ["12_tooling", "11_test_simulation"]
    shards: []
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/iso27001/sdlc/"

  - control_id: "ISO27K-C-022"
    annex_a_ref: "A.8.32"
    title: "Change management"
    description: >
      All infrastructure and application changes via gated CI/CD pipeline.
      Change approval workflow enforced. Emergency change procedure
      with post-hoc review. All changes logged to immutable audit trail.
    implementation_root: "04_deployment"
    supporting_roots: ["02_audit_logging", "07_governance_legal"]
    shards: []
    type: "preventive"
    status: "required"
    evidence_path: "23_compliance/evidence/iso27001/changes/"
