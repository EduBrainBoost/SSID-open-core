global_foundations:
  version: "2.0.0"
  description: >
    Global compliance foundations for SSID. Defines baseline requirements
    applicable across all jurisdictions before regional overlays are applied.

baseline_requirements:
  identity_verification:
    min_assurance_level: substantial
    accepted_standards:
      - eIDAS_LoA_substantial
      - NIST_IAL2
      - ISO_29115_LoA3
    document_verification: required
    liveness_check: required
    biometric_storage: never

  anti_money_laundering:
    customer_due_diligence: required
    enhanced_due_diligence_threshold_eur: 15000
    transaction_monitoring: real_time
    suspicious_activity_reporting: mandatory
    sanctions_screening: real_time
    pep_screening: required
    screening_providers_ref: 24_meta_orchestration/registry/kyc_provider_registry.json

  data_protection:
    data_minimisation: enforced
    purpose_limitation: enforced
    storage_limitation: enforced
    pii_handling: never_stored
    hash_algorithm: sha3-256
    encryption_at_rest: AES-256-GCM
    encryption_in_transit: TLS-1.3
    cross_border_transfer: adequacy_decision_or_scc

  record_keeping:
    min_retention_years: 5
    max_retention_years: 10
    audit_trail: immutable
    evidence_integrity: sha3-256_chain

international_standards:
  fatf:
    travel_rule: compliant
    recommendation_16: implemented
    risk_based_approach: implemented
    virtual_asset_service_provider: registered

  iso:
    iso_27001: aligned
    iso_27701: aligned
    iso_42001: aligned
    iso_24165_dti: supported

  w3c:
    verifiable_credentials: v2.0
    decentralised_identifiers: v1.0

  oecd:
    carf_reporting: ready
    common_reporting_standard: implemented

risk_framework:
  risk_assessment_frequency: annual
  risk_categories:
    - money_laundering
    - terrorist_financing
    - sanctions_evasion
    - fraud
    - data_breach
    - ai_bias
    - regulatory_change
  risk_appetite: low
  residual_risk_tolerance: very_low

governance:
  policy_review_frequency: annual
  policy_approval: compliance_committee
  exception_process: documented_with_audit_trail
  whistleblower_protection: enabled
