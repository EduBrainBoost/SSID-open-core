# Global Compliance Matrix for SSID
# Aggregated view across all regulations and jurisdictions
# Context: Non-custodial, hash-only, utility-token infrastructure
# Version: 1.0.0
# Last updated: 2026-03-15

matrix_id: "SSID-COMPLIANCE-MATRIX-GLOBAL"
name: "SSID Global Compliance Matrix"
description: >
  Aggregated compliance matrix mapping SSID controls to regulatory
  requirements across all applicable jurisdictions. SSID operates
  as non-custodial, hash-only identity infrastructure with a
  utility token model.

ssid_architecture_principles:
  - principle: "non_custodial"
    description: "Users hold their own keys and credentials. SSID never has custody."
  - principle: "hash_only"
    description: "Only SHA-256 hashes of identity attributes are stored. No raw PII."
  - principle: "utility_token"
    description: "Token provides access to network services. No investment/yield/e-money claims."
  - principle: "data_minimization"
    description: "Minimal data collection and processing by design."
  - principle: "selective_disclosure"
    description: "ZKP-based proofs reveal only necessary attributes."

source_mappings:
  global:
    - file: "23_compliance/global/fatf_travel_rule.yaml"
      regulation: "FATF Recommendation 16 (Travel Rule)"
      status: "mapped"

    - file: "23_compliance/global/mica.yaml"
      regulation: "EU MiCA (2023/1114)"
      status: "mapped"

    - file: "23_compliance/global/eidas.yaml"
      regulation: "eIDAS 2.0 (2024/1183)"
      status: "mapped"

    - file: "23_compliance/global/gdpr.yaml"
      regulation: "GDPR (2016/679)"
      status: "mapped"

  jurisdictions:
    - file: "23_compliance/jurisdictions/eu/eu_framework.yaml"
      jurisdiction: "EU/EEA"
      status: "mapped"

    - file: "23_compliance/jurisdictions/us/us_framework.yaml"
      jurisdiction: "United States"
      status: "mapped"

    - file: "23_compliance/jurisdictions/apac/apac_framework.yaml"
      jurisdiction: "Asia-Pacific"
      status: "mapped"

regulation_coverage:
  - regulation: "FATF Travel Rule"
    category: "aml_cft"
    jurisdictions: ["global"]
    ssid_impact: "medium"
    ssid_role: "infrastructure_provider"
    key_controls:
      - "Hash-based identity attestation for VASPs"
      - "ZKP-based selective disclosure"
      - "Sanctions screening integration point"
      - "Audit trail (hash-only)"
    non_custodial_exemption: true
    exemption_basis: "Not a VASP; infrastructure provider only"

  - regulation: "MiCA"
    category: "crypto_asset_regulation"
    jurisdictions: ["EU", "EEA"]
    ssid_impact: "high"
    ssid_role: "utility_token_issuer"
    key_controls:
      - "Utility token classification enforcement"
      - "Compliant white paper (Art. 6)"
      - "Marketing compliance (Art. 7)"
      - "CASP guidance for partners"
    non_custodial_exemption: true
    exemption_basis: "Not a CASP; utility token under Title II"

  - regulation: "eIDAS 2.0"
    category: "digital_identity"
    jurisdictions: ["EU", "EEA"]
    ssid_impact: "high"
    ssid_role: "identity_infrastructure"
    key_controls:
      - "EUDI Wallet interoperability (OpenID4VC)"
      - "LoA mapping to eIDAS levels"
      - "Selective disclosure support"
      - "EAA/QEAA format compatibility"
    deadline: "2026-11-01"

  - regulation: "GDPR"
    category: "data_protection"
    jurisdictions: ["EU", "EEA"]
    ssid_impact: "high"
    ssid_role: "data_minimization_by_design"
    key_controls:
      - "Hash-only storage (Art. 5(1)(c), Art. 25)"
      - "Crypto-shredding for erasure (Art. 17)"
      - "Per-user salted hashing"
      - "ZKP selective disclosure"
      - "No cross-service tracking"
    non_custodial_exemption: false
    note: "GDPR applies regardless of custody model; hash-only minimizes scope"

  - regulation: "DORA"
    category: "operational_resilience"
    jurisdictions: ["EU"]
    ssid_impact: "medium"
    ssid_role: "third_party_ict_provider"
    key_controls:
      - "ICT risk management"
      - "Incident response plans"
      - "Business continuity"

  - regulation: "NIS2"
    category: "cybersecurity"
    jurisdictions: ["EU"]
    ssid_impact: "medium"
    ssid_role: "potentially_important_entity"
    key_controls:
      - "Security incident notification"
      - "Risk management measures"
      - "Supply chain security"

  - regulation: "EU AI Act"
    category: "artificial_intelligence"
    jurisdictions: ["EU"]
    ssid_impact: "medium"
    ssid_role: "limited_risk_ai_deployer"
    key_controls:
      - "AI model transparency"
      - "Bias and fairness testing"
      - "Human oversight"

  - regulation: "US Securities Laws"
    category: "securities"
    jurisdictions: ["US"]
    ssid_impact: "medium"
    ssid_role: "utility_token_issuer"
    key_controls:
      - "Howey Test analysis (utility, not security)"
      - "No investment/yield claims"
      - "Decentralized governance"
    non_custodial_exemption: true
    exemption_basis: "Utility token; does not meet Howey Test prongs"

  - regulation: "US BSA/FinCEN"
    category: "aml_cft"
    jurisdictions: ["US"]
    ssid_impact: "low"
    ssid_role: "non_msb"
    key_controls:
      - "Non-custodial architecture"
    non_custodial_exemption: true
    exemption_basis: "Not an MSB per FIN-2019-G001"

  - regulation: "APAC VASP Regimes"
    category: "crypto_asset_regulation"
    jurisdictions: ["SG", "HK", "JP", "AU", "KR"]
    ssid_impact: "low"
    ssid_role: "infrastructure_provider"
    key_controls:
      - "Non-custodial architecture"
      - "No exchange or trading services"
    non_custodial_exemption: true
    exemption_basis: "Non-custodial; not a VASP/DCE/CAESP"

  - regulation: "APAC Privacy Laws"
    category: "data_protection"
    jurisdictions: ["SG", "HK", "JP", "AU", "KR"]
    ssid_impact: "medium"
    ssid_role: "data_minimization_by_design"
    key_controls:
      - "Hash-only processing"
      - "Consent-based verification"
      - "Cross-border transfer assessment"

ssid_control_to_regulation_map:
  - ssid_control: "Hash-Only Identity Storage"
    component: "03_core/identity"
    regulations:
      - "GDPR Art. 5(1)(c), Art. 25"
      - "FATF R.16 (originator/beneficiary data)"
      - "eIDAS 2.0 Art. 5a (PID handling)"
      - "CCPA/CPRA (data minimization)"
      - "SG PDPA, JP APPI, AU Privacy Act"

  - ssid_control: "Zero-Knowledge Proof / Selective Disclosure"
    component: "14_zero_time_auth"
    regulations:
      - "GDPR Art. 5(1)(c), Art. 25"
      - "eIDAS 2.0 Art. 5a(4)(c)"
      - "FATF R.16 (identity attestation)"

  - ssid_control: "Crypto-Shredding (Erasure)"
    component: "03_core/identity"
    regulations:
      - "GDPR Art. 17"
      - "CCPA/CPRA Right to Delete"
      - "SG PDPA, JP APPI (deletion rights)"

  - ssid_control: "Append-Only Audit Logging"
    component: "02_audit_logging"
    regulations:
      - "FATF R.11 (record keeping)"
      - "DORA (ICT risk management)"
      - "NIS2 (incident documentation)"

  - ssid_control: "Utility Token Classification"
    component: "07_governance_legal"
    regulations:
      - "MiCA Art. 3(1)(9)"
      - "US Howey Test analysis"
      - "SG PSA, HK VASP, JP PSA token classification"

  - ssid_control: "Sanctions Screening Integration"
    component: "23_compliance/standards"
    regulations:
      - "FATF R.6, R.7"
      - "US OFAC SDN List"
      - "EU Sanctions Regulation"

  - ssid_control: "EUDI Wallet Adapter"
    component: "19_adapters"
    regulations:
      - "eIDAS 2.0 Art. 5a"
    deadline: "2026-11-01"

  - ssid_control: "AI Transparency and Fairness"
    component: "01_ai_layer"
    regulations:
      - "EU AI Act"
      - "GDPR Art. 22 (automated decision-making)"

gaps_and_actions:
  - gap_id: "GAP-01"
    description: "EUDI Wallet adapter not yet certified"
    regulation: "eIDAS 2.0"
    priority: "high"
    deadline: "2026-11-01"
    action: "Complete EUDI Wallet conformance testing"

  - gap_id: "GAP-02"
    description: "DPIA not yet completed for identity scoring"
    regulation: "GDPR Art. 35"
    priority: "high"
    action: "Conduct and document DPIA"

  - gap_id: "GAP-03"
    description: "MiCA white paper compliance review pending"
    regulation: "MiCA Art. 6"
    priority: "medium"
    action: "Review and update white paper for MiCA Art. 6 compliance"

  - gap_id: "GAP-04"
    description: "AI Act risk classification documentation incomplete"
    regulation: "EU AI Act"
    priority: "medium"
    action: "Document AI system risk classification and transparency measures"

  - gap_id: "GAP-05"
    description: "Cross-border hash transfer assessment for APAC"
    regulation: "JP APPI, KR PIPA"
    priority: "low"
    action: "Assess whether hashed identity data requires cross-border transfer consent"

evidence_strategy: "hash_manifest_only"
review_cycle: "quarterly"
next_review: "2026-06-15"
