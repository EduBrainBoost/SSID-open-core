description: >
  Policy definitions for the Codex module. Governs structural documentation,
  fee/subscription model definitions, and platform codex artifacts.

policies:
  - id: "AC-CODEX-001"
    category: "access_control"
    title: "Fee Model Document Governance"
    requirement: >
      Fee and subscription model documents require compliance_reviewer approval
      before publication. Changes to fee structures may have MiCA and consumer
      protection implications.
    enforcement: "strict"
    evidence_required: true

  - id: "DH-CODEX-001"
    category: "data_handling"
    title: "Codex Document Versioning"
    requirement: >
      All codex artifacts must be versioned. Previous versions must be retained
      for audit purposes. Silent overwrites of published codex documents are
      prohibited.
    enforcement: "strict"
    evidence_required: false

  - id: "OP-CODEX-001"
    category: "operational"
    title: "Codex-Implementation Consistency"
    requirement: >
      Fee models and structural definitions in 16_codex must remain consistent
      with platform implementation. Discrepancies discovered during audits must
      be resolved within 30 days.
    enforcement: "advisory"
    evidence_required: false

  - id: "CO-CODEX-001"
    category: "compliance"
    title: "MiCA Fee Disclosure"
    requirement: >
      Fee model documentation must comply with MiCA disclosure requirements
      for crypto-asset services. Fee structures must be transparent and
      machine-readable.
    enforcement: "strict"
    evidence_required: true
    references:
      - "23_compliance/mappings/mica/"

enforcement_defaults:
  mode: "advisory"
  override_requires: "compliance_reviewer"
  evidence_base: "23_compliance/evidence/codex/"
