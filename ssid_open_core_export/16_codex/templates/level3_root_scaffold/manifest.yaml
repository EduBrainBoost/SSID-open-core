schema_version: "1.0.0"
template_set: level3_root_scaffold
description: >
  Minimal L3 scaffold files for each of the 24 canonical roots.
  Generator: 12_tooling/cli/level3_scaffold.py (idempotent, no-overwrite).
required_files:
  - path: tests/test_root_smoke.py
    template: test_root_smoke.py.tpl
    description: Smoke test verifying root structure invariants
  - path: docs/ARCHITECTURE.md
    template: ARCHITECTURE.md.tpl
    description: Minimal architecture overview per root
