# SSID Agent Tools Contract
# Defines allowed tools, paths, and policies for the local LLM agent stack.

version: "1.0.0"
component: SSID_LOCAL_AGENT_TOOLS

tools:
  - fs_read
  - fs_write
  - sh
  - http_get
  - llm

root_path: "."  # repository root

deny_globs:
  - ".git/**"
  - "**/.env"
  - "**/secrets/**"

shell_whitelist:
  - ls
  - cat
  - grep
  - find
  - python
  - pip
  - "git status"
  - "git diff"
  - "git log"

http_whitelist:
  - api.github.com
  - registry.npmjs.org
  - pypi.org

root_24_lock: true
safe_fix: true
