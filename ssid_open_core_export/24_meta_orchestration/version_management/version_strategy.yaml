version_strategy:
  version: "1.0.0"
  description: >
    Versioning strategy for SSID platform components.
    Defines semantic versioning conventions, version bumping rules,
    and cross-component compatibility requirements.

scheme: semver
format: "MAJOR.MINOR.PATCH"

bump_rules:
  major:
    triggers:
      - breaking_api_change
      - breaking_schema_change
      - smart_contract_upgrade_with_migration
      - root_structure_change
    approval: governance_council
    requires:
      - migration_guide
      - changelog_entry
      - deprecation_notices_for_removed_features

  minor:
    triggers:
      - new_feature
      - new_api_endpoint
      - new_jurisdiction_support
      - new_provider_integration
    approval: technical_committee
    requires:
      - changelog_entry
      - documentation_update
      - test_coverage

  patch:
    triggers:
      - bug_fix
      - security_fix
      - documentation_correction
      - dependency_update_non_breaking
    approval: technical_lead
    requires:
      - changelog_entry
      - regression_test

pre_release:
  labels:
    - alpha
    - beta
    - rc
  format: "MAJOR.MINOR.PATCH-label.N"
  promotion_criteria:
    alpha_to_beta: feature_complete
    beta_to_rc: no_known_critical_bugs
    rc_to_release: qa_sign_off_and_compliance_check

component_versioning:
  independent_versioning:
    - smart_contracts
    - ai_models
    - api_versions
  coordinated_versioning:
    - platform_core
    - compliance_policies
    - configuration_schemas

compatibility:
  api_backward_compatibility: minor_versions
  schema_backward_compatibility: minor_versions
  smart_contract_upgradability: proxy_pattern
  data_migration: automated_with_rollback

tagging:
  git_tag_format: "v{version}"
  signed_tags: required
  tag_message_format: "Release {version}: {summary}"

changelog:
  format: keep_a_changelog
  categories:
    - Added
    - Changed
    - Deprecated
    - Removed
    - Fixed
    - Security
  path: CHANGELOG.md
