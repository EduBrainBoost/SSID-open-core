release_management:
  version: "1.0.0"
  description: >
    Release management configuration for SSID platform.
    Defines release cadence, approval gates, deployment strategies,
    and rollback procedures.

release_cadence:
  major:
    frequency: semi_annual
    approval: governance_council
    notice_period_weeks: 8
    changelog: required
    migration_guide: required

  minor:
    frequency: monthly
    approval: technical_committee
    notice_period_weeks: 2
    changelog: required

  patch:
    frequency: as_needed
    approval: technical_lead
    notice_period_weeks: 0
    changelog: required

  hotfix:
    frequency: emergency
    approval: 2_of_3_technical_leads
    notice_period_weeks: 0
    changelog: required
    post_mortem: required

gates:
  pre_release:
    - gate: unit_tests
      threshold: 100_percent_pass
      blocking: true
    - gate: integration_tests
      threshold: 100_percent_pass
      blocking: true
    - gate: security_scan
      threshold: no_critical_or_high
      blocking: true
    - gate: compliance_check
      threshold: sot_validator_pass
      blocking: true
    - gate: structure_guard
      threshold: all_24_roots_valid
      blocking: true
    - gate: performance_benchmark
      threshold: no_regression_above_10_percent
      blocking: false

  release_approval:
    - gate: code_review
      min_approvers: 2
      blocking: true
    - gate: qa_sign_off
      blocking: true
    - gate: compliance_sign_off
      blocking: true_for_major_and_minor

deployment:
  strategy: blue_green
  canary:
    enabled: true
    initial_traffic_percent: 5
    increment_percent: 15
    observation_minutes: 30
    auto_rollback_on_error_rate: 1.0
  environments:
    - name: development
      auto_deploy: true
      branch: develop
    - name: staging
      auto_deploy: false
      branch: release/*
      approval: technical_lead
    - name: production
      auto_deploy: false
      branch: main
      approval: release_manager

rollback:
  automatic_trigger:
    error_rate_threshold_percent: 5.0
    latency_increase_percent: 50
    observation_window_minutes: 15
  manual_trigger: always_available
  max_rollback_time_minutes: 5
  data_migration_rollback: tested_before_release

versioning:
  scheme: semver
  strategy_ref: 24_meta_orchestration/version_management/version_strategy.yaml
  deprecation_ref: 24_meta_orchestration/version_management/deprecation_strategy.yaml
