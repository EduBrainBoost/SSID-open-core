dao_treasury:
  version: "1.0.0"
  description: >
    DAO treasury policy for SSID. Governs treasury fund management,
    allocation rules, spending authority, and transparency requirements.

treasury:
  governance: dao_controlled
  multi_sig:
    required_signers: 3
    total_signers: 5
    timelock_hours: 48

  fund_allocation:
    - category: protocol_development
      max_percent: 40
      approval: dao_vote
      description: Core protocol development and maintenance

    - category: security_audits
      max_percent: 15
      approval: compliance_committee
      description: Smart contract audits, penetration testing, bug bounties

    - category: ecosystem_grants
      max_percent: 20
      approval: dao_vote
      description: Community grants, developer incentives, hackathons

    - category: operational_reserve
      max_percent: 15
      approval: treasury_admin
      description: Operational expenses, infrastructure costs

    - category: strategic_reserve
      max_percent: 10
      approval: dao_supermajority
      description: Emergency fund and strategic opportunities

  spending_limits:
    single_transaction_max_eur: 50000
    monthly_operational_max_eur: 200000
    emergency_spending_max_eur: 100000
    emergency_approval: 3_of_5_signers

  revenue_sources:
    - source: platform_fees
      allocation: treasury_share_200_bp
      frequency: continuous
    - source: staking_fees
      allocation: per_fee_schedule
      frequency: continuous
    - source: enterprise_licences
      allocation: per_contract
      frequency: per_invoice

transparency:
  public_balance: true
  public_transactions: true
  quarterly_report: true
  annual_audit: external
  report_path: 02_audit_logging/reports

investment_policy:
  permitted_assets:
    - stablecoins_regulated
    - short_term_government_bonds_eu
  prohibited_assets:
    - volatile_cryptocurrencies
    - leveraged_instruments
    - unregulated_tokens
  max_single_asset_percent: 40
  rebalancing_frequency: monthly

compliance:
  jurisdiction: EU
  regulatory_reporting: as_required
  tax_obligations: per_jurisdiction
  aml_screening: all_incoming_funds
