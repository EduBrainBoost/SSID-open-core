# PlanSpec Schema — Multi-task plan specification format
# Reference: ADR-0063
# Validates YAML PlanSpec files used by the automation loop

$schema: "https://json-schema.org/draft/2020-12/schema"
title: PlanSpec
description: >
  Multi-task plan specification for SSID automation loop.
  Defines tasks, dependencies, acceptance criteria, and execution order.
type: object

required:
  - plan_id
  - version
  - title
  - tasks

properties:
  plan_id:
    type: string
    pattern: "^PLAN_[0-9]{4}$|^PLANSPEC_PHASE[0-9]+$"
    description: Unique plan identifier

  version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+$"
    description: Semantic version of this plan

  title:
    type: string
    maxLength: 120

  description:
    type: string

  status:
    type: string
    enum: [DRAFT, APPROVED, IN_PROGRESS, COMPLETE, CANCELLED]
    default: DRAFT

  created_at:
    type: string
    format: date

  tasks:
    type: array
    minItems: 1
    items:
      $ref: "#/$defs/TaskEntry"

  acceptance_criteria:
    type: array
    items:
      type: string
    description: Plan-level acceptance criteria (all must pass)

  execution_order:
    type: string
    enum: [sequential, parallel, dependency_graph]
    default: sequential

$defs:
  TaskEntry:
    type: object
    required: [task_id, title, scope]
    properties:
      task_id:
        type: string
        pattern: "^[A-Z0-9_]+$"
      title:
        type: string
        maxLength: 120
      description:
        type: string
      scope:
        type: object
        properties:
          allowed_paths:
            type: array
            items:
              type: string
          forbidden_paths:
            type: array
            items:
              type: string
      depends_on:
        type: array
        items:
          type: string
        description: Task IDs this task depends on (for cycle detection)
      acceptance_checks:
        type: array
        items:
          type: string
          enum: [policy, sot, qa, lint, test, gate]
      status:
        type: string
        enum: [PENDING, IN_PROGRESS, COMPLETE, FAILED, SKIPPED]
        default: PENDING
