schema_version: "1.0.0"
description: >
  Configuration for update_registry.py — the central registry index generator.

scan_path: "24_meta_orchestration/registry/"
output: "registry.yaml"
hash_algorithm: "sha256"

exclude_dirs:
  - generated
  - intake
  - locks
  - logs
  - manifests
  - tasks
  - anchors
  - __pycache__

exclude_files:
  - registry.yaml
  - update_registry.py
  - update_registry_config.yaml
