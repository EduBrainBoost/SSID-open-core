# SSID Local LLM Agent Stack Registry
# Central definition of the agent stack components and their relationships.

component: SSID_LOCAL_AGENT_STACK
version: "1.0.0"

services:
  - name: ollama
    role: primary_llm_runtime
    required: true
  - name: litellm
    role: proxy_optional
    required: false

default_model: "qwen2.5-coder:7b"
model_env_var: SSID_LLM_MODEL

contracts: "16_codex/contracts/agent_tools.yaml"
policies: "23_compliance/policies/agent_sandbox.rego"
tests: "11_test_simulation/tests_agent/test_agent_tools.py"
cli: "12_tooling/agent/agent_cli.py"
maos_service: "15_infra/maos_agent_service.py"
task_registry: "24_meta_orchestration/registry/agent_tasks.json"

root_24_lock: true
safe_fix: true
