# PARALLEL_DISPATCH_RULES — Regeln fuer parallele Agent-Ausfuehrung
# Generated: 2026-03-29T16:00:00Z
# Agent: HARD_REALITY_RESET
# Quelle: T-005 (Mandatory Parallel Intake Policy) — materialisiert

version: "1.0.0"

intake_rules:
  - rule_id: "PD-001"
    name: "MANDATORY_LEDGER_ENTRY"
    description: "Jeder eingehende Prompt MUSS innerhalb von 30 Sekunden einen Ledger-Eintrag erhalten. Kein Prompt darf ignoriert werden."
    enforcement: "MANDATORY"

  - rule_id: "PD-002"
    name: "CLASSIFY_BEFORE_QUEUE"
    description: "Jeder Prompt muss klassifiziert werden als: IN_SCOPE, OUT_OF_SCOPE, DUPLICATE, DEFERRED_EXTERNAL bevor er in eine Queue kommt."
    enforcement: "MANDATORY"

  - rule_id: "PD-003"
    name: "NO_SILENT_REJECT"
    description: "Abweisungen muessen dem Nutzer SOFORT mitgeteilt werden mit Begruendung. Kein stilles Ignorieren."
    enforcement: "MANDATORY"

dispatch_rules:
  - rule_id: "PD-010"
    name: "MAX_PARALLEL_AGENTS"
    description: "Maximal 10 parallele Agents pro Wave. Darueber hinaus Queue-Management."
    max_agents: 10

  - rule_id: "PD-011"
    name: "WAVE_CHECKPOINT"
    description: "Nach jeder Wave: Commit + Evidence vor naechster Wave."
    enforcement: "MANDATORY"

  - rule_id: "PD-012"
    name: "QUEUE_STARVATION_PREVENTION"
    description: "QUEUED Tasks muessen nach spaetestens 2 Waves angestossen werden. Wenn nicht, Alert."
    max_waves_in_queue: 2

  - rule_id: "PD-013"
    name: "NO_MERGE_INTO_QUEUE"
    description: "Tasks duerfen NICHT in QUEUED Tasks gemergt werden. Siehe TASK_MERGE_POLICY TM-001."
    enforcement: "MANDATORY"

  - rule_id: "PD-014"
    name: "PUSH_AFTER_PHASE"
    description: "Nach jeder abgeschlossenen Phase MUSS ein git push erfolgen. Lokale Commits sind nicht als DONE zu betrachten."
    enforcement: "MANDATORY"

conflict_resolution:
  same_file_conflict: "Serialize — kein paralleler Schreibzugriff auf gleiche Datei"
  same_root_conflict: "Erlaubt wenn verschiedene Subdirectories"
  cross_root: "Immer parallel erlaubt"

session_isolation:
  lock_format: ".ssid-system/locks/<agent-id>.lock"
  evidence_path: ".ssid-system/evidence/<agent-id>/<session-id>/"
  max_lock_duration_minutes: 30
