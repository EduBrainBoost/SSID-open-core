schema_version: "1.0.0"
description: >
  Canonical endpoint registry for SSID runtime services.
  Maps service names to their host, port, and health-check paths.
  Port assignments follow the immutable port-policy.

environments:
  workspace:
    label: "G -- Arbeitsstand"
    services:
      - name: ssid_ems_portal_frontend
        host: localhost
        port: 3100
        health_path: /
        protocol: http
      - name: ssid_ems_portal_backend
        host: localhost
        port: 8100
        health_path: /api/health
        protocol: http
      - name: ssid_legacy_website
        host: localhost
        port: 3101
        health_path: /
        protocol: http
      - name: cct_docusaurus_docs
        host: localhost
        port: 3102
        health_path: /
        protocol: http
      - name: ssid_orchestrator_api
        host: localhost
        port: 3310
        health_path: /health
        protocol: http
      - name: ssid_orchestrator_web_ui
        host: localhost
        port: 5273
        health_path: /
        protocol: http
      - name: ssid_docs
        host: localhost
        port: 4331
        health_path: /
        protocol: http
      - name: cct_dashboard
        host: localhost
        port: 4332
        health_path: /
        protocol: http

  canonical:
    label: "C -- Lokal / Kanonisch"
    services:
      - name: ssid_ems_portal_frontend
        host: localhost
        port: 3000
        health_path: /
        protocol: http
      - name: ssid_ems_portal_backend
        host: localhost
        port: 8000
        health_path: /api/health
        protocol: http
      - name: ssid_legacy_website
        host: localhost
        port: 3001
        health_path: /
        protocol: http
      - name: cct_docusaurus_docs
        host: localhost
        port: 3002
        health_path: /
        protocol: http
      - name: ssid_orchestrator_api
        host: localhost
        port: 3210
        health_path: /health
        protocol: http
      - name: ssid_orchestrator_web_ui
        host: localhost
        port: 5173
        health_path: /
        protocol: http
      - name: ssid_docs
        host: localhost
        port: 4321
        health_path: /
        protocol: http
      - name: cct_dashboard
        host: localhost
        port: 4322
        health_path: /
        protocol: http
