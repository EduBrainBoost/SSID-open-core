    pragma: "^0.8.20"
    license: MIT
    deployment_status: implemented
    abi_reference: null
    description: >
      Pull-over-push fee distribution contract. Splits incoming fees among
      platform treasury, creator, and validator according to configurable
      basis-point ratios. Uses withdrawal pattern to prevent reentrancy.
    functions:
      - transferOwnership(address newOwner)
      - setPlatformTreasury(address _platformTreasury)
      - setFeeRatio(bytes32 serviceType, uint16 platformBps, uint16 creatorBps, uint16 validatorBps)
      - distributeFee(bytes32 serviceType, address creator, address validator)
      - withdraw()
      - pendingBalance(address account) view
