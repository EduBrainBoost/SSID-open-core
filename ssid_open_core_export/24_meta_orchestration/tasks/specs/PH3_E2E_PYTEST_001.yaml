task_id: PH3_E2E_PYTEST_001
title: "Testnet MVP: end-to-end pytest for deploy+verify flow"
task_type: tests
scope_allowlist:
  - "11_test_simulation/"
  - "02_audit_logging/agent_runs/"
forbidden_paths:
  - "./"
  - "/mnt/data"
  - "**/.git/**"
  - "**/secrets/**"
  - "**/*.sol"
required_checks:
  - "python 12_tooling/cli/stability_gate.py --run"
  - "python 12_tooling/cli/sot_validator.py --verify-all"
  - "python -m pytest -q"
acceptance_criteria:
  - "Test file exists under 11_test_simulation/ (conformant path)"
  - "Tests marked with pytest.mark.testnet and pytest.mark.slow"
  - "Tests skip gracefully when ENV vars (RPC_URL, PRIVATE_KEY) are absent"
  - "Tests are executable locally when ENV is set"
  - "Deterministic timeouts configured (no infinite waits)"
  - "Single attempt per test (no retry loops)"
  - "CI can skip testnet-marked tests without failure"
  - "All existing tests continue to pass unmodified"
evidence_outputs:
  - "02_audit_logging/agent_runs/PH3_E2E_PYTEST_001/evidence.json"
  - "02_audit_logging/agent_runs/PH3_E2E_PYTEST_001/patch.diff"
agent_cmd: "manual"
notes: >
  E2E tests cover: deploy -> verify round-trip on testnet.
  Marked testnet/slow so CI skips by default. Local execution
  requires ENV setup. No retries, deterministic timeouts, 1 attempt.
