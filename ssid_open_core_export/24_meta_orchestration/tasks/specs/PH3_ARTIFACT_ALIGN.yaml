task_id: PH3_ARTIFACT_ALIGN
title: "Align contract artifacts: single canonical set (24_meta_orchestration → 12_tooling)"
task_type: tooling
scope_allowlist:
  - "12_tooling/testnet_mvp/01_hash_only_proof_registry/"
  - "24_meta_orchestration/contracts/"
  - "tests/"
forbidden_paths:
  - "./"
  - "/mnt/data"
  - "**/.git/**"
  - "**/secrets/**"
  - "**/*.sol"
required_checks:
  - "python -m pytest -q"
  - "python 12_tooling/cli/stability_gate.py --run"
  - "python 12_tooling/cli/sot_validator.py --verify-all"
acceptance_criteria:
  - "24_meta_orchestration/contracts/ is the single canonical Source of Truth"
  - "12_tooling/testnet_mvp/.../contracts/ is either generated from SoT or removed"
  - "No duplicate, divergent artifact sets exist"
  - "Compiler pin: exactly 1 solc version + evmVersion across all artifacts"
  - "ABI consistency: addProof, hasProof, ProofAdded signature identical in all outputs"
  - "Bytecode key normalization: artifact loader accepts both 'object' and 'bytecode' keys"
  - "deploy_testnet.py and verify_testnet.py work with normalized artifacts"
  - "Unit test: artifact_equivalence_test compares ABI + event signatures + bytecode hash"
  - "CI gate: fails on artifact drift between SoT and deploy paths"
  - "No core logic changes — scope is artifact alignment + loader compatibility only"
evidence_outputs:
  - "02_audit_logging/agent_runs/PH3_ARTIFACT_ALIGN/evidence.json"
  - "02_audit_logging/agent_runs/PH3_ARTIFACT_ALIGN/patch.diff"
agent_cmd: "manual"
notes: >
  Follow-up to PH3_IMPL_SCRIPTS_002 code review findings.
  Confirmed drift: solc 0.8.29/cancun (SoT) vs 0.8.20/london (deploy);
  bytecode key 'object' (SoT) vs 'bytecode'+'deployedBytecode' (deploy);
  ABI: 3 members (SoT) vs 4 members (deploy, includes proofs() getter);
  Event ProofAdded: 1 param (SoT) vs 3 params (deploy, adds sender+timestamp).
  Decision: Option B — 24_meta_orchestration/contracts/ is canonical SoT.
  Minimal implementation: normalize loader, align or derive deploy artifacts
  from SoT, add equivalence test + CI drift gate. Stop-on-first-fail.
