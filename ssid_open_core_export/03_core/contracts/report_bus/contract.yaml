# Contract: Report Bus
# Root: 03_core | SoT v4.1.0 | ROOT-24-LOCK
# Description: Defines the interface contract for the SSID Report Bus.
#   The Report Bus collects structured reports from gates, validators,
#   and engines, normalizes them, and routes them to configured sinks
#   (evidence chain, observability, dashboard).

contract_id: "report_bus"
version: "4.1.0"
status: "active"
root: "03_core"
classification: "Internal — System Infrastructure"

interface:
  module: "12_tooling/cli/report_bus.py"
  entry_point: "publish_report"
  accepts:
    - name: "report"
      type: "dict"
      required: true
      schema:
        report_type:
          type: "string"
          enum: ["gate_result", "audit_finding", "health_check", "compliance_scan", "security_alert"]
        source_root:
          type: "string"
          description: "Canonical root name from ROOT-24-LOCK."
        source_module:
          type: "string"
          description: "Module path that generated the report."
        severity:
          type: "string"
          enum: ["info", "warning", "error", "critical"]
        timestamp:
          type: "string"
          format: "iso8601"
        payload:
          type: "dict"
          description: "Report-specific data."
  returns:
    - name: "ack"
      type: "dict"
      schema:
        report_id: { type: "string", format: "uuid4" }
        routed_to: { type: "list", items: { type: "string" } }

sinks:
  - name: "evidence_chain"
    target: "02_audit_logging/src/evidence_chain_engine.py"
    filter: "all reports with severity >= warning"
  - name: "observability"
    target: "17_observability/src/metrics_collector.py"
    filter: "all reports"
  - name: "dashboard"
    target: "13_ui_layer/src/"
    filter: "reports matching dashboard subscription filters"

invariants:
  - "Every report MUST include source_root, report_type, and timestamp."
  - "Reports with severity >= error MUST be routed to evidence_chain."
  - "Report Bus MUST NOT modify report payloads (pass-through only)."
  - "Report Bus operates NON-INTERACTIVE — no user prompts."

dependencies:
  upstream:
    - "12_tooling/cli/run_all_gates.py"
    - "23_compliance/anti_gaming/overfitting_detector.py"
    - "12_tooling/security/secret_scanner.py"
  downstream:
    - "02_audit_logging/src/evidence_chain_engine.py"
    - "17_observability/src/metrics_collector.py"
