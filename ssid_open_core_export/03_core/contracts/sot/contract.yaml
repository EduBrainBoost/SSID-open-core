# Contract: Source of Truth (SoT)
# Root: 03_core | SoT v4.1.0 | ROOT-24-LOCK
# Description: Defines the interface contract for the SSID Source of Truth system.
#   The SoT resides in 16_codex and is the single authoritative reference for
#   structure definitions, ADR decisions, phase tracking, and canonical
#   configuration. All other roots MUST conform to SoT definitions.

contract_id: "sot"
version: "4.1.0"
status: "active"
root: "03_core"
classification: "Internal — Governance Critical"

interface:
  validator_module: "03_core/validators/sot/sot_validator_core.py"
  primary_class: "SoTValidatorCore"
  cli_module: "12_tooling/cli/sot_validator.py"
  methods:
    - name: "validate_root_structure"
      description: "Validate that a root directory conforms to SoT structure definition."
      accepts:
        - name: "root_name"
          type: "string"
          required: true
          description: "Canonical root name from ROOT-24-LOCK."
      returns:
        type: "dict"
        schema:
          valid: { type: "boolean" }
          violations: { type: "list", items: { type: "string" } }

    - name: "validate_shard_conformance"
      description: "Validate shard structure against 16-shard canonical layout."
      accepts:
        - name: "root_name"
          type: "string"
          required: true
        - name: "shard_id"
          type: "string"
          required: true
      returns:
        type: "dict"
        schema:
          valid: { type: "boolean" }
          missing_artifacts: { type: "list" }
          extra_artifacts: { type: "list" }

sot_location: "16_codex/"
sot_artifacts:
  - path: "16_codex/structure/"
    description: "Canonical directory structure definitions for all 24 roots."
  - path: "16_codex/decisions/"
    description: "Architecture Decision Records (ADRs)."
  - path: "16_codex/phases/"
    description: "Phase execution plans and tracking."
  - path: "16_codex/governance/"
    description: "Governance rules and compliance mappings."

invariants:
  - "16_codex is the SOLE Source of Truth. No other root may define structure."
  - "ROOT-24-LOCK: Exactly 24 roots. No additions, deletions, or renames."
  - "16-Shard layout: Each root contains exactly 16 domain shards."
  - "SoT changes require RFC process and dual-review approval."
  - "All validators MUST reference SoT definitions, not local conventions."

dependencies:
  upstream: []
  downstream:
    - "12_tooling/cli/sot_validator.py"
    - "12_tooling/cli/shard_conformance_gate.py"
    - "12_tooling/cli/sot_enforcement_gate.py"
    - "11_test_simulation/tests_compliance/test_sot_validator.py"
