# Contract: Evidence Chain
# Root: 03_core | SoT v4.1.0 | ROOT-24-LOCK
# Description: Defines the interface contract for the Evidence Chain subsystem.
#   The Evidence Chain provides append-only, tamper-evident logging of all
#   system decisions and state transitions. Each record is sealed with a
#   cryptographic hash linking it to its predecessor.

contract_id: "evidence_chain"
version: "4.1.0"
status: "active"
root: "03_core"
classification: "Internal — Security Critical"

interface:
  module: "02_audit_logging/src/evidence_chain_engine.py"
  primary_class: "EvidenceChainEngine"
  methods:
    - name: "append_record"
      description: "Append a new evidence record to the chain."
      accepts:
        - name: "event_type"
          type: "string"
          required: true
        - name: "payload"
          type: "dict"
          required: true
        - name: "actor_id"
          type: "string"
          required: true
      returns:
        type: "dict"
        schema:
          record_id: { type: "string", format: "uuid4" }
          chain_hash: { type: "string", description: "SHA256 linking to previous record" }
          sealed_at: { type: "string", format: "iso8601" }

    - name: "verify_chain"
      description: "Verify integrity of the entire evidence chain."
      accepts:
        - name: "start_record"
          type: "string"
          required: false
          description: "Optional record_id to start verification from."
      returns:
        type: "dict"
        schema:
          valid: { type: "boolean" }
          records_checked: { type: "integer" }
          first_invalid: { type: "string", nullable: true }

    - name: "get_record"
      description: "Retrieve a single evidence record by ID."
      accepts:
        - name: "record_id"
          type: "string"
          required: true
      returns:
        type: "dict"
        description: "Full evidence record including payload, hash, and metadata."

invariants:
  - "Records are append-only. Deletion and modification are prohibited."
  - "Each record MUST contain a SHA256 hash of the previous record."
  - "Forbidden hash algorithms (MD5, SHA-1) MUST be rejected."
  - "All records MUST include actor_id, event_type, and ISO8601 timestamp."
  - "Chain verification MUST detect any tampered or missing record."

dependencies:
  upstream:
    - "12_tooling/security/signature_verifier.py"
    - "21_post_quantum_crypto/src/pqc_core.py"
  downstream:
    - "23_compliance/evidence/"
    - "17_observability/src/audit_event_monitor.py"

evidence:
  storage_format: "JSON lines, one record per line"
  storage_path: "02_audit_logging/storage/worm/"
  hash_algorithm: "sha256"
  signature: "HMAC-SHA256 (Ed25519 or Dilithium planned)"
