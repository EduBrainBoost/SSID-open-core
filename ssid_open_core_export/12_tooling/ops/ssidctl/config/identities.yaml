# SSID EMS Identity Map
# Maps OS/ENV usernames to RBAC roles.
# Schema: 16_codex/contracts/ssidctl/identities.schema.json
#
# Role hierarchy: owner > admin > reviewer > contributor > readonly
# Unknown users get default_role (readonly).

identities:
  bibel:
    role: owner
    display_name: "Admin (bibel)"

default_role: readonly
