task_id: PH3_CONTRACT_ARTIFACTS_001
title: "Testnet MVP: hash-only proof registry contract artifacts (ABI/Bytecode/Spec)"
task_type: tooling
scope_allowlist:
  - "24_meta_orchestration/contracts/"
  - "02_audit_logging/agent_runs/"
forbidden_paths:
  - "./"
  - "/mnt/data"
  - "**/.git/**"
  - "**/secrets/**"
  - "**/*.sol"
required_checks:
  - "python 12_tooling/cli/stability_gate.py --run"
  - "python 12_tooling/cli/sot_validator.py --verify-all"
  - "python -m pytest -q"
acceptance_criteria:
  - "proof_registry_abi.json exists under 24_meta_orchestration/contracts/"
  - "proof_registry_bytecode.json exists under 24_meta_orchestration/contracts/"
  - "compiler_manifest.json exists under 24_meta_orchestration/contracts/"
  - "proof_registry_spec.md exists under 24_meta_orchestration/contracts/"
  - "Contract interface: addProof(bytes32) and hasProof(bytes32) view"
  - "Event: ProofAdded(bytes32 indexed proof)"
  - "ABI and bytecode hashes are deterministic and reproducible"
  - "No .sol files anywhere in the repository"
  - "No PII or secrets in any artifact"
evidence_outputs:
  - "02_audit_logging/agent_runs/PH3_CONTRACT_ARTIFACTS_001/evidence.json"
  - "02_audit_logging/agent_runs/PH3_CONTRACT_ARTIFACTS_001/patch.diff"
agent_cmd: "manual"
notes: >
  Contract is compiled externally (not inside repo). Only ABI, bytecode,
  compiler manifest, and spec are committed. No .sol source files.
  bytes32 proof storage only. Minimal surface: addProof/hasProof/ProofAdded.
