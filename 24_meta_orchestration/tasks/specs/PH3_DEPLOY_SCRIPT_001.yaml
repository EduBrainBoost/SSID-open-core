task_id: PH3_DEPLOY_SCRIPT_001
title: "Testnet MVP: deploy script for proof registry (ENV-only, no secrets in repo)"
task_type: tooling
scope_allowlist:
  - "12_tooling/cli/"
  - "04_deployment/"
  - "02_audit_logging/agent_runs/"
forbidden_paths:
  - "./"
  - "/mnt/data"
  - "**/.git/**"
  - "**/secrets/**"
  - "**/*.sol"
required_checks:
  - "python 12_tooling/cli/stability_gate.py --run"
  - "python 12_tooling/cli/sot_validator.py --verify-all"
  - "python -m pytest -q"
acceptance_criteria:
  - "deploy_testnet.py exists under 12_tooling/cli/ or 04_deployment/"
  - "Script reads RPC_URL, CHAIN_ID, PRIVATE_KEY from ENV only"
  - "Script never logs or prints secret values"
  - "Script loads ABI/bytecode from 24_meta_orchestration/contracts/"
  - "Script writes deployment.json to 02_audit_logging/agent_runs/PH3_DEPLOY_SCRIPT_001/"
  - "deployment.json contains: contract_address, tx_hash, chain_id, deployer (redacted)"
  - "No secrets, private keys, or RPC URLs in deployment.json"
  - "Exit code 0 on success, 1 on failure"
evidence_outputs:
  - "02_audit_logging/agent_runs/PH3_DEPLOY_SCRIPT_001/evidence.json"
  - "02_audit_logging/agent_runs/PH3_DEPLOY_SCRIPT_001/patch.diff"
agent_cmd: "manual"
notes: >
  deploy_testnet.py is a deterministic deployment script. All secrets
  come from environment variables (GitHub Environment 'testnet' or local).
  Output is redacted: no secret material in evidence or deployment.json.
