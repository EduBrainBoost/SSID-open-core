task_id: PH3_IMPL_TESTS_DOCS_002
title: "Testnet MVP: implement e2e tests + runbook documentation"
task_type: tests
scope_allowlist:
  - "11_test_simulation/"
  - "12_tooling/cli/docs/"
  - "02_audit_logging/agent_runs/"
forbidden_paths:
  - "./"
  - "/mnt/data"
  - "**/.git/**"
  - "**/secrets/**"
  - "**/*.sol"
required_checks:
  - "python 12_tooling/cli/stability_gate.py --run"
  - "python 12_tooling/cli/sot_validator.py --verify-all"
  - "python -m pytest -q"
acceptance_criteria:
  - "Test file exists under 11_test_simulation/ (conformant path)"
  - "Tests marked with pytest.mark.testnet and pytest.mark.slow"
  - "Tests skip gracefully when ENV vars (RPC_URL, PRIVATE_KEY) are absent"
  - "Tests are executable locally when ENV is set"
  - "Deterministic timeouts configured (no infinite waits)"
  - "Single attempt per test (no retry loops)"
  - "CI can skip testnet-marked tests without failure"
  - "All existing tests continue to pass unmodified"
  - "TESTNET_RUNBOOK.md exists under 12_tooling/cli/docs/"
  - "Runbook lists all required ENV vars: RPC_URL, CHAIN_ID, PRIVATE_KEY, CONTRACT_ADDRESS"
  - "No secrets, example keys, or real RPC URLs in the runbook"
  - "Runbook explains GitHub Environment 'testnet' for CI keys"
  - "Runbook explains local-only policy for prod keys (never in CI)"
  - "Runbook documents 1-command flow: deploy -> verify -> e2e"
  - "Runbook references deploy_testnet.py, verify_testnet.py, and pytest -m testnet"
evidence_outputs:
  - "02_audit_logging/agent_runs/PH3_IMPL_TESTS_DOCS_002/evidence.json"
  - "02_audit_logging/agent_runs/PH3_IMPL_TESTS_DOCS_002/patch.diff"
agent_cmd: "manual"
notes: >
  Implementation of PH3_E2E_PYTEST_001 and PH3_RUNBOOK_ENV_001 specs.
  E2E tests cover: deploy -> verify round-trip on testnet. Marked
  testnet/slow so CI skips by default. Runbook is the single-source
  documentation for testnet ENV setup. Testnet keys go into GitHub
  Environment 'testnet'; prod keys stay local-only.
