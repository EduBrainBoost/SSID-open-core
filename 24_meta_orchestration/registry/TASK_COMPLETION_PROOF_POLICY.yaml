# TASK_COMPLETION_PROOF_POLICY — Was zaehlt als "DONE"
# Generated: 2026-03-29T16:00:00Z
# Agent: HARD_REALITY_RESET

version: "1.0.0"

completion_gates:
  - gate_id: "CP-001"
    name: "COMMIT_EXISTS"
    description: "Ein DONE-Task muss mindestens einen Commit-SHA vorweisen koennen."
    enforcement: "MANDATORY"
    exception: "Tasks die nur Policy-Dokumente erzeugen (kein Code)."

  - gate_id: "CP-002"
    name: "COMMIT_PUSHED"
    description: "Der Commit muss auf origin/main oder einem benannten Branch gepusht sein. Lokale Commits zaehlen als EXECUTED_NOT_DEPLOYED."
    enforcement: "MANDATORY"
    current_violation: "Commits 0eaf78b, c8d5500, 687ab41, 773b26c sind lokal aber nicht gepusht."

  - gate_id: "CP-003"
    name: "ARTIFACTS_EXIST"
    description: "Jeder DONE-Task muss mindestens ein persistentes Artefakt haben (Report, Config, Code)."
    enforcement: "MANDATORY"

  - gate_id: "CP-004"
    name: "EVIDENCE_HASH"
    description: "Jedes Artefakt muss einen SHA256-Hash im Evidence-Index haben."
    enforcement: "MANDATORY"

  - gate_id: "CP-005"
    name: "NO_FALSE_DONE"
    description: "DONE darf nur gesetzt werden wenn CP-001 bis CP-004 alle PASS sind. Andernfalls ist der Status CLAIMED_DONE_BUT_UNVERIFIED."
    enforcement: "MANDATORY"

status_definitions:
  DONE:
    requires: ["CP-001", "CP-002", "CP-003", "CP-004"]
    meaning: "Task ist ausgefuehrt, committed, gepusht und evidenziert."

  EXECUTED_NOT_DEPLOYED:
    requires: ["CP-001", "CP-003"]
    missing: ["CP-002"]
    meaning: "Commit existiert lokal aber ist nicht auf Remote. Arbeit ist at-risk."

  CLAIMED_DONE_BUT_UNVERIFIED:
    requires: []
    meaning: "Task wurde als DONE markiert aber mindestens ein Gate fehlt."

  QUEUED:
    requires: []
    meaning: "Task steht in Warteschlange. Kein Commit, keine Artefakte."

  LOST:
    requires: []
    meaning: "Task war QUEUED oder MERGED in QUEUED und wurde nie ausgefuehrt."

audit_frequency: "Nach jeder Phase und vor jedem Session-Ende"
