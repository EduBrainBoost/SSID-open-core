schema_version: "1.0.0"
description: >
  Dependency map between Root 16 (16_codex) and Root 21 (21_post_quantum_crypto).
  Documents the directional dependencies, shared interfaces, and integration
  points between these two roots.

roots:
  16_codex:
    description: >
      Source of Truth codex -- canonical decisions, structure definitions,
      phase tracking, and architecture documentation.
    provides:
      - ADR decisions governing PQC algorithm selection
      - Structure definitions that 21_post_quantum_crypto must conform to
      - Phase execution plans referencing PQC milestones
    consumes_from_21: []

  21_post_quantum_crypto:
    description: >
      Post-quantum cryptography implementations -- Kyber (KEM) and
      Dilithium (signatures) algorithm stubs and integration interfaces.
    provides:
      - PQC algorithm stubs (kem_keygen, kem_encapsulate, sig_sign, sig_verify)
      - Evidence record signing/verification interfaces
    consumes_from_16:
      - "16_codex/decisions/ADR_*_pqc_*.md"
      - "16_codex/structure/21_post_quantum_crypto/"

dependencies:
  - source: 21_post_quantum_crypto
    target: 16_codex
    type: governance
    description: >
      Root 21 follows ADR decisions from Root 16 regarding algorithm
      selection, key sizes, and migration timelines.

  - source: 16_codex
    target: 21_post_quantum_crypto
    type: reference
    description: >
      Root 16 references Root 21 artifacts in phase plans and structure
      definitions but does not import code from it.

  - source: 21_post_quantum_crypto
    target: 02_audit_logging
    type: evidence
    description: >
      PQC signing functions produce evidence records that flow into
      the audit logging pipeline.

  - source: 21_post_quantum_crypto
    target: 14_zero_time_auth
    type: integration
    description: >
      Zero-time auth will consume PQC key exchange (Kyber) and
      signature verification (Dilithium) once stubs are replaced
      with real implementations.
