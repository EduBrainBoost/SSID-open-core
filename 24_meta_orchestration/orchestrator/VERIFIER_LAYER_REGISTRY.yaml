# VERIFIER_LAYER_REGISTRY.yaml
# T-019 WP3 — Verifier-Layer fuer Sub-Orchestratoren
# Generated: 2026-03-29
# Scope: Jeder Sub-Orchestrator hat einen zugeordneten Verifier.
---
policy_id: orchestrator.verifier_layer
version: 1.0.0
enforcement: fail_closed

verifiers:
  structure_verifier:
    tool: structure_guard.py
    path: 12_tooling/cli/structure_guard.py
    scope: Root-24 Integritaet, Shard-Zuordnung, Pfad-Validierung
    checks:
      - root_24_lock_intact
      - no_orphan_files_in_root
      - shard_assignment_valid
      - path_within_allowed_scope
    triggers:
      - post_structure_change
      - pre_merge
    assigned_to: structure_orchestrator
    failure_action: block_merge

  policy_verifier:
    tool: sot_validator.py --verify-all
    path: 12_tooling/cli/sot_validator.py
    scope: SoT-Konsistenz, Policy-Drift, Rego-Validierung
    checks:
      - sot_baseline_matches_registry
      - no_policy_drift
      - rego_policies_valid
      - compliance_gates_green
    triggers:
      - post_policy_change
      - pre_release
    assigned_to: policy_orchestrator
    failure_action: block_release

  runtime_verifier:
    tool: worker_health_check
    path: 12_tooling/cli/worker_commands/supervisor_cmd.py
    scope: Worker-Health, CLI-Funktionsfaehigkeit, Subprocess-Status
    checks:
      - all_workers_responsive
      - cli_commands_functional
      - subprocess_exit_codes_clean
      - no_zombie_processes
    triggers:
      - post_dispatch
      - periodic_health
    assigned_to: runtime_orchestrator
    failure_action: alert_and_retry

  agent_verifier:
    tool: registry_consistency_check
    path: 24_meta_orchestration/registry/ssidctl_unified_agent_registry.yaml
    scope: Agent-Registry-Konsistenz, Skill-Bindings, Activation-Profile
    checks:
      - all_agents_in_registry
      - no_orphan_skills
      - activation_profiles_valid
      - no_duplicate_agent_ids
    triggers:
      - post_agent_change
      - post_skill_binding
    assigned_to: agent_orchestrator
    failure_action: block_dispatch

  repo_sync_verifier:
    tool: git_status_check
    path: null
    scope: Git-Status, Push-State, Branch-Konsistenz
    checks:
      - git_status_clean
      - push_state_up_to_date
      - no_detached_heads
      - worktree_locks_consistent
      - no_merge_conflicts
    triggers:
      - pre_push
      - post_merge
    assigned_to: repo_sync_orchestrator
    failure_action: block_push

  final_closure_verifier:
    tool: gate_aggregator
    path: null
    scope: Alle Gates gruen, alle Verifier bestanden
    checks:
      - structure_verifier_passed
      - policy_verifier_passed
      - runtime_verifier_passed
      - agent_verifier_passed
      - repo_sync_verifier_passed
      - evidence_chain_intact
      - no_open_incidents
    triggers:
      - pre_closure
      - pre_release
    assigned_to: verification_orchestrator
    failure_action: block_closure

gate_rules:
  - Kein Abschluss ohne alle Verifier gruen
  - Verifier-Ergebnisse werden im Evidence-Log gespeichert
  - Fehlgeschlagene Verifier erzeugen Incidents
  - Kein Override ohne explizite Operator-Freigabe
