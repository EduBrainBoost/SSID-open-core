# INTER_AGENT_HANDOFF_POLICY.yaml
# T-019 WP3 — Inter-Agent Handoff Rules
# Generated: 2026-03-29
# Scope: Kontrollierte Uebergaben zwischen Agents, kein freier Chat.
---
policy_id: orchestrator.inter_agent_handoff
version: 1.0.0
enforcement: fail_closed

handoff_protocol:
  description: >
    Jede Uebergabe zwischen Agents muss explizit, geloggt und
    mit vollstaendigem Kontext erfolgen. Kein freier Chat.

  required_fields:
    - task_id
    - source_agent_id
    - target_agent_id
    - scope
    - expected_output
    - timestamp_utc
    - handoff_reason

  handoff_format:
    task_id: string
    source_agent_id: "ssidctl.*"
    target_agent_id: "ssidctl.*"
    scope:
      repo: string
      root: string_or_null
      shard: string_or_null
      files: list_or_null
    expected_output:
      type: string
      format: string
      validation: string
    timestamp_utc: ISO8601
    handoff_reason: string

  logging:
    destination: 24_meta_orchestration/orchestrator/handoff_ledger.jsonl
    write_mode: append_only
    fields:
      - task_id
      - source_agent_id
      - target_agent_id
      - scope
      - expected_output
      - timestamp_utc
      - handoff_reason
      - status

rules:
  no_free_chat:
    description: >
      Kein freier Chat zwischen Agents. Agents kommunizieren
      ausschliesslich ueber explizite Handoff-Nachrichten.
    enforcement: block_unstructured_messages

  explicit_handoff_only:
    description: >
      Jede Uebergabe muss task_id, scope und expected_output enthalten.
      Uebergaben ohne diese Felder werden abgelehnt.
    validation: fail_if_missing_fields

  logged_handoff:
    description: >
      Jede Uebergabe wird im handoff_ledger.jsonl protokolliert.
      Kein Handoff ohne Ledger-Eintrag.
    audit_trail: mandatory

  no_silent_side_effects:
    description: >
      Kein Agent darf Dateien aendern, die nicht im scope der
      Uebergabe liegen. Seiteneffekte ausserhalb des Scope
      fuehren zum Abbruch.
    enforcement: path_guard_active
    scope_validation: strict

  return_contract:
    description: >
      Der Ziel-Agent muss sein Ergebnis zurueckliefern im
      erwarteten Format. Kein stilles Beenden ohne Output.
    required_return_fields:
      - task_id
      - agent_id
      - result_status
      - output_artifact
      - sha256_output
      - timestamp_utc

forbidden:
  - Freier Chat zwischen Agents
  - Uebergaben ohne task_id
  - Uebergaben ohne scope
  - Uebergaben ohne expected_output
  - Stille Seiteneffekte ausserhalb des Scope
  - Agent beendet ohne Return-Nachricht
  - Handoff ohne Ledger-Eintrag
