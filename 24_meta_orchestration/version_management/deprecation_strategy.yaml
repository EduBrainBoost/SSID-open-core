deprecation_strategy:
  version: "1.0.0"
  description: >
    Deprecation strategy for SSID platform components.
    Defines the lifecycle for deprecating APIs, features,
    dependencies, and configuration formats.

lifecycle_stages:
  - stage: active
    description: Fully supported, receiving updates and fixes
  - stage: deprecated
    description: Still functional but scheduled for removal. Warnings emitted.
  - stage: sunset
    description: Read-only or minimal maintenance. Migration required.
  - stage: removed
    description: No longer available. Breaking change.

timelines:
  api_versions:
    deprecation_notice_months: 6
    sunset_period_months: 6
    total_support_after_deprecation_months: 12

  features:
    deprecation_notice_months: 3
    sunset_period_months: 3
    total_support_after_deprecation_months: 6

  dependencies:
    security_patch_only_months: 6
    removal_after_months: 12

  configuration_formats:
    deprecation_notice_months: 6
    auto_migration_tool: required
    sunset_period_months: 12

notification:
  channels:
    - changelog
    - api_response_headers
    - developer_portal
    - email_registered_developers
  deprecation_header: "X-SSID-Deprecated"
  sunset_header: "Sunset"
  warning_frequency: per_request_first_occurrence

migration_support:
  migration_guides: required_for_all_deprecations
  automated_migration_tools: preferred
  compatibility_shims: available_during_sunset
  sandbox_testing: available

pre_commit_check:
  hook_ref: 12_tooling/hooks/pre_commit/deprecation_check.sh
  block_usage_of_removed: true
  warn_usage_of_deprecated: true
  warn_usage_of_sunset: true

registry:
  active_deprecations: []
  completed_removals: []
  tracking_format: yaml
  review_frequency: quarterly
