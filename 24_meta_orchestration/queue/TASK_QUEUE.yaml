version: "1.0"

defaults:
  no_new_files: true
  max_changed_files: 12
  max_changed_lines: 600
  stop_on_fail_count: 1
  acceptance_checks:
    - policy
    - sot
    - qa

tasks:
  - task_id: "stabilize-queue-ledger-gates"
    scope: "root"
    allowed_paths:
      - "24_meta_orchestration/queue"
      - "24_meta_orchestration/dispatcher"
      - "12_tooling/cli"
      - "16_codex/agents"
      - ".gitignore"
    expected_artifacts:
      - "02_audit_logging/agent_runs/"
    notes: "Stabilize long-run execution path with queue, ledger, duplicate guard, and hard gates."
    max_changes:
      files: 20
      lines: 1200
    stop_conditions:
      failures: 1
      on_missing_files: false

  - task_id: "proof-mvp-testnet-contracts-spec"
    scope: "13_ui_layer/17_observability/20_foundation"
    allowed_paths:
      - "13_ui_layer"
      - "17_observability"
      - "20_foundation"
      - "16_codex/agents"
    expected_artifacts:
      - "Proof-MVP contract scope definition (hash-only)"
    notes: "Placeholder task for Testnet contract proof MVP specification only."
    no_new_files: false
    allow_new_files_list:
      - "13_ui_layer/proof_mvp_spec.md"

  - task_id: "proof-mvp-testnet-ui-spec"
    scope: "13_ui_layer"
    allowed_paths:
      - "13_ui_layer"
      - "16_codex/agents"
    expected_artifacts:
      - "Proof-MVP UI flow specification (hash-only)"
    notes: "Placeholder task for Testnet UI specification only."
    no_new_files: false
    allow_new_files_list:
      - "13_ui_layer/proof_mvp_ui_spec.md"

  - task_id: "proof-mvp-testnet-verifier-spec"
    scope: "03_core/12_tooling"
    allowed_paths:
      - "03_core"
      - "12_tooling"
      - "16_codex/agents"
    expected_artifacts:
      - "Proof-MVP verifier specification (hash-only)"
    notes: "Placeholder task for Testnet verifier specification only."
    no_new_files: false
    allow_new_files_list:
      - "03_core/validators/proof_mvp_verifier_spec.md"

  # ── Phase 3: Testnet MVP (hash-only proof registry) ──
  - task_id: "PH3_CONTRACT_ARTIFACTS_001"
    spec: "24_meta_orchestration/tasks/specs/PH3_CONTRACT_ARTIFACTS_001.yaml"
    scope: "24_meta_orchestration/contracts"
    notes: "Contract ABI/bytecode/spec artifacts. No .sol files."

  - task_id: "PH3_DEPLOY_SCRIPT_001"
    spec: "24_meta_orchestration/tasks/specs/PH3_DEPLOY_SCRIPT_001.yaml"
    scope: "12_tooling/cli"
    notes: "Deploy script for proof registry. ENV-only, no secrets in repo."

  - task_id: "PH3_VERIFY_SCRIPT_001"
    spec: "24_meta_orchestration/tasks/specs/PH3_VERIFY_SCRIPT_001.yaml"
    scope: "12_tooling/cli"
    notes: "Verification script: hasProof/addProof round-trip."

  - task_id: "PH3_E2E_PYTEST_001"
    spec: "24_meta_orchestration/tasks/specs/PH3_E2E_PYTEST_001.yaml"
    scope: "11_test_simulation"
    notes: "E2E pytest for deploy+verify. Marked testnet/slow, skips without ENV."

  - task_id: "PH3_RUNBOOK_ENV_001"
    spec: "24_meta_orchestration/tasks/specs/PH3_RUNBOOK_ENV_001.yaml"
    scope: "12_tooling/cli/docs"
    notes: "Runbook for ENV setup and 1-command deploy->verify->e2e flow."
